<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulo Smartville v9.5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --p: #2563eb; --s: #059669; }
        body { background: #f8fafc; font-family: sans-serif; }
        .card-glass { background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: none; }
        .btn-menu { border-radius: 15px; padding: 20px; border: none; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); width: 100%; transition: 0.2s; }
        .btn-menu:active { transform: scale(0.95); }
        #login-screen, #app-content, #view-detail { display: none; }
        .badge-trash { border-radius: 8px; padding: 5px 10px; font-weight: bold; font-size: 0.7rem; }
        .bg-active { background: #fee2e2; color: #ef4444; }
        .bg-wait { background: #e0f2fe; color: #0ea5e9; }
    </style>
</head>
<body>

<div id="login-screen" class="vh-100 d-flex align-items-center justify-content-center p-4">
    <div class="col-md-4 w-100" style="max-width: 400px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold">Bulo Smartville</h2>
            <p class="text-muted">Digitalisasi Desa Pilot Bulo</p>
        </div>
        <div class="card-glass p-4">
            <input type="number" id="nik" class="form-control mb-3 py-3 rounded-3" placeholder="NIK">
            <input type="password" id="pass" class="form-control mb-4 py-3 rounded-3" placeholder="Password">
            <button onclick="doLogin()" class="btn btn-primary w-100 py-3 rounded-3 fw-bold">MASUK</button>
        </div>
    </div>
</div>

<div id="app-content">
    <div class="p-3 bg-white border-bottom d-flex justify-content-between align-items-center sticky-top">
        <b id="user-display">Memuat...</b>
        <button onclick="doLogout()" class="btn btn-sm btn-outline-danger px-3">Keluar</button>
    </div>

    <div class="container py-4">
        <div id="view-dashboard">
            <div class="card-glass p-4 mb-4 text-center">
                <div class="d-flex justify-content-between mb-3 align-items-center">
                    <span class="small text-muted fw-bold">TABUNGAN SAMPAH</span>
                    <span id="trash-badge" class="badge-trash">...</span>
                </div>
                <div class="row">
                    <div class="col-6 text-start">
                        <h4 id="dash-saldo" class="fw-bold text-success mb-0">Rp 0</h4>
                        <small class="text-muted">Saldo Anda</small>
                    </div>
                    <div class="col-6 text-end">
                        <h4 id="dash-timer" class="fw-bold mb-0">00:00:00</h4>
                        <small class="text-muted">Sisa Waktu</small>
                    </div>
                </div>
            </div>

            <div class="row g-3">
                <div class="col-6">
                    <button onclick="chooseMember()" class="btn-menu"><h1>🥗</h1><b>Gizi</b></button>
                </div>
                <div class="col-6">
                    <button onclick="showMyQR()" class="btn-menu"><h1>🆔</h1><b>ID Digital</b></button>
                </div>
                <div id="kader-section" class="col-12 d-none">
                    <hr>
                    <button onclick="startScanner()" class="btn btn-success w-100 py-3 rounded-3 fw-bold mb-2">📸 SCAN QR WARGA</button>
                    <button onclick="manageFisik()" class="btn btn-outline-primary w-100 py-3 rounded-3 fw-bold bg-white">⚖️ UPDATE DATA FISIK</button>
                </div>
            </div>
        </div>

        <div id="view-detail">
            <button onclick="goBack()" class="btn btn-light btn-sm mb-3 border px-3">← Kembali</button>
            <div id="detail-body"></div>
        </div>
    </div>
</div>

<div id="scanner-box" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; p-3">
    <div id="reader"></div>
    <button onclick="stopScanner()" class="btn btn-danger w-100 mt-3 py-3">BATAL</button>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxc3QGXps0_3KTCLIqNmciIedgkrKWSvk3tMpMz9saLw19CIMb11SkqWj567SlC_jCKPg/exec"; 
let USER = null, DATA = null, piring = [], selectedMember = null, mainTimer = null, html5QrCode = null;

// FUNGSI INTI: CALL SERVER
async function callServer(payload) {
    return fetch(WEB_APP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // Kunci agar tidak macet
        body: JSON.stringify(payload)
    }).then(r => r.json());
}

async function doLogin() {
    const nik = document.getElementById('nik').value;
    const pass = document.getElementById('pass').value;
    if(!nik || !pass) return Swal.fire('Error','NIK & Pass wajib diisi','warning');
    
    Swal.fire({title:'Menghubungkan...', didOpen:()=>Swal.showLoading()});
    try {
        const res = await callServer({ action: 'login', nik, password: pass });
        if(res.status === 'success') {
            USER = res.user;
            localStorage.setItem('bulo_session', JSON.stringify(USER));
            Swal.close();
            initApp();
        } else {
            Swal.fire('Gagal', res.message, 'error');
        }
    } catch(e) { Swal.fire('Koneksi Gagal', 'Pastikan URL benar dan sudah Deploy Anyone.', 'error'); }
}

function doLogout() { localStorage.removeItem('bulo_session'); location.reload(); }

async function initApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-content').style.display = 'block';
    document.getElementById('user-display').innerText = USER.nama;
    if(USER.role === 'kader' || USER.role === 'admin') document.getElementById('kader-section').classList.remove('d-none');
    refreshDash();
}

async function refreshDash() {
    const res = await callServer({ action: 'get_dashboard', user: USER });
    DATA = res.data;
    document.getElementById('dash-saldo').innerText = `Rp ${DATA.sampah.saldo_rp.toLocaleString('id-ID')}`;
    const badge = document.getElementById('trash-badge');
    badge.innerText = DATA.alarm.status_text;
    badge.className = DATA.alarm.is_active ? "badge-trash bg-active" : "badge-trash bg-wait";
    startTimer(DATA.alarm.target_time);
}

function startTimer(target) {
    if(mainTimer) clearInterval(mainTimer);
    mainTimer = setInterval(() => {
        const diff = target - new Date().getTime();
        const el = document.getElementById('dash-timer');
        if (diff < 0) { clearInterval(mainTimer); refreshDash(); return; }
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        el.innerText = `${h<10?'0':''}${h}:${m<10?'0':''}${m}:${s<10?'0':''}${s}`;
    }, 1000);
}

function showMyQR() {
    const qr = `https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl=${USER.nik}&choe=UTF-8`;
    Swal.fire({
        title: 'ID DIGITAL',
        html: `<img src="${qr}" width="200" class="my-3 shadow border rounded-4" onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${USER.nik}'">
               <h5>${USER.nama}</h5><small>${USER.nik}</small>`
    });
}

function startScanner() {
    document.getElementById('scanner-box').style.display = 'block';
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
        stopScanner();
        handleScanResult(txt);
    });
}

function stopScanner() {
    if(html5QrCode) html5QrCode.stop().then(() => document.getElementById('scanner-box').style.display='none');
}

async function handleScanResult(nik) {
    Swal.fire({title:'Mengecek NIK...', didOpen:()=>Swal.showLoading()});
    const res = await callServer({ action: 'get_user_by_nik', nik });
    Swal.close();
    if(res.status === 'success') {
        Swal.fire({
            title: res.nama,
            html: `<input id="b-kg" type="number" class="form-control mb-2" placeholder="Berat (Kg)">
                   <input id="b-rp" type="number" class="form-control" placeholder="Rupiah (Rp)">`,
            confirmButtonText: 'Simpan',
            preConfirm: () => { return { berat: document.getElementById('b-kg').value, rp: document.getElementById('b-rp').value } }
        }).then(async (r) => {
            if(r.isConfirmed) {
                await callServer({ action: 'submit_setoran', nik_warga: nik, berat: r.value.berat, total_rp: r.value.rp });
                Swal.fire('Sukses', 'Setoran dicatat', 'success');
                refreshDash();
            }
        });
    } else { Swal.fire('Error', 'Warga tidak ditemukan', 'error'); }
}

function chooseMember() {
    let opts = DATA.keluarga.map((k, i) => `<option value="${i}">${k.nama}</option>`).join('');
    Swal.fire({ title: 'Pilih Anggota', html: `<select id="idx-mem" class="form-select mt-2">${opts}</select>`, confirmButtonText: 'Pilih' }).then(r => {
        if(r.isConfirmed) { 
            selectedMember = DATA.keluarga[document.getElementById('idx-mem').value]; 
            piring = []; renderCalc(); 
            document.getElementById('view-dashboard').style.display = 'none';
            document.getElementById('view-detail').style.display='block'; 
        }
    });
}

function renderCalc() {
    let optFood = DATA.master_gizi.map((f, i) => `<option value="${i}">${f[0]}</option>`).join('');
    document.getElementById('detail-body').innerHTML = `
        <div class="card-glass p-4 mb-3">
            <b>${selectedMember.nama}</b><br><small>${selectedMember.tb}cm | ${selectedMember.bb}kg</small>
            <div class="input-group mt-3">
                <select id="f-sel" class="form-select">${optFood}</select>
                <input type="number" id="f-gram" class="form-control" style="width:70px" placeholder="Gr">
                <button onclick="addPiring()" class="btn btn-primary">Add</button>
            </div>
        </div>
        <div id="piring-list" class="card-glass p-3"></div>`;
}

function addPiring() {
    let f = DATA.master_gizi[document.getElementById('f-sel').value], g = document.getElementById('f-gram').value;
    if(!g) return;
    piring.push({ nama: f[0], gram: g });
    let html = piring.map(p => `<div>• ${p.nama} (${p.gram}g)</div>`).join('');
    document.getElementById('piring-list').innerHTML = html + `<button class="btn btn-dark btn-sm w-100 mt-2" onclick="window.print()">Cetak</button>`;
}

function goBack() { 
    document.getElementById('view-detail').style.display = 'none'; 
    document.getElementById('view-dashboard').style.display = 'block'; 
}

window.onload = () => {
    const s = localStorage.getItem('bulo_session');
    if(s) { USER = JSON.parse(s); initApp(); } 
    else { document.getElementById('login-screen').style.display = 'flex'; }
};
</script>
</body>
</html>
