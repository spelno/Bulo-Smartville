<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bulo Smartville v14.3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --main-blue: #00569e; 
            --dark-blue: #003d70; 
            --bg-gray: #f4f7f9;
            --vh: 1vh;
        }
        
        html, body { 
            height: 100vh; height: calc(var(--vh, 1vh) * 100);
            overflow: hidden; background: white; 
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; 
            position: fixed; width: 100%;
        }

        /* ANIMASI SPLASH SCREEN */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10000;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .splash-logo { 
            width: 180px; height: auto; 
            opacity: 0; transform: scale(0.8);
            animation: splashIn 1.2s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes splashIn {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        .splash-footer { 
            position: absolute; bottom: 60px; 
            font-size: 0.7rem; letter-spacing: 2px; color: #aaa; 
            font-weight: bold; text-transform: uppercase;
            animation: fadeIn 2s forwards;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* PAGE BASICS */
        .page { display: none; height: 100%; width: 100%; flex-direction: column; background: var(--bg-gray); }

        /* LOGIN PAGE */
        .login-container { background: white; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; }
        .login-logo { width: 150px; height: auto; margin-bottom: 35px; }

        /* DASHBOARD & NAV */
        .top-header { 
            background: linear-gradient(135deg, var(--main-blue), var(--dark-blue)); 
            color: white; padding: 35px 20px 65px; 
            border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; 
        }

        .content-area { flex: 1; overflow-y: auto; padding: 0 20px 120px; margin-top: -45px; }

        .premium-card {
            background: white; border-radius: 24px; padding: 20px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.04); border: none; margin-bottom: 20px;
        }

        .bottom-nav { 
            height: 90px; background: rgba(255,255,255,0.92); backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; align-items: center; 
            position: absolute; bottom: 0; width: 100%; border-top: 1px solid rgba(0,0,0,0.05);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-link { text-align: center; color: #bbb; text-decoration: none; font-size: 0.7rem; transition: 0.3s; }
        .nav-link.active { color: var(--main-blue); font-weight: bold; }
        .nav-link i { font-size: 1.7rem; display: block; margin-bottom: 4px; }

        .btn-qr-center { 
            width: 68px; height: 68px; background: var(--main-blue); 
            border-radius: 22px; display: flex; align-items: center; justify-content: center; 
            color: white; font-size: 1.8rem; margin-top: -65px; 
            box-shadow: 0 10px 25px rgba(0,86,158,0.3); border: 5px solid var(--bg-gray);
        }
    </style>
</head>
<body onload="fetchAndInit()">

    <div id="splash-screen">
        <img src="Logo_UMMAN.jpg" class="splash-logo" alt="UMMAN">
        <div class="splash-footer">Digitalisasi Desa Pilot Bulo</div>
    </div>

    <div id="login-screen" class="page">
        <div class="login-container">
            <img src="Logo_Bulo.png" class="login-logo" alt="Logo Bulo">
            <h3 class="fw-bold text-dark mb-1">Masuk Warga</h3>
            <p class="text-muted mb-5 small text-center">Akses Layanan Smartville Desa Bulo</p>
            
            <div class="w-100" style="max-width: 320px;">
                <input type="number" id="nik" class="form-control form-control-lg rounded-pill border-0 bg-light px-4 mb-3 fs-6" placeholder="Masukkan NIK">
                <input type="password" id="pass" class="form-control form-control-lg rounded-pill border-0 bg-light px-4 mb-4 fs-6" placeholder="Password">
                <button onclick="handleLogin()" class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-lg">LOG IN</button>
            </div>
            <p class="mt-5 small text-muted opacity-50">Notes of OD &copy; 2026</p>
        </div>
    </div>

    <div id="app-home" class="page">
        <div class="top-header">
            <div class="d-flex justify-content-between align-items-center">
                <div><small class="opacity-75">Halo,</small><h5 class="mb-0 fw-bold" id="user-display">Memuat...</h5></div>
                <div class="bg-white bg-opacity-20 rounded-circle p-2" onclick="confirmLogout()"><i class="bi bi-power text-white"></i></div>
            </div>
        </div>
        <div class="content-area">
            <div class="premium-card">
                <div class="row text-center">
                    <div class="col-6 border-end">
                        <small class="text-muted d-block mb-1">Status Gizi</small>
                        <span class="badge bg-success-subtle text-success px-3 py-2 rounded-pill">Normal</span>
                    </div>
                    <div class="col-6">
                        <small class="text-muted d-block mb-1">Saldo Sampah</small>
                        <h6 id="info-saldo" class="fw-bold text-primary mb-0">Rp 0</h6>
                    </div>
                </div>
            </div>

            <h6 class="fw-bold mb-3 small"><i class="bi bi-person-badge-fill me-2 text-primary"></i>DAFTAR KELUARGA</h6>
            <div id="family-list"></div>
        </div>

        <div class="bottom-nav">
            <a href="javascript:void(0)" onclick="switchPage('app-home')" class="nav-link active"><i class="bi bi-house-door-fill"></i>Beranda</a>
            <div onclick="showQR()"><div class="btn-qr-center"><i class="bi bi-qr-code-scan"></i></div></div>
            <a href="javascript:void(0)" onclick="switchPage('app-gizi')" class="nav-link"><i class="bi bi-calculator-fill"></i>Gizi</a>
        </div>
    </div>

    <div id="app-gizi" class="page">
        <div class="top-header" style="padding-bottom: 40px;">
            <div class="d-flex align-items-center">
                <i class="bi bi-arrow-left fs-3 me-3" onclick="switchPage('app-home')"></i>
                <h5 class="mb-0 fw-bold">Analisis Gizi</h5>
            </div>
        </div>
        <div class="content-area">
            <div class="premium-card p-2">
                <div class="input-group bg-light rounded-pill px-3 py-1">
                    <span class="input-group-text border-0 bg-transparent text-muted"><i class="bi bi-search"></i></span>
                    <input type="text" id="search-food" class="form-control border-0 bg-transparent" placeholder="Cari menu makanan..." onkeyup="filterFood()">
                </div>
                <div id="food-results" class="list-group mt-2 border-0 shadow-sm" style="display:none; max-height: 250px; overflow-y: auto; border-radius: 15px;"></div>
            </div>

            <div id="selected-list" class="d-none">
                <div id="current-meal-items"></div>
                <div class="premium-card bg-primary text-white text-center py-3 mt-4" onclick="hitungGiziFinal()">
                    <span class="fw-bold fs-6">SIMPAN LAPORAN GIZI <i class="bi bi-chevron-right ms-2"></i></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw6CKdpyg71G1jUBN5EyZWDyqsVzqUYqElkpE1XH3fh-cbiMfEjFvhxKubK-dJI74pb7A/exec";
        let DB_FULL = null; let USER_SESSION = null; let currentMeal = [];

        async function fetchAndInit() {
            try {
                const response = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'read_all' }) });
                const result = await response.json();
                if(result.status === 'success') {
                    DB_FULL = result.db;
                    // Durasi splash agar animasi terlihat
                    setTimeout(() => {
                        const sp = document.getElementById('splash-screen');
                        sp.style.opacity = '0';
                        setTimeout(() => {
                            sp.style.display = 'none';
                            const saved = localStorage.getItem('bulo_user');
                            if(saved) {
                                USER_SESSION = JSON.parse(saved);
                                initDashboard(); switchPage('app-home');
                            } else { switchPage('login-screen'); }
                        }, 800);
                    }, 2800);
                }
            } catch (e) { Swal.fire('Error','Koneksi Terputus','error'); }
        }

        function initDashboard() {
            document.getElementById('user-display').innerText = USER_SESSION.nama;
            const family = DB_FULL.Master_Data_Penduduk.filter(r => r[7].toString() === USER_SESSION.kk);
            document.getElementById('family-list').innerHTML = family.map(f => `
                <div class="premium-card p-3 mb-2 d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center">
                        <div class="bg-light rounded-circle p-2 me-3 text-primary"><i class="bi bi-person-fill"></i></div>
                        <div><div class="fw-bold small">${f[2]}</div><small class="text-muted" style="font-size:0.65rem">${f[0]}</small></div>
                    </div>
                    <span class="badge bg-light text-dark rounded-pill" style="font-size:0.6rem">Warga</span>
                </div>
            `).join('');

            const saldo = DB_FULL.sampah_saldo.find(r => r[0].toString() === USER_SESSION.nik);
            if(saldo) document.getElementById('info-saldo').innerText = `Rp ${parseInt(saldo[2] || 0).toLocaleString()}`;
        }

        // --- LOGIC GIZI ---
        function filterFood() {
            const q = document.getElementById('search-food').value.toLowerCase();
            const res = document.getElementById('food-results');
            if(q.length < 2) { res.style.display = 'none'; return; }
            const matches = DB_FULL.master_gizi.filter(r => r[0] && r[0].toLowerCase().includes(q));
            res.innerHTML = matches.slice(0, 5).map(m => `
                <button onclick="addFood('${m[0]}', ${m[1]}, ${m[5]})" class="list-group-item list-group-item-action border-0 py-3 small">
                    <i class="bi bi-plus-circle-fill me-2 text-primary"></i> ${m[0]}
                </button>
            `).join('');
            res.style.display = 'block';
        }

        function addFood(nama, kal, fe) {
            currentMeal.push({ id: Date.now()+Math.random(), nama, kalDasar: kal, feDasar: fe, berat: 100 });
            renderSelected();
            document.getElementById('food-results').style.display = 'none';
            document.getElementById('search-food').value = '';
        }

        function renderSelected() {
            const div = document.getElementById('current-meal-items');
            document.getElementById('selected-list').classList.toggle('d-none', currentMeal.length === 0);
            div.innerHTML = currentMeal.map(item => `
                <div class="premium-card mb-3 border-start border-4 border-primary">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="fw-bold small">${item.nama}</span>
                        <i class="bi bi-trash3 text-danger" onclick="removeFood(${item.id})"></i>
                    </div>
                    <div class="d-flex align-items-center bg-light rounded-3 p-2">
                        <input type="number" class="form-control form-control-sm border-0 bg-transparent text-center fw-bold" 
                               style="width: 70px;" value="${item.berat}" onchange="updateBerat(${item.id}, this.value)">
                        <small class="text-muted ms-1">Gram (g)</small>
                    </div>
                </div>
            `).join('');
        }

        async function hitungGiziFinal() {
            let totalKal = 0; let totalFe = 0;
            currentMeal.forEach(i => {
                totalKal += (i.berat / 100) * i.kalDasar;
                totalFe += (i.berat / 100) * i.feDasar;
            });
            Swal.fire({
                title: 'Simpan Gizi?',
                html: `<div class="p-2"><h2 class="text-primary fw-bold mb-0">${totalKal.toFixed(0)}</h2><small>Total Kkal Terdeteksi</small></div>`,
                showCancelButton: true, confirmButtonText: 'Ya, Simpan', confirmButtonColor: '#00569e'
            }).then(r => { if(r.isConfirmed) saveToDB(totalKal, totalFe); });
        }

        async function saveToDB(k, f) {
            Swal.fire({ title: 'Menyimpan...', didOpen: () => Swal.showLoading() });
            try {
                const data = { action: 'save_gizi', nik: USER_SESSION.nik, kalori: k, fe: f, menu: currentMeal.map(m => m.nama).join(', ') };
                await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(data) });
                Swal.fire({ icon: 'success', title: 'Data Terkirim', timer: 1500, showConfirmButton: false });
                currentMeal = []; renderSelected(); switchPage('app-home');
            } catch (e) { Swal.fire('Error','Gagal Kirim','error'); }
        }

        function handleLogin() {
            const nik = document.getElementById('nik').value;
            const pass = document.getElementById('pass').value;
            const user = DB_FULL.Master_Data_Penduduk.find(r => r[0].toString() === nik && r[1].toString() === pass);
            if(user) {
                USER_SESSION = { nik: user[0].toString(), nama: user[2], role: user[9], kk: user[7].toString() };
                localStorage.setItem('bulo_user', JSON.stringify(USER_SESSION));
                initDashboard(); switchPage('app-home');
            } else { Swal.fire('Gagal','NIK atau Password salah','error'); }
        }

        function updateBerat(id, val) { const item = currentMeal.find(x => x.id === id); if(item) item.berat = parseFloat(val) || 0; }
        function removeFood(id) { currentMeal = currentMeal.filter(x => x.id !== id); renderSelected(); }
        function switchPage(p) { document.querySelectorAll('.page').forEach(pg => pg.style.display = 'none'); document.getElementById(p).style.display = 'flex'; }
        function confirmLogout() { Swal.fire({ title: 'Logout?', showCancelButton: true }).then(r => { if(r.isConfirmed) { localStorage.clear(); location.reload(); } }); }
        function showQR() { Swal.fire({ title: 'ID WARGA', imageUrl: `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${USER_SESSION.nik}` }); }
    </script>
</body>
</html>
