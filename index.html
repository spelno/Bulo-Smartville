<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bulo Smartville v14.1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --main-blue: #00569e; 
            --dark-blue: #003d70; 
            --bg-gray: #f8f9fa;
            --vh: 1vh;
        }
        
        html, body { 
            height: 100vh; height: calc(var(--vh, 1vh) * 100);
            overflow: hidden; background: white; 
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; 
            position: fixed; width: 100%;
        }

        /* SPLASH SCREEN (Ala Facebook) */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10000;
            transition: opacity 0.6s ease-in-out;
        }
        .splash-logo { width: 140px; height: auto; margin-bottom: 20px; }
        .splash-footer { 
            position: absolute; bottom: 50px; text-align: center;
            color: #666; font-size: 0.75rem; letter-spacing: 1.5px; font-weight: bold;
        }

        .page { display: none; height: 100%; width: 100%; flex-direction: column; background: var(--bg-gray); }

        /* LOGIN PAGE */
        .login-logo { width: 120px; height: 120px; object-fit: contain; margin-bottom: 25px; }

        .top-header { 
            background: linear-gradient(135deg, var(--main-blue), var(--dark-blue)); 
            color: white; padding: 25px 20px; 
            border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; 
            flex-shrink: 0; 
        }

        .content-area { 
            flex: 1; overflow-y: auto; padding: 20px; 
            padding-bottom: 110px; -webkit-overflow-scrolling: touch; 
        }

        .info-card { 
            background: white; border-radius: 18px; 
            margin-top: -45px; padding: 22px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
        }

        .bottom-nav { 
            height: 85px; background: white; border-top: 1px solid #ddd; 
            display: flex; justify-content: space-around; align-items: center; 
            padding-bottom: env(safe-area-inset-bottom);
            position: absolute; bottom: 0; width: 100%; z-index: 100;
        }

        .nav-link { text-align: center; color: #999; text-decoration: none; font-size: 0.7rem; }
        .nav-link.active { color: var(--main-blue); font-weight: bold; }

        .btn-qr { 
            width: 60px; height: 60px; background: var(--main-blue); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            color: white; font-size: 1.5rem; margin-top: -50px; 
            border: 5px solid var(--bg-gray); box-shadow: 0 4px 12px rgba(0,86,158,0.3);
        }
    </style>
</head>
<body onload="fetchAndInit()">

    <div id="splash-screen">
        <img src="https://upload.wikimedia.org/wikipedia/id/d/de/Logo_Universitas_Muhammadiyah_Manado.png" class="splash-logo" alt="UNIMMAN">
        <div class="spinner-border text-primary border-width-2 mb-3" style="width: 1.2rem; height: 1.2rem;"></div>
        <div class="splash-footer">UNIVERSITAS MUHAMMADIYAH MANADO</div>
    </div>

    <div id="login-screen" class="page" style="justify-content:center; align-items:center;">
        <div class="w-100 p-4 text-center" style="max-width: 400px;">
            <img src="Logo_Bulo.png" class="login-logo" alt="Logo Bulo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/609/609803.png'">
            <h2 class="fw-bold text-primary mb-1">Bulo Smartville</h2>
            <p class="text-muted small mb-5">Digitalisasi Desa Pilot Bulo</p>
            
            <div class="mb-3">
                <input type="number" id="nik" class="form-control form-control-lg rounded-pill border-0 bg-light px-4" placeholder="NIK">
            </div>
            <div class="mb-4">
                <input type="password" id="pass" class="form-control form-control-lg rounded-pill border-0 bg-light px-4" placeholder="Password">
            </div>
            
            <button onclick="handleLogin()" class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-sm">LOG IN</button>
            <p class="mt-5 small text-muted">Notes of OD &copy; 2026</p>
        </div>
    </div>

    <div id="app-home" class="page">
        <div class="top-header">
            <div class="d-flex justify-content-between align-items-center">
                <div><small class="opacity-75">Selamat Datang,</small><h5 class="mb-0 fw-bold" id="user-display">User</h5></div>
                <i class="bi bi-box-arrow-right fs-4" onclick="confirmLogout()"></i>
            </div>
        </div>
        <div class="content-area">
            <div class="info-card">
                <small class="text-muted fw-bold">SALDO BANK SAMPAH</small>
                <h1 class="text-primary fw-bold mb-0" id="info-saldo">Rp 0</h1>
            </div>
            <div class="row g-3 mt-3">
                <div class="col-4"><div class="p-3 bg-white rounded-4 shadow-sm text-center" onclick="switchPage('app-gizi')">🥗<br><small class="fw-bold">Gizi</small></div></div>
                <div class="col-4"><div class="p-3 bg-white rounded-4 shadow-sm text-center">♻️<br><small class="fw-bold">Sampah</small></div></div>
                <div class="col-4"><div class="p-3 bg-white rounded-4 shadow-sm text-center">🏢<br><small class="fw-bold">Desa</small></div></div>
            </div>
        </div>
        <div class="bottom-nav">
            <a href="javascript:void(0)" onclick="switchPage('app-home')" class="nav-link active"><i class="bi bi-house-door-fill fs-3"></i><br>Beranda</a>
            <div onclick="showQR()"><div class="btn-qr"><i class="bi bi-qr-code-scan"></i></div></div>
            <a href="javascript:void(0)" onclick="switchPage('app-gizi')" class="nav-link"><i class="bi bi-heart-pulse-fill fs-3"></i><br>Kesehatan</a>
        </div>
    </div>

    <div id="app-gizi" class="page">
        <div class="top-header">
            <div class="d-flex align-items-center"><i class="bi bi-chevron-left fs-4 me-3" onclick="switchPage('app-home')"></i><h5 class="mb-0 fw-bold">Hitung Gizi</h5></div>
        </div>
        <div class="content-area">
            <ul class="nav nav-pills nav-fill mb-3 bg-white p-1 rounded-pill shadow-sm">
                <li class="nav-item"><a class="nav-link active rounded-pill" id="tab-manual" href="javascript:void(0)" onclick="toggleGiziMode('manual')">Manual</a></li>
                <li class="nav-item"><a class="nav-link rounded-pill" id="tab-ai" href="javascript:void(0)" onclick="toggleGiziMode('ai')">Foto AI</a></li>
            </ul>

            <div id="mode-manual">
                <div class="card border-0 shadow-sm rounded-4 p-3 mb-3">
                    <input type="text" id="search-food" class="form-control rounded-pill bg-light border-0 px-3" placeholder="Pilih menu..." onkeyup="filterFood()">
                    <div id="food-results" class="list-group mt-2 shadow-sm" style="display:none;"></div>
                </div>
            </div>

            <div id="mode-ai" style="display:none">
                <div class="card border-0 shadow-sm rounded-4 p-4 text-center">
                    <i class="bi bi-camera fs-1 text-primary mb-3"></i>
                    <input type="file" id="camera-input" accept="image/*" capture="environment" class="d-none" onchange="processAIPhoto(this)">
                    <button onclick="document.getElementById('camera-input').click()" class="btn btn-outline-primary rounded-pill w-100 py-2">Ambil Foto Piring</button>
                    <div id="ai-loading" class="mt-3 d-none"><div class="spinner-border spinner-border-sm text-primary"></div><br><small>Menganalisis...</small></div>
                </div>
            </div>

            <div id="selected-list" class="mt-4 d-none">
                <h6 class="fw-bold px-2 small">Menu Hari Ini:</h6>
                <div id="current-meal-items"></div>
                <button onclick="hitungGiziFinal()" class="btn btn-primary w-100 mt-3 rounded-pill shadow-sm fw-bold py-3">HITUNG & SIMPAN</button>
            </div>
        </div>
    </div>

    <script>
        const GEMINI_API_KEY = "AIzaSyDmKncTTBgqbtPrFgoGyVL8l-SxJzoryco"; 
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw6CKdpyg71G1jUBN5EyZWDyqsVzqUYqElkpE1XH3fh-cbiMfEjFvhxKubK-dJI74pb7A/exec"; 

        let DB_FULL = null; let USER_SESSION = null; let currentMeal = [];

        function setRealHeight() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        window.addEventListener('resize', setRealHeight); setRealHeight();

        async function fetchAndInit() {
            try {
                const response = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'read_all' }) });
                const result = await response.json();
                if(result.status === 'success') {
                    DB_FULL = result.db;
                    // Durasi Splash Screen
                    setTimeout(() => {
                        const splash = document.getElementById('splash-screen');
                        splash.style.opacity = '0';
                        setTimeout(() => {
                            splash.style.display = 'none';
                            const saved = localStorage.getItem('bulo_user');
                            if(saved) {
                                USER_SESSION = JSON.parse(saved);
                                initDashboard(); switchPage('app-home');
                            } else { switchPage('login-screen'); }
                        }, 600);
                    }, 2500);
                }
            } catch (e) { Swal.fire('Error','Koneksi Gagal','error'); }
        }

        // --- GIZI LOGIC DENGAN BERAT ---
        function addFood(nama, kal, fe) {
            currentMeal.push({ id: Date.now()+Math.random(), nama, kalDasar: kal, feDasar: fe, berat: 100 });
            renderSelected();
            document.getElementById('food-results').style.display = 'none';
            document.getElementById('search-food').value = '';
        }

        function updateBerat(id, val) {
            const item = currentMeal.find(x => x.id === id);
            if(item) item.berat = parseFloat(val) || 0;
        }

        function renderSelected() {
            const div = document.getElementById('current-meal-items');
            document.getElementById('selected-list').classList.toggle('d-none', currentMeal.length === 0);
            div.innerHTML = currentMeal.map(item => `
                <div class="card border-0 shadow-sm mb-2 rounded-4 p-3 bg-white border-start border-4 border-primary">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="fw-bold small">${item.nama}</span>
                        <i class="bi bi-trash text-danger" onclick="removeFood(${item.id})"></i>
                    </div>
                    <div class="input-group input-group-sm">
                        <span class="input-group-text border-0 bg-light small">Berat (Gram)</span>
                        <input type="number" class="form-control border-0 bg-light text-center fw-bold" value="${item.berat}" onchange="updateBerat(${item.id}, this.value)">
                    </div>
                </div>
            `).join('');
        }

        async function hitungGiziFinal() {
            let totalKal = 0; let totalFe = 0;
            currentMeal.forEach(i => {
                totalKal += (i.berat / 100) * i.kalDasar;
                totalFe += (i.berat / 100) * i.feDasar;
            });

            Swal.fire({
                title: 'Hasil Analisis Gizi',
                html: `<h3 class="text-primary fw-bold mb-0">${totalKal.toFixed(0)} kkal</h3><small class="text-muted">Zat Besi: ${totalFe.toFixed(2)} mg</small>`,
                confirmButtonText: 'Simpan Data',
                showCancelButton: true
            }).then(r => { if(r.isConfirmed) saveToDB(totalKal, totalFe); });
        }

        async function saveToDB(k, f) {
            Swal.fire({ title: 'Menyimpan...', didOpen: () => Swal.showLoading() });
            try {
                const data = { action: 'save_gizi', nik: USER_SESSION.nik, kalori: k, fe: f, menu: currentMeal.map(m => m.nama).join(', ') };
                await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(data) });
                Swal.fire('Berhasil!', 'Data sudah masuk ke server desa.', 'success');
                currentMeal = []; renderSelected(); switchPage('app-home');
            } catch (e) { Swal.fire('Error','Gagal simpan','error'); }
        }

        // --- SISTEM LOGIN & NAVIGASI ---
        function handleLogin() {
            const nik = document.getElementById('nik').value;
            const pass = document.getElementById('pass').value;
            const user = DB_FULL.Master_Data_Penduduk.find(r => r[0].toString() === nik && r[1].toString() === pass);
            if(user) {
                USER_SESSION = { nik: user[0].toString(), nama: user[2], role: user[9], kk: user[7].toString() };
                localStorage.setItem('bulo_user', JSON.stringify(USER_SESSION));
                initDashboard(); switchPage('app-home');
            } else { Swal.fire('Gagal','NIK atau Password salah','error'); }
        }

        function initDashboard() {
            document.getElementById('user-display').innerText = USER_SESSION.nama;
            const saldo = DB_FULL.sampah_saldo.find(r => r[0].toString() === USER_SESSION.nik);
            if(saldo) { document.getElementById('info-saldo').innerText = `Rp ${parseInt(saldo[2] || 0).toLocaleString()}`; }
        }

        function switchPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.style.display = 'none');
            document.getElementById(p).style.display = 'flex';
        }

        function toggleGiziMode(m) {
            document.getElementById('mode-manual').style.display = m === 'manual' ? 'block' : 'none';
            document.getElementById('mode-ai').style.display = m === 'ai' ? 'block' : 'none';
            document.getElementById('tab-manual').classList.toggle('active', m === 'manual');
            document.getElementById('tab-ai').classList.toggle('active', m === 'ai');
        }

        function filterFood() {
            const q = document.getElementById('search-food').value.toLowerCase();
            const res = document.getElementById('food-results');
            if(q.length < 2) { res.style.display = 'none'; return; }
            const matches = DB_FULL.master_gizi.filter(r => r[0] && r[0].toLowerCase().includes(q));
            res.innerHTML = matches.slice(0, 5).map(m => `<button onclick="addFood('${m[0]}', ${m[1]}, ${m[5]})" class="list-group-item list-group-item-action py-3 small">${m[0]}</button>`).join('');
            res.style.display = 'block';
        }

        async function processAIPhoto(input) {
            if(!input.files[0]) return;
            document.getElementById('ai-loading').classList.remove('d-none');
            const reader = new FileReader();
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                const prompt = `Identifikasi makanan dari daftar ini: ${DB_FULL.master_gizi.map(r=>r[0]).join(', ')}. Balas JSON array namanya saja.`;
                try {
                    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: base64 } }] }] })
                    });
                    const data = await resp.json();
                    const matched = JSON.parse(data.candidates[0].content.parts[0].text.match(/\[.*\]/s)[0]);
                    matched.forEach(n => {
                        const m = DB_FULL.master_gizi.find(r => r[0] === n);
                        if(m) addFood(m[0], m[1], m[5]);
                    });
                    toggleGiziMode('manual');
                } catch (e) { Swal.fire('Limit','AI sedang sibuk, gunakan input manual.','warning'); }
                finally { document.getElementById('ai-loading').classList.add('d-none'); }
            };
            reader.readAsDataURL(input.files[0]);
        }

        function confirmLogout() { Swal.fire({ title: 'Logout?', showCancelButton: true }).then(r => { if(r.isConfirmed) { localStorage.clear(); location.reload(); } }); }
        function removeFood(id) { currentMeal = currentMeal.filter(x => x.id !== id); renderSelected(); }
        function showQR() { Swal.fire({ title: 'QR WARGA', imageUrl: `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${USER_SESSION.nik}` }); }
    </script>
</body>
</html>
