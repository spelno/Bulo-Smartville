<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulo SmartVille - UM Manado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; overflow: hidden; }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .logo-splash { width: 180px; height: auto; margin-bottom: 20px; animation: pulse 2s infinite; }
        .slogan { color: #003d70; font-weight: bold; letter-spacing: 1px; font-size: 0.9rem; text-transform: uppercase; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* --- LOGIN PAGE --- */
        .login-container {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #003d70, #005fa3);
        }
        .login-card {
            background: white; padding: 40px 30px; border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 380px;
            text-align: center;
        }
        .logo-bulo-box { width: 100px; height: 100px; margin: 0 auto 20px auto; display: flex; align-items: center; justify-content: center; }
        .logo-bulo-box img { width: 100%; height: auto; object-fit: contain; }

        .form-control { border-radius: 12px; padding: 12px; border: 1px solid #ddd; }
        .btn-login { background: #003d70; color: white; border-radius: 12px; padding: 12px; width: 100%; font-weight: bold; border: none; transition: 0.3s; }
        .btn-login:hover { background: #00284d; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="Logo_UMMAN.jpg" class="logo-splash" alt="Logo UM Manado" onerror="this.src='https://upload.wikimedia.org/wikipedia/id/8/8e/Logo_Universitas_Muhammadiyah_Manado.png'">
        <div class="slogan">Hebat, Maju Dengan Pesat</div>
        <div class="spinner-border text-primary mt-4" role="status" style="width: 1.5rem; height: 1.5rem;"></div>
    </div>

    <div class="login-container">
        <div class="login-card mx-3">
            <div class="logo-bulo-box">
                <img src="Lobo_Bulo.png" alt="Logo Bulo SmartVille">
            </div>
            
            <h4 class="fw-bold mb-1">Bulo SmartVille</h4>
            <p class="text-muted small mb-4">Layanan Digital Desa Bulo</p>

            <div class="text-start">
                <label class="small fw-bold mb-1">NIK</label>
                <input type="number" id="nik" class="form-control mb-3" placeholder="Masukkan NIK" autocomplete="off">
                
                <label class="small fw-bold mb-1">Password</label>
                <input type="password" id="pass" class="form-control mb-4" placeholder="******">

                <button class="btn-login" onclick="prosesLogin()">MASUK KE SISTEM</button>
            </div>
            <div class="mt-4 text-center">
                <small class="text-muted">Universitas Muhammadiyah Manado &copy; 2026</small>
            </div>
        </div>
    </div>

    <script>
        // MASUKKAN URL WEB APP HASIL DEPLOY TERBARU BAPAK DI SINI
        const API_URL = "https://script.google.com/macros/s/AKfycbySusZZRIimRjp3oZE00UwTkwqlZTcWDEOtBuQGeRIww7vaiC0seFGmq4xn6hDgVS8ldg/exec"; 

        // Fungsi Transisi Splash Screen (3 Detik)
        window.onload = () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => { splash.style.display = 'none'; }, 800);
            }, 3000);
        };

        async function prosesLogin() {
            const nikInput = document.getElementById('nik').value;
            const passInput = document.getElementById('pass').value;

            if (!nikInput || !passInput) {
                return Swal.fire('Oops!', 'NIK dan Password tidak boleh kosong.', 'warning');
            }

            Swal.fire({
                title: 'Memverifikasi Data...',
                html: 'Mohon tunggu sebentar',
                didOpen: () => { Swal.showLoading(); },
                allowOutsideClick: false
            });

            try {
                // Fetch data dari Google Sheets via API_URL
                const response = await fetch(`${API_URL}?action=get_all_sheets_data`);
                const result = await response.json();
                
                if (result.status === "error") throw new Error(result.message);

                const dataPenduduk = result.data.Master_Data_Penduduk;

                // Verifikasi NIK (Indeks 0) dan Password (Indeks 1)
                const user = dataPenduduk.find(row => 
                    row[0].toString() === nikInput && row[1].toString() === passInput
                );

                if (user) {
                    // Simpan NIK di LocalStorage untuk Dashboard
                    localStorage.setItem('nik_login', user[0]);
                    
                    const role = user[9] ? user[9].toLowerCase() : 'warga';
                    const nama = user[2];

                    Swal.fire({
                        icon: 'success',
                        title: `Halo, ${nama}!`,
                        text: 'Berhasil login ke sistem.',
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        // Pengalihan berdasarkan Role
                        if (role.includes('admin')) {
                            window.location.href = "admin_panel.html";
                        } else if (role.includes('kesehatan')) {
                            window.location.href = "kader_health.html";
                        } else if (role.includes('sampah')) {
                            window.location.href = "kader_sampah.html";
                        } else {
                            window.location.href = "dashboard_warga.html";
                        }
                    });
                } else {
                    Swal.fire('Gagal Login', 'NIK atau Password Anda salah.', 'error');
                }
            } catch (error) {
                console.error(error);
                Swal.fire('Koneksi Gagal', 'Sistem tidak dapat terhubung ke database. Pastikan Web App sudah di-deploy dengan benar.', 'error');
            }
        }
    </script>
</body>
</html>
