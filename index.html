<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bulo Smartville v13.5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --main-blue: #00569e; 
            --dark-blue: #003d70; 
            --bg-gray: #f8f9fa;
        }
        
        /* Memaksa aplikasi Full Screen mengikuti tinggi layar HP dinamis */
        html, body { 
            height: 100dvh; 
            overflow: hidden; 
            background: var(--bg-gray); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            width: 100%;
        }

        .page { 
            display: none; 
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        .top-header { 
            background: linear-gradient(135deg, var(--main-blue), var(--dark-blue)); 
            color: white; padding: 25px 20px; 
            border-bottom-left-radius: 25px; border-bottom-right-radius: 25px;
            flex-shrink: 0;
        }

        /* Area konten yang bisa di-scroll */
        .content-area { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px 20px 100px 20px;
            -webkit-overflow-scrolling: touch; 
        }

        .info-card { 
            background: white; border-radius: 18px; 
            margin-top: -45px; padding: 22px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
        }

        .menu-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 12px; margin-top: 25px; 
        }

        .menu-item { 
            background: white; border-radius: 15px; 
            padding: 15px 5px; text-align: center; 
            font-size: 0.7rem; font-weight: 600; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); 
            border: 1px solid #eee; 
        }

        .bottom-nav { 
            height: 75px; background: white; 
            border-top: 1px solid #ddd; 
            display: flex; justify-content: space-around; align-items: center;
            flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-link { text-align: center; color: #999; text-decoration: none; font-size: 0.7rem; }
        .nav-link.active { color: var(--main-blue); font-weight: bold; }

        .btn-qr { 
            width: 60px; height: 60px; 
            background: var(--main-blue); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            color: white; font-size: 1.5rem; 
            margin-top: -45px; border: 5px solid var(--bg-gray); 
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="app-home" class="page" style="display:flex;">
            <div class="top-header">
                <div><small class="opacity-75">Halo,</small><h5 class="mb-0 fw-bold" id="user-display">Robert</h5></div>
                <button onclick="location.reload()" class="btn btn-sm btn-light rounded-pill position-absolute" style="right:20px; top:30px">Keluar</button>
            </div>
            <div class="content-area">
                <div class="info-card">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="small fw-bold text-muted">BANK SAMPAH</span>
                        <span class="badge rounded-pill bg-success px-3">BUKA</span>
                    </div>
                    <h1 class="fw-bold mb-0 text-primary">Rp 0</h1>
                    <div class="d-flex justify-content-between mt-3 pt-3 border-top small text-muted">
                        <span>Total: <b>0 Kg</b></span>
                        <span>Harga: <b>Rp 3.000/Kg</b></span>
                    </div>
                </div>
                
                <div class="menu-grid">
                    <div class="menu-item" onclick="switchPage('app-gizi')">🥗 Gizi AKG</div>
                    <div class="menu-item">♻️ Sampah</div>
                    <div class="menu-item">📖 Edukasi</div>
                    <div class="menu-item">📊 Statistik</div>
                    <div class="menu-item">🏢 Desa</div>
                </div>
            </div>
            
            <div class="bottom-nav">
                <a href="#" class="nav-link active"><i class="bi bi-house-door-fill fs-3"></i><br>Beranda</a>
                <div class="btn-qr"><i class="bi bi-qr-code-scan"></i></div>
                <a href="#" onclick="switchPage('app-gizi')" class="nav-link"><i class="bi bi-heart-pulse fs-3"></i><br>Kesehatan</a>
            </div>
        </div>

        <div id="app-gizi" class="page">
            <div class="top-header">
                <div class="d-flex align-items-center"><i class="bi bi-chevron-left fs-4 me-3" onclick="switchPage('app-home')"></i><h5 class="mb-0 fw-bold">Hitung Gizi</h5></div>
            </div>
            <div class="content-area">
                <div class="card border-0 shadow-sm rounded-4 p-4 text-center mb-4">
                    <i class="bi bi-camera fs-1 text-primary mb-3"></i>
                    <input type="file" id="camera-input" accept="image/*" capture="environment" class="d-none" onchange="processAIPhoto(this)">
                    <button onclick="document.getElementById('camera-input').click()" class="btn btn-primary rounded-pill w-100 py-2 fw-bold">Ambil Foto Makanan</button>
                    <div id="ai-loading" class="mt-3 d-none"><div class="spinner-border spinner-border-sm text-primary"></div> <small class="ms-2">Menganalisis...</small></div>
                </div>
                
                <div id="list-keluarga-gizi">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // API KEY TERBARU DARI GOOGLE AI STUDIO
        const GEMINI_API_KEY = "AIzaSyDmKncTTBgqbtPrFgoGyVL8l-SxJzoryco";

        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(pageId).style.display = 'flex';
        }

        async function processAIPhoto(input) {
            if(!input.files[0]) return;
            document.getElementById('ai-loading').classList.remove('d-none');
            
            const reader = new FileReader();
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                try {
                    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Sebutkan nama makanan di foto ini. Jawab dengan satu kata saja." }, { inline_data: { mime_type: "image/jpeg", data: base64 } }] }]
                        })
                    });
                    
                    if (!resp.ok) throw new Error("Quota/Network Error");
                    
                    const data = await resp.json();
                    const hasil = data.candidates[0].content.parts[0].text;
                    Swal.fire('Terdeteksi', 'Makanan: ' + hasil, 'success');
                } catch (e) {
                    Swal.fire('Oops', 'AI sedang sibuk (Limit Kuota Gratis). Silakan coba lagi nanti atau input manual.', 'warning');
                } finally {
                    document.getElementById('ai-loading').classList.add('d-none');
                }
            };
            reader.readAsDataURL(input.files[0]);
        }
    </script>
</body>
</html>
