<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bulo Smartville v13.6</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --main-blue: #00569e; --dark-blue: #003d70; --bg-gray: #f8f9fa; }
        html, body { height: 100dvh; overflow: hidden; background: var(--bg-gray); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        .app-container { display: flex; flex-direction: column; height: 100dvh; width: 100%; }
        .page { display: none; flex-direction: column; height: 100%; width: 100%; }
        .top-header { background: linear-gradient(135deg, var(--main-blue), var(--dark-blue)); color: white; padding: 25px 20px; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; flex-shrink: 0; }
        .content-area { flex: 1; overflow-y: auto; padding: 20px 20px 100px 20px; -webkit-overflow-scrolling: touch; }
        .info-card { background: white; border-radius: 18px; margin-top: -45px; padding: 22px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        .bottom-nav { height: 80px; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; align-items: center; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
        .nav-link { text-align: center; color: #999; text-decoration: none; font-size: 0.7rem; }
        .nav-link.active { color: var(--main-blue); font-weight: bold; }
        .btn-qr { width: 60px; height: 60px; background: var(--main-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; margin-top: -45px; border: 5px solid var(--bg-gray); }
    </style>
</head>
<body onload="fetchAndInit()">

    <div class="app-container">
        <div id="app-home" class="page" style="display:flex;">
            <div class="top-header">
                <div><small class="opacity-75">Halo,</small><h5 class="mb-0 fw-bold" id="user-display">User</h5></div>
            </div>
            <div class="content-area">
                <div class="info-card">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="small fw-bold text-muted">BANK SAMPAH</span>
                        <span class="badge rounded-pill bg-success px-3">BUKA</span>
                    </div>
                    <h1 class="fw-bold mb-0 text-primary" id="info-saldo">Rp 0</h1>
                </div>
                <div class="mt-4 d-grid grid-template-columns: repeat(3, 1fr); gap: 10px;" style="display: grid; grid-template-columns: 1fr 1fr 1fr;">
                    <div class="p-3 bg-white rounded-3 shadow-sm text-center" onclick="switchPage('app-gizi')">🥗<br><small>Gizi</small></div>
                    <div class="p-3 bg-white rounded-3 shadow-sm text-center">♻️<br><small>Sampah</small></div>
                    <div class="p-3 bg-white rounded-3 shadow-sm text-center">📊<br><small>Statistik</small></div>
                </div>
            </div>
            <div class="bottom-nav">
                <a href="#" class="nav-link active" onclick="switchPage('app-home')"><i class="bi bi-house-door fs-3"></i><br>Beranda</a>
                <div class="btn-qr" onclick="showQR()"><i class="bi bi-qr-code-scan"></i></div>
                <a href="#" class="nav-link text-danger" onclick="confirmLogout()"><i class="bi bi-box-arrow-right fs-3"></i><br>Keluar</a>
            </div>
        </div>

        <div id="app-gizi" class="page">
            <div class="top-header">
                <div class="d-flex align-items-center"><i class="bi bi-chevron-left fs-4 me-3" onclick="switchPage('app-home')"></i><h5 class="mb-0 fw-bold">Hitung Gizi</h5></div>
            </div>
            <div class="content-area">
                <div class="card border-0 shadow-sm rounded-4 p-3 mb-3">
                    <h6 class="fw-bold small mb-3">Opsi 1: Foto Piring (AI)</h6>
                    <button onclick="document.getElementById('camera-input').click()" class="btn btn-outline-primary w-100 rounded-pill"><i class="bi bi-camera me-2"></i>Ambil Foto</button>
                    <input type="file" id="camera-input" accept="image/*" capture="environment" class="d-none" onchange="processAIPhoto(this)">
                    <div id="ai-loading" class="mt-2 d-none text-center"><div class="spinner-border spinner-border-sm text-primary"></div></div>
                </div>

                <div class="card border-0 shadow-sm rounded-4 p-3">
                    <h6 class="fw-bold small mb-2">Opsi 2: Cari Manual</h6>
                    <input type="text" id="search-food" class="form-control rounded-pill bg-light" placeholder="Ketik menu..." onkeyup="filterFood()">
                    <div id="food-results" class="list-group mt-2" style="display:none"></div>
                </div>

                <div id="selected-list" class="mt-3 d-none">
                    <div id="current-meal-items"></div>
                    <button onclick="hitungGiziFinal()" class="btn btn-primary w-100 mt-2 rounded-pill fw-bold">SIMPAN DATA</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GEMINI_API_KEY = "AIzaSyDmKncTTBgqbtPrFgoGyVL8l-SxJzoryco"; 
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw6CKdpyg71G1jUBN5EyZWDyqsVzqUYqElkpE1XH3fh-cbiMfEjFvhxKubK-dJI74pb7A/exec"; 
        let DB_FULL = null; let USER_SESSION = null; let currentMeal = [];

        async function fetchAndInit() {
            try {
                const response = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'read_all' }) });
                const result = await response.json();
                if(result.status === 'success') {
                    DB_FULL = result.db;
                    const saved = localStorage.getItem('bulo_user');
                    if(saved) { USER_SESSION = JSON.parse(saved); document.getElementById('user-display').innerText = USER_SESSION.nama; }
                }
            } catch (e) { console.error(e); } finally { switchPage('app-home'); }
        }

        function switchPage(p) { document.querySelectorAll('.page').forEach(pg => pg.style.display = 'none'); document.getElementById(p).style.display = 'flex'; }
        
        function filterFood() {
            const q = document.getElementById('search-food').value.toLowerCase();
            const res = document.getElementById('food-results');
            if(q.length < 2) { res.style.display = 'none'; return; }
            const matches = DB_FULL.master_gizi.filter(r => r[0] && r[0].toLowerCase().includes(q));
            res.innerHTML = matches.slice(0, 5).map(m => `<button onclick="addFood('${m[0]}', ${m[1]})" class="list-group-item list-group-item-action small">${m[0]}</button>`).join('');
            res.style.display = 'block';
        }

        function addFood(nama, kal) {
            currentMeal.push({ id: Date.now(), nama, kal });
            renderSelected();
            document.getElementById('food-results').style.display = 'none';
            document.getElementById('search-food').value = '';
        }

        function renderSelected() {
            const div = document.getElementById('current-meal-items');
            document.getElementById('selected-list').classList.toggle('d-none', currentMeal.length === 0);
            div.innerHTML = currentMeal.map(item => `<div class="p-2 mb-2 bg-white border-start border-4 border-primary shadow-sm rounded d-flex justify-content-between"><small>${item.nama}</small><i class="bi bi-x-circle text-danger" onclick="removeFood(${item.id})"></i></div>`).join('');
        }

        function removeFood(id) { currentMeal = currentMeal.filter(x => x.id !== id); renderSelected(); }

        async function processAIPhoto(input) {
            if(!input.files[0]) return;
            document.getElementById('ai-loading').classList.remove('d-none');
            const reader = new FileReader();
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                try {
                    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: "Sebutkan nama makanan di foto ini. Satu kata saja." }, { inline_data: { mime_type: "image/jpeg", data: base64 } }] }] })
                    });
                    const data = await resp.json();
                    if(data.error && data.error.status === "RESOURCE_EXHAUSTED") throw new Error("LIMIT");
                    const hasil = data.candidates[0].content.parts[0].text;
                    addFood(hasil, 0);
                } catch (e) {
                    Swal.fire('Limit AI Harian', 'Batas pencarian AI gratis hari ini sudah habis. Silakan gunakan ketik manual di bawah.', 'info');
                } finally { document.getElementById('ai-loading').classList.add('d-none'); }
            };
            reader.readAsDataURL(input.files[0]);
        }

        function confirmLogout() { Swal.fire({ title: 'Keluar?', showCancelButton: true }).then(r => { if(r.isConfirmed) { localStorage.clear(); location.reload(); } }); }
        function showQR() { Swal.fire({ title: 'ID WARGA', imageUrl: `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${USER_SESSION.nik}` }); }
    </script>
</body>
</html>
