<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 15px; }
    .card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
    .header { border-top: 5px solid #2ecc71; text-align: left; }
    .saldo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .box { padding: 15px; border-radius: 8px; color: white; }
    .timer { font-size: 2rem; font-weight: bold; color: #e74c3c; margin: 10px 0; }
    #loader { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 100; }
  </style>
</head>
<body>

  <div id="loader">Memuat Data Sampah...</div>

  <div class="card header">
    <h2 id="nama" style="margin:0">Nama Warga</h2>
    <small id="nikDisplay" style="color:gray"></small>
  </div>

  <div class="saldo-grid">
    <div class="box" style="background:#27ae60">
      <small>SALDO RP</small><br>
      <b id="saldoRp" style="font-size:1.2rem">Rp 0</b>
    </div>
    <div class="box" style="background:#2980b9">
      <small>TOTAL SAMPAH</small><br>
      <b id="saldoKg" style="font-size:1.2rem">0 Kg</b>
    </div>
  </div>

  <div class="card" style="margin-top:15px">
    <div id="statusTxt" style="font-weight:bold; color:#7f8c8d;">JADWAL BUANG SAMPAH</div>
    <div id="clock" class="timer">00:00:00</div>
    <small id="pesan" style="color:gray"></small>
  </div>

  <div class="card">
    <b>QR ID WARGA</b><br>
    <img id="qr" src="" style="width:150px; margin-top:10px;">
  </div>

  <script>
    const NIK_USER = "<?= nik ?>";

    function jalankanTimer(tgl) {
      setInterval(() => {
        const selisih = tgl - new Date().getTime();
        const h = Math.floor((selisih % 86400000) / 3600000);
        const m = Math.floor((selisih % 3600000) / 60000);
        const s = Math.floor((selisih % 60000) / 1000);
        document.getElementById("clock").innerText = `${h<10?'0':''}${h}:${m<10?'0':''}${m}:${s<10?'0':''}${s}`;
        if (selisih < 0) location.reload();
      }, 1000);
    }

    window.onload = () => {
      if(!NIK_USER) {
        document.body.innerHTML = "<div style='text-align:center;padding:50px;'>Masukkan NIK pada URL</div>";
        return;
      }

      google.script.run.withSuccessHandler(res => {
        if(res.error) { alert(res.error); return; }
        document.getElementById("loader").style.display = "none";
        document.getElementById("nama").innerText = res.warga.nama;
        document.getElementById("nikDisplay").innerText = "NIK: " + NIK_USER;
        document.getElementById("saldoRp").innerText = "Rp " + res.warga.saldo.toLocaleString('id-ID');
        document.getElementById("saldoKg").innerText = res.warga.kg + " Kg";
        document.getElementById("qr").src = res.qr;
        document.getElementById("statusTxt").innerText = res.isWaktunya ? "WAKTUNYA BUANG SAMPAH!" : "BELUM WAKTUNYA";
        document.getElementById("pesan").innerText = res.isWaktunya ? "Segera bawa sampah reguler ke bak." : "Tunggu jadwal buang sampah berikutnya.";
        
        jalankanTimer(res.targetTime);
      }).getDataSampah(NIK_USER);
    };
  </script>
</body>
</html>
