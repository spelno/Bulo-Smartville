<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulo Smartville - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; }
        .login-container { max-width: 400px; margin-top: 100px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-primary { background-color: #007bff; border: none; border-radius: 8px; padding: 10px; }
        .nav-custom { background-color: #ffffff; border-bottom: 1px solid #dee2e6; }
        .hidden { display: none; }
        .status-badge { font-size: 0.8rem; padding: 5px 10px; border-radius: 20px; }
    </style>
</head>
<body>

<nav class="navbar nav-custom px-3 hidden" id="mainNav">
    <span class="navbar-brand fw-bold text-primary">Bulo Smartville</span>
    <div class="d-flex align-items-center">
        <span id="userDisplay" class="me-3 fw-semibold text-secondary"></span>
        <button class="btn btn-outline-danger btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container mt-4">

    <div id="loginSection" class="login-container mx-auto">
        <div class="card p-4">
            <h3 class="text-center fw-bold mb-4">Bulo Smartville</h3>
            <div id="loginAlert" class="alert alert-danger hidden"></div>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label text-secondary">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Masukkan username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-secondary">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Masukkan password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">Masuk ke Sistem</button>
            </form>
            <p class="text-center mt-3 text-muted small">v1.0 - Proyek Gizi & Kebersihan</p>
        </div>
    </div>

    <div id="dashboardKader" class="hidden">
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card p-4">
                    <h5 class="fw-bold mb-3">Pendaftaran Balita Baru</h5>
                    <form id="formBalita">
                        <div class="row g-2">
                            <div class="col-12 mb-2">
                                <input type="number" id="nik_anak" class="form-control" placeholder="NIK Anak (16 Digit)" required>
                            </div>
                            <div class="col-12 mb-2">
                                <input type="number" id="nik_kk" class="form-control" placeholder="NIK Kepala Keluarga" required>
                            </div>
                            <div class="col-12 mb-2">
                                <input type="text" id="nama_anak" class="form-control" placeholder="Nama Lengkap Balita" required>
                            </div>
                            <div class="col-md-6 mb-2">
                                <label class="small text-muted">Tgl Lahir</label>
                                <input type="date" id="tgl_lahir" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-2">
                                <label class="small text-muted">Gender</label>
                                <select id="jenis_kelamin" class="form-select">
                                    <option value="L">Laki-laki</option>
                                    <option value="P">Perempuan</option>
                                </select>
                            </div>
                            <div class="col-12 mb-2">
                                <input type="text" id="wa_ortu" class="form-control" placeholder="No. WhatsApp Ortu (628...)" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success w-100 mt-3 fw-bold">Simpan Data Balita</button>
                    </form>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-4 h-100">
                    <h5 class="fw-bold mb-3">Akses Cepat</h5>
                    <div class="d-grid gap-2">
                        <button class="btn btn-outline-primary p-3">Input Pengukuran Bulanan</button>
                        <button class="btn btn-outline-info p-3">Lapor Kebersihan Lingkungan</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboardKades" class="hidden">
        <div class="row">
            <div class="col-md-4 mb-3">
                <div class="card p-4 text-center bg-primary text-white">
                    <h6 class="small">TOTAL BALITA</h6>
                    <h2 id="totalBalita" class="fw-bold">--</h2>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card p-4 text-center bg-danger text-white">
                    <h6 class="small">STUNTING / KURANG GIZI</h6>
                    <h2 id="totalStunting" class="fw-bold">--</h2>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card p-4 text-center bg-success text-white">
                    <h6 class="small">AREA BERSIH</h6>
                    <h2 class="fw-bold">85%</h2>
                </div>
            </div>
        </div>
        <div class="card p-4 mt-3">
            <h5 class="fw-bold">Peta Gizi Desa Bulo</h5>
            <div class="bg-light p-5 text-center border rounded">Data Grafik Akan Muncul di Sini</div>
        </div>
    </div>

</div>

<script>
    // MASUKKAN URL WEB APP 
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxsu8pRbVu-CShupP0ACEYdydQK7_gNaUfewWJTgeL4biTygJ0YMjEyQoF1-xK_qjpYHg/exec";

    // Handle Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const alert = document.getElementById('loginAlert');

        try {
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', // Penting untuk GAS
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'login', username: user, password: pass })
            });
            
            // Simulasi Login (Karena fetch ke GAS mode no-cors tidak bisa baca body secara langsung tanpa setup khusus)
            // Dalam implementasi nyata, kita butuh penanganan JSONP atau setup CORS di GAS
            const fakeResponse = { status: 'success', data: { role: 'kader', username: user } }; // Testing purposes
            processLogin(fakeResponse);

        } catch (error) {
            alert.innerText = "Terjadi kesalahan koneksi.";
            alert.classList.remove('hidden');
        }
    });

    function processLogin(response) {
        if (response.status === 'success') {
            const user = response.data;
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('mainNav').classList.remove('hidden');
            document.getElementById('userDisplay').innerText = `Role: ${user.role.toUpperCase()}`;

            if (user.role === 'kader') {
                document.getElementById('dashboardKader').classList.remove('hidden');
            } else if (user.role === 'kades') {
                document.getElementById('dashboardKades').classList.remove('hidden');
            }
        }
    }

    function logout() {
        location.reload();
    }
</script>

</body>
</html>
