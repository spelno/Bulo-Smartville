<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulo Smartville</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .card-custom { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        .card-custom:hover { transform: translateY(-5px); }
        .btn-bulo { background: #0047AB; color: white; border-radius: 10px; font-weight: bold; }
        .alarm-card { background: linear-gradient(135deg, #ff4757, #ff6b81); color: white; }
        #app-content { display: none; }
    </style>
</head>
<body>

<div id="login-page" class="container mt-5">
    <div class="card card-custom p-4 mx-auto" style="max-width: 400px;">
        <h2 class="text-center fw-bold text-primary">BULO SMARTVILLE</h2>
        <p class="text-center text-muted small">Desa Digital: Gizi & Lingkungan</p>
        <hr>
        <div class="mb-3"><label>NIK</label><input type="text" id="nik" class="form-control"></div>
        <div class="mb-3"><label>Password</label><input type="password" id="pass" class="form-control"></div>
        <button onclick="login()" class="btn btn-bulo w-100 mt-2">MASUK</button>
    </div>
</div>

<div id="app-content" class="container mt-3 pb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div><h4 id="display-name" class="m-0">--</h4><span id="display-role" class="badge bg-secondary">--</span></div>
        <button onclick="location.reload()" class="btn btn-outline-danger btn-sm">Logout</button>
    </div>

    <div id="alarm-section" class="card card-custom alarm-card p-4 text-center mb-4 d-none">
        <h5>ALARM SAMPAH DUSUN <span id="display-dusun"></span></h5>
        <h1 id="timer" class="display-4 fw-bold">00:00:00</h1>
        <p id="alarm-note">Menunggu jadwal penjemputan...</p>
    </div>

    <div id="menu-area" class="row g-3"></div>

    <div id="content-display" class="mt-4"></div>
</div>

<audio id="audioPlayer"></audio>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwdzoQFImva6U8YAgOgrQIWCDIcR6tl5CzTjFy4DwIaEck1Z54bpQFHrnxcs00Afvm7wA/exec"; 
    let USER = null;
    let MASTER_DATA = null;

    async function login() {
        const nik = document.getElementById('nik').value;
        const pass = document.getElementById('pass').value;
        Swal.fire({title: 'Memproses...', didOpen: () => Swal.showLoading()});

        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({action:'login', nik, password:pass}) }).then(r => r.json());
        
        if(res.status === 'success') {
            USER = res.user;
            Swal.close();
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            initApp();
        } else {
            Swal.fire('Error', res.message, 'error');
        }
    }

    async function initApp() {
        document.getElementById('display-name').innerText = USER.nama;
        document.getElementById('display-role').innerText = USER.role.toUpperCase();
        document.getElementById('display-dusun').innerText = USER.dusun;

        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({action:'get_data', user: USER}) }).then(r => r.json());
        MASTER_DATA = res.data;

        renderMenu();
        if(MASTER_DATA.alarm.length > 0) startAlarm(MASTER_DATA.alarm[0]);
    }

    function renderMenu() {
        let html = '';
        const role = USER.role;

        // Menu Warga & All
        html += `<div class="col-6"><div class="card card-custom p-3 text-center" onclick="viewYouTube()">📹 Edukasi</div></div>`;
        html += `<div class="col-6"><div class="card card-custom p-3 text-center" onclick="viewKalkulator()">🥗 Cek Gizi</div></div>`;
        
        if(role === 'warga') html += `<div class="col-12"><div class="card card-custom p-3 bg-white text-center"><b>Saldo Anda: Rp ${MASTER_DATA.saldo}</b></div></div>`;
        
        // Menu Kader & Admin
        if(['kader','admin','super_admin'].includes(role)) {
            html += `<div class="col-6"><div class="card card-custom p-3 bg-warning text-center" onclick="formGizi()">⚖️ Input Gizi</div></div>`;
            html += `<div class="col-6"><div class="card card-custom p-3 bg-warning text-center" onclick="formSampah()">♻️ Input Sampah</div></div>`;
        }

        // Menu Super Admin / Dosen
        if(role === 'super_admin') {
            html += `<div class="col-12"><div class="card card-custom p-3 bg-dark text-white text-center" onclick="superAdminPanel()">🛠️ Control Panel (Dosen/Mhs)</div></div>`;
        }

        document.getElementById('menu-area').innerHTML = html;
    }

    function startAlarm(cfg) {
        document.getElementById('alarm-section').classList.remove('d-none');
        const jamTarget = cfg[3]; // HH:mm
        const audioUrl = cfg[4];

        setInterval(() => {
            const now = new Date();
            const target = new Date();
            const [h, m] = jamTarget.split(':');
            target.setHours(h, m, 0);

            let diff = target - now;
            if(diff > 0) {
                let hh = Math.floor(diff/3600000);
                let mm = Math.floor((diff%3600000)/60000);
                let ss = Math.floor((diff%60000)/1000);
                document.getElementById('timer').innerText = `${hh}:${mm}:${ss}`;
                
                // TRIGGER 30 MENIT
                if(hh === 0 && mm === 30 && ss === 0) {
                    const player = document.getElementById('audioPlayer');
                    player.src = audioUrl;
                    player.play();
                    Swal.fire('PENGINGAT!', 'Petugas sampah tiba 30 menit lagi!', 'warning');
                }
            } else {
                document.getElementById('timer').innerText = "SELESAI";
            }
        }, 1000);
    }

    // Fungsi tambahan (YouTube, Kalkulator, dll) bisa ditambahkan di sini...
    function viewYouTube() {
        let h = '<h5>Edukasi Mahasiswa</h5>';
        MASTER_DATA.edukasi.forEach(v => {
            h += `<div class="card p-2 mb-2" onclick="window.open('${v[3]}')"><b>${v[2]}</b><br><small>${v[4]}</small></div>`;
        });
        document.getElementById('content-display').innerHTML = h;
    }
</script>
</body>
</html>
