<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulo SmartVille - UM Manado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .logo-splash { width: 180px; height: auto; margin-bottom: 20px; animation: pulse 2s infinite; }
        .slogan { color: #003d70; font-weight: bold; letter-spacing: 1px; font-size: 0.9rem; text-transform: uppercase; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* --- LOGIN PAGE --- */
        .login-container {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #003d70, #005fa3);
        }
        .login-card {
            background: white; padding: 40px 30px; border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 400px;
            text-align: center;
        }
        
        /* LOGO DIPERBESAR (160px) DAN TANPA TEKS BAWAH */
        .logo-bulo-box { 
            width: 160px; 
            height: 160px; 
            margin: 0 auto 30px auto; 
            display: flex; align-items: center; justify-content: center; 
        }
        .logo-bulo-box img { width: 100%; height: auto; object-fit: contain; }

        .form-control { border-radius: 12px; padding: 12px; border: 1px solid #ddd; }
        .btn-login { background: #003d70; color: white; border-radius: 12px; padding: 12px; width: 100%; font-weight: bold; border: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="Logo_UMMAN.jpg" class="logo-splash" alt="Logo UM">
        <div class="slogan">Hebat, Maju Dengan Pesat</div>
    </div>

    <div class="login-container">
        <div class="login-card mx-3">
            <div class="logo-bulo-box">
                <img src="Lobo_Bulo.png" alt="Logo Bulo">
            </div>

            <div class="text-start mt-3">
                <label class="small fw-bold mb-1 text-muted">NIK</label>
                <input type="number" id="nik" class="form-control mb-3" placeholder="Masukkan NIK">
                
                <label class="small fw-bold mb-1 text-muted">Password</label>
                <input type="password" id="pass" class="form-control mb-4" placeholder="******">

                <button class="btn-login" onclick="prosesLogin()">MASUK KE SISTEM</button>
            </div>
        </div>
    </div>

    <script>
        // MASUKKAN URL WEB APP BAPAK DI SINI
        const API_URL = "https://script.google.com/macros/s/AKfycbzVXjDFywiipE5TYG-2fSDXPh3X1mG5O_t3fbccZkX_lHhlg-scq-Ats1LUcUnrDu9Yog/exec"; 

        window.onload = () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => { splash.style.display = 'none'; }, 800);
            }, 3000);
        };

        async function prosesLogin() {
            const nikInput = document.getElementById('nik').value;
            const passInput = document.getElementById('pass').value;

            if (!nikInput || !passInput) return Swal.fire('Oops!', 'Isi NIK dan Password', 'warning');

            Swal.fire({ title: 'Memverifikasi...', didOpen: () => Swal.showLoading() });

            try {
                const response = await fetch(`${API_URL}?action=get_all_sheets_data`);
                const result = await response.json();
                const user = result.data.Master_Data_Penduduk.find(r => r[0].toString() === nikInput && r[1].toString() === passInput);

                if (user) {
                    localStorage.setItem('nik_login', user[0]);
                    const role = user[9].toLowerCase();

                    Swal.fire({ icon: 'success', title: `Halo, ${user[2]}!`, timer: 1500, showConfirmButton: false }).then(() => {
                        // DISESUAIKAN DENGAN ISI REPOSITORY BAPAK
                        if (role.includes('admin')) window.location.href = "admin_panel.html";
                        else if (role.includes('kesehatan')) window.location.href = "kader_kesehatan.html"; 
                        else if (role.includes('sampah')) window.location.href = "kader_sampah.html";
                        else window.location.href = "dashboard_warga.html";
                    });
                } else {
                    Swal.fire('Gagal', 'NIK/Password salah', 'error');
                }
            } catch (e) {
                Swal.fire('Error', 'Pastikan URL API di-deploy ke "Anyone"', 'error');
            }
        }
    </script>
</body>
</html>
