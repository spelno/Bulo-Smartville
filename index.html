<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bulo Smartville v15.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --main-blue: #00569e; --dark-blue: #003d70; --bg-gray: #f4f7f9; }
        html, body { height: 100vh; overflow: hidden; background: white; font-family: 'Segoe UI', sans-serif; margin: 0; }

        /* SPLASH SCREEN - Logo UMMAN */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10000;
            transition: opacity 0.8s ease;
        }
        .splash-logo { 
            width: 180px; opacity: 0; transform: scale(0.7);
            animation: splashIn 1.2s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .splash-text { 
            margin-top: 20px; font-weight: 700; color: var(--main-blue); 
            letter-spacing: 1px; font-size: 0.9rem; opacity: 0;
            animation: fadeIn 1s 0.8s forwards;
        }

        /* LOGIN PAGE - Maksimalisasi Lobo_Bulo.png */
        .login-container { 
            background: white; height: 100vh; display: flex; 
            flex-direction: column; justify-content: center; 
            align-items: center; padding: 30px; 
        }
        .login-logo { 
            /* Diperbesar maksimal namun tetap menjaga whitespace agar estetik */
            width: 85%; max-width: 320px; 
            height: auto; margin-bottom: 10px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.05));
        }
        .slogan-text { 
            color: #555; font-weight: 700; letter-spacing: 1.5px; 
            font-size: 0.75rem; margin-bottom: 50px; text-transform: uppercase;
        }

        /* DASHBOARD ELEMENTS */
        .page { display: none; height: 100%; width: 100%; flex-direction: column; background: var(--bg-gray); }
        .top-header { background: linear-gradient(135deg, var(--main-blue), var(--dark-blue)); color: white; padding: 40px 20px 70px; border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; }
        .profile-slot { width: 50px; height: 50px; background: rgba(255,255,255,0.2); border-radius: 15px; border: 2px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .content-area { flex: 1; overflow-y: auto; padding: 0 20px 140px; margin-top: -45px; }
        .premium-card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.04); border: none; margin-bottom: 15px; }
        
        .bottom-nav { height: 90px; background: white; display: flex; justify-content: space-around; align-items: center; position: absolute; bottom: 0; width: 100%; border-top: 1px solid #eee; padding-bottom: env(safe-area-inset-bottom); }
        .nav-link { text-align: center; color: #bbb; text-decoration: none; font-size: 0.7rem; }
        .nav-link.active { color: var(--main-blue); font-weight: bold; }

        @keyframes splashIn { 0% { opacity: 0; transform: scale(0.5); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onload="fetchAndInit()">

    <div id="splash-screen">
        <img src="Logo_UMMAN.jpg" class="splash-logo" alt="UMMAN">
        <div class="splash-text text-uppercase">Hebat, Maju dengan Pesat</div>
    </div>

    <div id="login-screen" class="page">
        <div class="login-container">
            <img src="Lobo_Bulo.png" class="login-logo" alt="Lobo Bulo">
            <div class="slogan-text">Membangun Desa Lebih Cerdas</div>
            
            <div class="w-100" style="max-width: 320px;">
                <input type="number" id="nik" class="form-control form-control-lg rounded-pill border-0 bg-light px-4 mb-3 shadow-sm" placeholder="NIK Warga">
                <input type="password" id="pass" class="form-control form-control-lg rounded-pill border-0 bg-light px-4 mb-4 shadow-sm" placeholder="Password">
                <button onclick="handleLogin()" class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-lg" style="letter-spacing: 1px;">MASUK</button>
            </div>
            <p class="mt-5 small text-muted opacity-50" style="font-size: 0.6rem;">Notes of OD &copy; 2026</p>
        </div>
    </div>

    <div id="app-home" class="page">
        <div class="top-header">
            <div class="d-flex justify-content-between align-items-center">
                <div><small class="opacity-75">Halo,</small><h5 class="mb-0 fw-bold" id="user-display">Memuat...</h5></div>
                <div class="profile-slot"><i class="bi bi-person-fill text-white fs-4"></i></div>
            </div>
        </div>
        <div class="content-area">
            <div class="row g-3 mb-4 text-center">
                <div class="col-4"><div class="premium-card p-3 mb-0" onclick="switchPage('app-gizi')">🥗<br><small class="fw-bold">Gizi</small></div></div>
                <div class="col-4"><div class="premium-card p-3 mb-0">♻️<br><small class="fw-bold">Sampah</small></div></div>
                <div class="col-4"><div class="premium-card p-3 mb-0">🏢<br><small class="fw-bold">Desa</small></div></div>
            </div>
            <h6 class="fw-bold mb-3 small"><i class="bi bi-people-fill me-2 text-primary"></i>ANGGOTA KELUARGA</h6>
            <div id="family-list"></div>
        </div>
        <div class="bottom-nav">
            <a href="#" class="nav-link active"><i class="bi bi-house-door-fill fs-3"></i><br>Beranda</a>
            <div onclick="showQR()" class="bg-primary text-white rounded-4 p-3 mb-4 shadow-lg"><i class="bi bi-qr-code-scan fs-4"></i></div>
            <a href="#" onclick="confirmLogout()" class="nav-link text-danger"><i class="bi bi-door-open-fill fs-3"></i><br>Keluar</a>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw6CKdpyg71G1jUBN5EyZWDyqsVzqUYqElkpE1XH3fh-cbiMfEjFvhxKubK-dJI74pb7A/exec";
        let DB_FULL = null; let USER_SESSION = null;

        async function fetchAndInit() {
            try {
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'read_all' }) });
                const json = await res.json();
                DB_FULL = json.db;
                setTimeout(() => {
                    const sp = document.getElementById('splash-screen');
                    sp.style.opacity = '0';
                    setTimeout(() => {
                        sp.style.display = 'none';
                        const saved = localStorage.getItem('bulo_user');
                        if(saved) { USER_SESSION = JSON.parse(saved); initDashboard(); switchPage('app-home'); }
                        else switchPage('login-screen');
                    }, 800);
                }, 2800);
            } catch(e) { console.error(e); }
        }

        // Fungsi dashboard & BMI tetap menggunakan logika v14.9 yang stabil
        function initDashboard() {
            document.getElementById('user-display').innerText = USER_SESSION.nama;
            const family = DB_FULL.Master_Data_Penduduk.filter(r => r[7].toString() === USER_SESSION.kk);
            document.getElementById('family-list').innerHTML = family.map(f => {
                const nik = f[0], nama = f[2], tb = f[11] || 0, bb = f[12] || 0, komorbid = f[13] || "";
                return `
                    <div class="premium-card p-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="d-flex align-items-center" onclick="Swal.fire('Info','Gunakan menu update kesehatan','info')">
                                <div class="bg-light rounded-circle p-2 me-3 text-primary"><i class="bi bi-person-fill"></i></div>
                                <div><div class="fw-bold small">${nama}</div><small class="text-muted" style="font-size:0.6rem">${komorbid || 'Sehat'}</small></div>
                            </div>
                            <button class="btn btn-outline-primary btn-sm rounded-pill px-3 fw-bold" style="font-size:0.65rem" onclick="cekStatusBMI('${nama}', ${tb}, ${bb}, '${komorbid}')">STATUS GIZI</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function handleLogin() {
            const nik = document.getElementById('nik').value, pass = document.getElementById('pass').value;
            const user = DB_FULL.Master_Data_Penduduk.find(r => r[0].toString() === nik && r[1].toString() === pass);
            if(user) {
                USER_SESSION = { nik: user[0].toString(), nama: user[2], kk: user[7].toString() };
                localStorage.setItem('bulo_user', JSON.stringify(USER_SESSION));
                initDashboard(); switchPage('app-home');
            } else Swal.fire('Gagal','NIK atau Password salah','error');
        }

        function switchPage(p) { document.querySelectorAll('.page').forEach(pg => pg.style.display='none'); document.getElementById(p).style.display='flex'; }
        function confirmLogout() { localStorage.clear(); location.reload(); }
        function showQR() { Swal.fire('ID Warga', USER_SESSION.nik, 'info'); }
        
        // Fungsi cekStatusBMI tetap sama dengan analisis komplikasi v14.8/14.9
        function cekStatusBMI(nama, tb, bb, komorbid) {
            const m = tb / 100; const bmi = bb / (m * m);
            let status = bmi < 18.5 ? "Kurus" : (bmi >= 25 ? "Obesitas" : "Normal");
            Swal.fire({ title: `Analisis: ${nama}`, html: `<h2 class="fw-bold">${bmi.toFixed(1)}</h2><p>${status}</p><hr><small>${komorbid || 'Tanpa Komplikasi'}</small>` });
        }
    </script>
</body>
</html>
