<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bulo SmartVille</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: linear-gradient(135deg, #2d6a4f, #1b4332); height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .login-card { background: white; padding: 40px 30px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; }
        .logo-app { width: 80px; height: 80px; background: #d8f3dc; border-radius: 20px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 20px; font-size: 2rem; }
        .form-control { border-radius: 12px; padding: 12px; border: 1px solid #ddd; }
        .btn-login { background: #2d6a4f; color: white; border-radius: 12px; padding: 12px; width: 100%; font-weight: bold; border: none; transition: 0.3s; }
        .btn-login:hover { background: #40916c; }
    </style>
</head>
<body>

<div class="login-card mx-3">
    <div class="logo-app">🏘️</div>
    <h4 class="fw-bold">Bulo SmartVille</h4>
    <p class="text-muted small">Silakan login dengan NIK Anda</p>

    <div class="mt-4 text-start">
        <label class="small fw-bold mb-1">NIK</label>
        <input type="number" id="nik" class="form-control mb-3" placeholder="Contoh: 123">
        
        <label class="small fw-bold mb-1">Password</label>
        <input type="password" id="pass" class="form-control mb-4" placeholder="******">

        <button class="btn-login" onclick="prosesLogin()">MASUK KE SISTEM</button>
    </div>
    
    <div class="mt-4">
        <small class="text-muted">Digitalisasi Desa Bulo © 2026</small>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxn-ofE_U0jn7moejYjCHsOFhdpxXlLw-YWA6jW8gDTvPecViEnFRbm_1H1qV7EchGcIA/exec"; // Ganti dengan URL Deploy Bapak

    async function prosesLogin() {
        const nik = document.getElementById('nik').value;
        const pass = document.getElementById('pass').value;

        if (!nik || !pass) return Swal.fire('Oops', 'Isi NIK dan Password!', 'warning');

        Swal.fire({ title: 'Memverifikasi...', didOpen: () => Swal.showLoading() });

        try {
            // Kita ambil data penduduk untuk cek login
            const res = await fetch(`${API_URL}?action=get_all_sheets_data`);
            const json = await res.json();
            const data = json.data.Master_Data_Penduduk;

            // Cari user berdasarkan NIK (Indeks 0) dan Password (Indeks 1)
            const user = data.find(r => r[0].toString() === nik && r[1].toString() === pass);

            if (user) {
                const role = user[9].toLowerCase(); // Indeks 9 adalah ROLE
                const nama = user[2];

                Swal.fire({
                    icon: 'success',
                    title: `Halo, ${nama}!`,
                    text: `Anda masuk sebagai ${user[9]}`,
                    timer: 1500,
                    showConfirmButton: false
                }).then(() => {
                    // ARAHKAN BERDASARKAN ROLE
                    if (role.includes('admin')) {
                        window.location.href = "admin_panel.html";
                    } else if (role.includes('kesehatan')) {
                        window.location.href = "kader_health.html";
                    } else if (role.includes('sampah')) {
                        window.location.href = "kader_sampah.html";
                    } else {
                        window.location.href = "dashboard_warga.html";
                    }
                });
            } else {
                Swal.fire('Gagal', 'NIK atau Password salah!', 'error');
            }
        } catch (e) {
            Swal.fire('Error', 'Masalah koneksi database', 'error');
        }
    }
</script>

</body>
</html>
