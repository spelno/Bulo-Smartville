<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bulo Smartville v11.2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --main-blue: #00569e; --dark-blue: #003d70; --bg-gray: #f8f9fa; }
        html, body { height: 100%; overflow: hidden; background: var(--bg-gray); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        .page { display: none; height: 100vh; width: 100%; position: absolute; top: 0; left: 0; flex-direction: column; }
        .top-header { background: linear-gradient(135deg, var(--main-blue), var(--dark-blue)); color: white; padding: 25px 20px; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; flex-shrink: 0; position: relative; z-index: 10; }
        .content-area { flex-grow: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
        .info-card { background: white; border-radius: 18px; margin-top: -45px; padding: 22px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); position: relative; z-index: 11; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 25px; }
        .menu-item { background: white; border-radius: 18px; padding: 18px 5px; text-align: center; font-size: 0.75rem; font-weight: 600; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 1px solid #eee; }
        .bottom-nav { height: 75px; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; align-items: center; flex-shrink: 0; }
        .nav-link { text-align: center; color: #999; text-decoration: none; font-size: 0.7rem; }
        .nav-link.active { color: var(--main-blue); font-weight: bold; }
        .btn-qr { width: 65px; height: 65px; background: var(--main-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.8rem; margin-top: -45px; border: 6px solid var(--bg-gray); box-shadow: 0 5px 15px rgba(0,86,158,0.3); }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner-border text-primary mb-3"></div>
        <small class="text-muted fw-bold">Menyinkronkan Data Desa...</small>
    </div>

    <div id="login-screen" class="page">
        <div class="w-100 p-4 text-center" style="max-width: 400px; margin: auto;">
            <h2 class="fw-bold text-primary mb-1">Bulo Smartville</h2>
            <p class="text-muted small mb-5">Digitalisasi Desa Pilot Bulo</p>
            <input type="number" id="nik" class="form-control form-control-lg rounded-pill mb-3 border-0 bg-light px-4" placeholder="NIK">
            <input type="password" id="pass" class="form-control form-control-lg rounded-pill mb-4 border-0 bg-light px-4" placeholder="Password">
            <button onclick="handleLogin()" class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-sm" style="background: var(--main-blue);">LOG IN</button>
        </div>
    </div>

    <div id="app-home" class="page">
        <div class="top-header">
            <div><small class="opacity-75">Halo,</small><h5 class="mb-0 fw-bold" id="user-display">User</h5></div>
            <button onclick="confirmLogout()" class="btn btn-sm btn-light rounded-pill position-absolute" style="right:20px; top:30px">Keluar</button>
        </div>
        <div class="content-area">
            <div class="info-card">
                <div class="d-flex justify-content-between mb-2">
                    <span class="small fw-bold text-muted">TABUNGAN SAMPAH</span>
                    <span id="trash-status" class="badge rounded-pill bg-success px-3">BUKA</span>
                </div>
                <h1 class="fw-bold mb-0 text-primary" id="info-saldo">Rp 0</h1>
                <div class="d-flex justify-content-between mt-3 pt-3 border-top small text-muted">
                    <span>Total: <b id="info-kg">0 Kg</b></span>
                    <span>Harga: <b id="info-harga">Rp 3.000/Kg</b></span>
                </div>
            </div>
            <div class="menu-grid">
                <div class="menu-item" onclick="switchPage('app-gizi')"><span class="menu-icon">🥗</span>Gizi AKG</div>
                <div class="menu-item" onclick="switchPage('app-sampah')"><span class="menu-icon">♻️</span>Sampah</div>
                <div class="menu-item"><span class="menu-icon">📖</span>Edukasi</div>
                <div class="menu-item"><span class="menu-icon">📊</span>Statistik</div>
                <div class="menu-item"><span class="menu-icon">🏢</span>Desa</div>
            </div>
        </div>
        <div class="bottom-nav">
            <a href="#" onclick="switchPage('app-home')" class="nav-link active"><i class="bi bi-house-door-fill fs-3"></i><br>Home</a>
            <div onclick="showQR()"><div class="btn-qr"><i class="bi bi-qr-code-scan"></i></div></div>
            <a href="#" onclick="confirmLogout()" class="nav-link"><i class="bi bi-box-arrow-right fs-3"></i><br>Logout</a>
        </div>
    </div>

    <div id="app-gizi" class="page">
        <div class="top-header">
            <div class="d-flex align-items-center"><i class="bi bi-chevron-left fs-4 me-3" onclick="switchPage('app-home')"></i><h5 class="mb-0 fw-bold">Kalkulator Gizi</h5></div>
        </div>
        <div class="content-area">
            <div class="card border-0 shadow-sm rounded-4 p-3">
                <p class="small text-muted mb-3">Anggota Keluarga (KK: <span id="kk-display"></span>):</p>
                <div id="list-keluarga-gizi"></div>
            </div>
        </div>
    </div>

    <div id="app-sampah" class="page">
        <div class="top-header">
            <div class="d-flex align-items-center"><i class="bi bi-chevron-left fs-4 me-3" onclick="switchPage('app-home')"></i><h5 class="mb-0 fw-bold">Detail Sampah</h5></div>
        </div>
        <div class="content-area">
            <div class="info-card mt-0 shadow-sm mb-4 text-center">
                <p class="small text-muted mb-1">Saldo Tabungan</p>
                <h2 class="fw-bold text-success" id="detail-saldo">Rp 0</h2>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw6CKdpyg71G1jUBN5EyZWDyqsVzqUYqElkpE1XH3fh-cbiMfEjFvhxKubK-dJI74pb7A/exec"; 
        let DB_FULL = null;
        let USER_SESSION = null;

        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            const target = document.getElementById(pageId);
            if(target) {
                target.style.display = 'flex';
                if(pageId === 'app-gizi') renderGiziList();
                if(pageId === 'app-home') initDashboard();
            }
        }

        async function fetchAndInit() {
            try {
                const response = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'read_all' }) });
                const result = await response.json();
                if(result.status === 'success') {
                    DB_FULL = result.db;
                    const saved = localStorage.getItem('bulo_user');
                    if(saved) {
                        USER_SESSION = JSON.parse(saved);
                        initDashboard();
                        switchPage('app-home');
                    } else {
                        switchPage('login-screen');
                    }
                }
            } catch (e) {
                Swal.fire('Error', 'Koneksi Gagal', 'error');
            } finally {
                document.getElementById('loading-overlay').style.display = 'none';
            }
        }

        function handleLogin() {
            const nikIn = document.getElementById('nik').value.trim();
            const passIn = document.getElementById('pass').value.trim();
            const user = DB_FULL.Master_Data_Penduduk.find(r => r[0].toString() === nikIn && r[1].toString() === passIn);
            if(user) {
                USER_SESSION = { nik: user[0].toString(), nama: user[2], kk: user[7].toString() };
                localStorage.setItem('bulo_user', JSON.stringify(USER_SESSION));
                initDashboard();
                switchPage('app-home');
            } else {
                Swal.fire('Gagal', 'NIK atau Password salah.', 'error');
            }
        }

        function initDashboard() {
            if(!USER_SESSION) return;
            document.getElementById('user-display').innerText = USER_SESSION.nama;
            document.getElementById('kk-display').innerText = USER_SESSION.kk;
            
            const settings = DB_FULL.sampah_pengaturan;
            const harga = settings.find(r => r[0] === 'Harga_Beli_Warga')[1];
            document.getElementById('info-harga').innerText = `Rp ${parseInt(harga).toLocaleString()}/Kg`;

            const saldo = DB_FULL.sampah_saldo.find(r => r[0].toString() === USER_SESSION.nik);
            if(saldo) {
                const fmt = `Rp ${parseInt(saldo[2] || 0).toLocaleString()}`;
                document.getElementById('info-saldo').innerText = fmt;
                document.getElementById('detail-saldo').innerText = fmt;
                document.getElementById('info-kg').innerText = `${saldo[3] || 0} Kg`;
            }
        }

        function renderGiziList() {
            const keluarga = DB_FULL.Master_Data_Penduduk.filter(r => r[7].toString() === USER_SESSION.kk);
            document.getElementById('list-keluarga-gizi').innerHTML = keluarga.map(k => `
                <div class="d-flex justify-content-between align-items-center p-3 border-bottom">
                    <div><b>${k[2]}</b><br><small class="text-muted">${k[5]}</small></div>
                    <button onclick="cekAKG('${k[0]}')" class="btn btn-sm btn-primary rounded-pill px-3">Cek AKG</button>
                </div>
            `).join('');
        }

        function cekAKG(nik) {
            const penduduk = DB_FULL.Master_Data_Penduduk.find(r => r[0].toString() === nik);
            // Ambil data pengukuran terbaru dari sheet pengukuran_gizi (Kolom D adalah BB)
            const listUkur = DB_FULL.pengukuran_gizi.filter(r => r[1].toString() === nik);
            const ukurTerakhir = listUkur.length > 0 ? listUkur[listUkur.length - 1] : null;

            const tb = parseFloat(penduduk[12]) || 0; 
            const bb = ukurTerakhir ? parseFloat(ukurTerakhir[3]) : 0;
            const tglUkur = ukurTerakhir ? ukurTerakhir[2] : "-";

            if (tb <= 0 || bb <= 0) {
                Swal.fire('Data Kosong', `Data pengukuran terbaru untuk ${penduduk[2]} tidak ditemukan.`, 'warning');
                return;
            }

            const imt = (bb / ((tb/100) * (tb/100))).toFixed(1);
            let status = "Normal"; let warna = "#198754";
            if(imt < 18.5) { status = "Gizi Kurang"; warna = "#ffc107"; }
            else if(imt >= 25) { status = "Obesitas"; warna = "#dc3545"; }

            Swal.fire({
                title: 'Kalkulator Gizi Checkpoint',
                html: `
                    <div class="p-3 text-white rounded-4 mb-3" style="background:${warna}">
                        <h4 class="fw-bold mb-0">${status}</h4>
                        <small>IMT: ${imt}</small>
                    </div>
                    <div class="text-start small p-2 bg-light rounded-3">
                        <p class="mb-1"><b>Tinggi Badan:</b> ${tb} cm</p>
                        <p class="mb-1"><b>Berat Badan:</b> ${bb} kg</p>
                        <p class="mb-0 text-muted"><i>Terakhir diukur: ${tglUkur}</i></p>
                    </div>
                `,
                confirmButtonColor: '#00569e'
            });
        }

        function showQR() {
            Swal.fire({ title: 'ID DIGITAL', imageUrl: `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${USER_SESSION.nik}` });
        }

        function confirmLogout() {
            localStorage.clear();
            location.reload();
        }

        window.onload = fetchAndInit;
    </script>
</body>
</html>
