<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
    .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 4px solid #3498db; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .stat { padding: 15px; border-radius: 10px; color: white; text-align: center; }
    .timer { font-size: 1.8rem; font-weight: bold; color: #e74c3c; margin: 10px 0; }
    #loader { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 100; }
  </style>
</head>
<body>

  <div id="loader">Sinkronisasi Data...</div>

  <div class="card">
    <h2 id="name" style="margin:0">-</h2>
    <p id="info" style="color:gray; margin:5px 0; font-size:0.9rem"></p>
    <b style="color:#2e7d32">Status Gizi: <span id="gizi">-</span></b>
  </div>

  <div class="grid">
    <div class="stat" style="background:#2ecc71">
      <small>SALDO TUNAI</small><br><b id="rp">Rp 0</b>
    </div>
    <div class="stat" style="background:#3498db">
      <small>TABUNGAN KG</small><br><b id="kg">0 Kg</b>
    </div>
  </div>

  <div class="card" style="text-align:center">
    <div id="statusLabel" style="font-weight:bold; color:#7f8c8d;">JADWAL SAMPAH</div>
    <div id="clock" class="timer">00:00:00</div>
  </div>

  <div class="card" style="text-align:center">
    <b>ID DIGITAL WARGA</b><br>
    <img id="qrImg" src="" style="width:160px; margin-top:10px; border:1px solid #eee;">
  </div>

  <script>
    /** * PETUNJUK: 
     * 1. Deploy script ini (Deploy > New Deployment).
     * 2. Salin URL Web App yang muncul.
     * 3. Tempel URL tersebut di dalam tanda kutip di bawah ini.
     */
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyDcs2h7s1SCzYsbuht8QCI4_BrBzVvwXuC7Nj5ke0QM2uX9kX-K2JomNHPoNaumIPo/exec"; 
    const NIK_WARGA = "<?= nik ?>";

    function startTimer(target) {
      setInterval(() => {
        const diff = target - new Date().getTime();
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        document.getElementById("clock").innerText = `${h<10?'0':''}${h}:${m<10?'0':''}${m}:${s<10?'0':''}${s}`;
        if (diff < 0) location.reload();
      }, 1000);
    }

    window.onload = () => {
      if(!NIK_WARGA) {
        document.body.innerHTML = "<div style='text-align:center;padding:50px;'>Akses Ditolak. Gunakan Link NIK Resmi.</div>";
        return;
      }

      google.script.run.withSuccessHandler(data => {
        if(data.error) { document.body.innerHTML = data.error; return; }
        
        document.getElementById("loader").style.display = "none";
        document.getElementById("name").innerText = data.profile.nama;
        document.getElementById("info").innerText = "Dusun " + data.profile.dusun + " | NIK: " + NIK_WARGA;
        document.getElementById("gizi").innerText = data.profile.statusGizi;
        document.getElementById("rp").innerText = "Rp " + data.trash.saldo.toLocaleString('id-ID');
        document.getElementById("kg").innerText = data.trash.kg + " Kg";
        document.getElementById("qrImg").src = data.qr;
        document.getElementById("statusLabel").innerText = data.isBuang ? "WAKTUNYA BUANG SAMPAH!" : "BELUM WAKTUNYA";
        
        startTimer(data.targetTime);
      }).getFullDashboardData(NIK_WARGA);
    };
  </script>
</body>
</html>
