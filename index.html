<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulo SmartVille - Universitas Muhammadiyah Manado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; overflow: hidden; }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .logo-splash { width: 180px; height: auto; margin-bottom: 20px; animation: pulse 2s infinite; }
        .slogan-um { color: #003d70; font-weight: bold; letter-spacing: 1px; font-size: 0.9rem; text-transform: uppercase; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* --- LOGIN PAGE (DESAIN KEKINIAN) --- */
        .login-container {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #003d70, #005fa3);
        }
        .login-card {
            background: white; padding: 50px 40px; border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3); width: 100%; max-width: 420px;
            text-align: center;
        }
        
        /* LOGO DI-CONTAINER AGAR ESTETIK & DIPERBESAR */
        .logo-bulo-container { 
            width: 170px; /* Diperbesar sesuai permintaan */
            height: 170px; /* Diperbesar sesuai permintaan */
            margin: 0 auto 10px auto; 
            display: flex; align-items: center; justify-content: center; 
        }
        .logo-bulo-container img { width: 100%; height: auto; object-fit: contain; }
        
        /* SLOGAN APLIKASI (EDITORIAL STYLE) */
        .slogan-aplikasi { 
            font-size: 0.85rem; 
            color: #6c757d; 
            letter-spacing: 0.5px; 
            margin-bottom: 35px; /* Spasi bawah diperlebar */
            font-weight: 300;
            font-style: italic;
        }

        .form-control { border-radius: 15px; padding: 14px; border: 1px solid #ddd; background: #f9f9f9; }
        .btn-login { background: #003d70; color: white; border-radius: 15px; padding: 14px; width: 100%; font-weight: bold; border: none; margin-top: 15px; transition: 0.3s; }
        .btn-login:hover { background: #00284d; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .footer-logo { font-size: 0.75rem; color: #aaa; margin-top: 25px; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="Logo_UMMAN.jpg" class="logo-splash" alt="Logo UM">
        <div class="slogan-um">Hebat, Maju Dengan Pesat</div>
        <div class="spinner-border text-primary mt-4" role="status" style="width: 1.5rem; height: 1.5rem;"></div>
    </div>

    <div class="login-container">
        <div class="login-card mx-3">
            <div class="logo-bulo-container">
                <img src="Lobo_Bulo.png" alt="Logo Bulo SmartVille">
            </div>
            
            <div class="slogan-aplikasi">"Inovasi Desa, Untuk Kesejahteraan Rakyat"</div>

            <div class="text-start">
                <label class="small fw-bold mb-1 text-muted">NIK</label>
                <input type="number" id="nik" class="form-control mb-3" placeholder="Masukkan NIK" autocomplete="off">
                
                <label class="small fw-bold mb-1 text-muted">Password</label>
                <input type="password" id="pass" class="form-control mb-4" placeholder="******">

                <button class="btn-login" onclick="prosesLogin()">MASUK KE SISTEM</button>
            </div>
            
            <div class="footer-logo">Universitas Muhammadiyah Manado &copy; 2026</div>
        </div>
    </div>

    <script>
        // MASUKKAN URL WEB APP DEPLOY TERBARU BAPAK DI SINI
        const API_URL = "https://script.google.com/macros/s/AKfycbzVXjDFywiipE5TYG-2fSDXPh3X1mG5O_t3fbccZkX_lHhlg-scq-Ats1LUcUnrDu9Yog/exec"; 

        // Fungsi Transisi Splash Screen (3 Detik)
        window.onload = () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => { splash.style.display = 'none'; }, 800);
            }, 3000);
        };

        async function prosesLogin() {
            const nikInput = document.getElementById('nik').value;
            const passInput = document.getElementById('pass').value;

            if (!nikInput || !passInput) return Swal.fire('Oops!', 'Isi NIK dan Password', 'warning');

            Swal.fire({ title: 'Memverifikasi Data...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });

            try {
                // Fetch data dari Google Sheets via API_URL
                const response = await fetch(`${API_URL}?action=get_all_sheets_data`);
                const result = await response.json();
                
                if (result.status === "error") throw new Error(result.message);

                const dataPenduduk = result.data.Master_Data_Penduduk;

                // Verifikasi NIK (Indeks 0) dan Password (Indeks 1)
                const user = dataPenduduk.find(row => 
                    row[0].toString() === nikInput && row[1].toString() === passInput
                );

                if (user) {
                    localStorage.setItem('nik_login', user[0]);
                    const role = user[9] ? user[9].toLowerCase() : 'warga';
                    const nama = user[2];

                    Swal.fire({ icon: 'success', title: `Halo, ${nama}!`, timer: 1500, showConfirmButton: false }).then(() => {
                        // Pengalihan berdasarkan Role (SESUAIKAN DENGAN NAMA FILE GITHUB BAPAK)
                        if (role.includes('admin')) { window.location.href = "admin_panel.html"; }
                        else if (role.includes('kesehatan')) { window.location.href = "kader_kesehatan.html"; } 
                        else if (role.includes('sampah')) { window.location.href = "kader_sampah.html"; }
                        else { window.location.href = "dashboard_warga.html"; }
                    });
                } else {
                    Swal.fire('Gagal Login', 'NIK atau Password Anda salah.', 'error');
                }
            } catch (error) {
                console.error(error);
                Swal.fire('Koneksi Gagal', 'Sistem tidak dapat terhubung ke database. Pastikan Web App sudah di-deploy dengan benar (akses "Anyone") dan internet aktif.', 'error');
            }
        }
    </script>
</body>
</html>
