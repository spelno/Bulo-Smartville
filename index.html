<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulo SmartVille - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: linear-gradient(135deg, #003d70, #005fa3); font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center; }
        .logo-bulo { width: 160px; margin-bottom: 10px; }
        .slogan { font-size: 0.85rem; color: #666; font-style: italic; margin-bottom: 30px; }
        .form-control { border-radius: 12px; padding: 12px; margin-bottom: 15px; background: #f8f9fa; border: 1px solid #ddd; }
        .btn-login { background: #003d70; color: white; border-radius: 12px; padding: 12px; width: 100%; font-weight: bold; border: none; transition: 0.3s; }
        .btn-login:hover { background: #00284d; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="login-card mx-3">
        <img src="Lobo_Bulo.png" class="logo-bulo" alt="Bulo SmartVille">
        <div class="slogan">"Satu Data, Sejuta Manfaat"</div>
        <input type="number" id="nik" class="form-control" placeholder="Masukkan NIK">
        <input type="password" id="pass" class="form-control" placeholder="Password">
        <button class="btn-login" onclick="prosesLogin()">MASUK KE SISTEM</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzVXjDFywiipE5TYG-2fSDXPh3X1mG5O_t3fbccZkX_lHhlg-scq-Ats1LUcUnrDu9Yog/exec"; 

        async function prosesLogin() {
            const nikInput = document.getElementById('nik').value;
            const passInput = document.getElementById('pass').value;

            if (!nikInput || !passInput) return Swal.fire('Oops!', 'NIK dan Password wajib diisi', 'warning');

            Swal.fire({ title: 'Memverifikasi...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });

            try {
                const response = await fetch(`${API_URL}?action=get_all_sheets_data`);
                const result = await response.json();
                const user = result.data.Master_Data_Penduduk.find(r => r[0].toString() === nikInput && r[1].toString() === passInput);

                if (user) {
                    // --- SIMPAN TIKET (NIK & ROLE) ---
                    const roleUser = user[9] ? user[9].toLowerCase() : 'warga';
                    localStorage.setItem('nik_login', user[0]);
                    localStorage.setItem('role_login', roleUser);

                    Swal.fire({ icon: 'success', title: 'Berhasil!', text: `Halo, ${user[2]}`, timer: 1500, showConfirmButton: false }).then(() => {
                        if (roleUser.includes('admin')) window.location.href = "admin_panel.html";
                        else if (roleUser.includes('kesehatan')) window.location.href = "kader_kesehatan.html"; 
                        else if (roleUser.includes('sampah')) window.location.href = "kader_sampah.html";
                        else window.location.href = "dashboard_warga.html";
                    });
                } else {
                    Swal.fire('Gagal', 'NIK atau Password salah!', 'error');
                }
            } catch (e) {
                Swal.fire('Error', 'Koneksi ke database gagal.', 'error');
            }
        }
    </script>
</body>
</html>
