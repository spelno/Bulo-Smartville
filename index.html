<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulo Smartville v6.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --bulo: #0047AB; }
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .card-personal { border-radius: 20px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.08); background: #fff; }
        .badge-status { font-size: 0.7rem; padding: 5px 12px; border-radius: 50px; }
        #app-content, #view-detail { display: none; }
        @media print { .no-print { display: none !important; } .print-area { border:none !important; } }
    </style>
</head>
<body>

<div id="login-screen" class="vh-100 d-flex align-items-center justify-content-center bg-white">
    <div class="col-md-4 text-center p-4">
        <img src="Lobo_Bulo.png" style="width:180px" class="mb-4">
        <div class="card card-personal p-4 shadow-lg">
            <h5 class="fw-bold mb-3">Login Penduduk</h5>
            <input type="text" id="nik" class="form-control mb-3 rounded-pill" placeholder="Masukkan NIK">
            <input type="password" id="pass" class="form-control mb-3 rounded-pill" placeholder="Password">
            <button onclick="doLogin()" class="btn btn-primary w-100 rounded-pill fw-bold py-2">MASUK</button>
        </div>
    </div>
</div>

<div id="app-content">
    <div class="p-3 bg-white border-bottom d-flex justify-content-between align-items-center no-print">
        <div class="fw-bold text-primary">BULO SMARTVILLE PRO</div>
        <button onclick="doLogout()" class="btn btn-sm btn-outline-danger rounded-pill">Keluar</button>
    </div>

    <div class="container py-4">
        <div id="view-dashboard" class="row g-3">
            <div class="col-12"><h5 class="fw-bold">Selamat Datang, <span id="u-name"></span></h5></div>
            <div class="col-6"><div class="card card-personal p-4 text-center" onclick="chooseMember()"><h1>🥗</h1><small>Hitung Gizi</small></div></div>
        </div>

        <div id="view-detail">
            <button onclick="goBack()" class="btn btn-light btn-sm mb-3 no-print rounded-pill border">← Dashboard</button>
            <div id="detail-body"></div>
        </div>
    </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbywKVsEtXthbw1MM6WusUHIVagoOLd8rUIsdrApH1o6WMWcK8AexokjT3pje9RA-9Gzig/exec"; // GANTI DENGAN URL GAS ANDA
let USER = null, DATA = null, piring = [], selectedMember = null;

async function doLogin() {
    const nik = document.getElementById('nik').value, pass = document.getElementById('pass').value;
    Swal.fire({title: 'Memuat...', didOpen:()=>Swal.showLoading()});
    const res = await fetch(WEB_APP_URL, {method:'POST', body: JSON.stringify({action:'login', nik, password:pass})}).then(r=>r.json());
    if(res.status==='success') { USER=res.user; localStorage.setItem('bulo_session', JSON.stringify(USER)); initApp(); Swal.close(); }
    else { Swal.fire('Error', res.message, 'error'); }
}

function doLogout() { localStorage.removeItem('bulo_session'); location.reload(); }

async function initApp() {
    document.getElementById('login-screen').classList.replace('d-flex', 'd-none');
    document.getElementById('app-content').style.display = 'block';
    document.getElementById('u-name').innerText = USER.nama;
    const res = await fetch(WEB_APP_URL, {method:'POST', body: JSON.stringify({action:'get_dashboard', user:USER})}).then(r=>r.json());
    DATA = res.data;
}

function chooseMember() {
    let opts = DATA.keluarga.map((k, i) => `<option value="${i}">${k.nama}</option>`).join('');
    Swal.fire({
        title: 'Siapa yang sedang makan?',
        html: `<select id="idx-mem" class="form-select rounded-pill mt-2">${opts}</select>`,
        confirmButtonText: 'Mulai Analisis'
    }).then(r => {
        if(r.isConfirmed) {
            selectedMember = DATA.keluarga[document.getElementById('idx-mem').value];
            piring = []; renderCalc();
            document.getElementById('view-dashboard').classList.add('d-none');
            document.getElementById('view-detail').style.display = 'block';
        }
    });
}

function addPiring() {
    let f = DATA.master_gizi[document.getElementById('f-sel').value];
    let g = document.getElementById('f-gram').value;
    if(!g || g <= 0) return;
    let r = parseFloat(g) / 100;
    piring.push({ nama: f[0], gram: g, kal: f[1]*r, pro: f[2]*r, lem: f[3]*r, kar: f[4]*r, fe: f[5]*r });
    document.getElementById('f-gram').value = "";
    renderCalc();
}

function renderCalc() {
    let optFood = DATA.master_gizi.map((f, i) => `<option value="${i}">${f[0]}</option>`).join('');
    let total = { kal:0, pro:0, lem:0, kar:0, fe:0 };
    piring.forEach(p => { total.kal+=p.kal; total.pro+=p.pro; total.lem+=p.lem; total.kar+=p.kar; total.fe+=p.fe; });

    let t = selectedMember.target;
    let msg = [];
    if (total.fe < t.fe) msg.push("🔴 <b>Fe Kurang:</b> Risiko anemia/stunting.");
    if (total.pro < t.pro * 0.8) msg.push("🟡 <b>Protein Kurang:</b> Tambahkan ikan/telur.");
    if (total.pro > t.pro * 1.5) msg.push("🔵 <b>Protein Lebih:</b> Ginjal bekerja keras.");
    if (total.lem > t.lem) msg.push("🚫 <b>Lemak Lebih:</b> Kurangi gorengan/santan!");
    if (total.kal > t.kal + 200) msg.push("🛑 <b>Kalori Lebih:</b> Risiko kenaikan BB drastis.");

    document.getElementById('detail-body').innerHTML = `
        <div class="card card-personal p-3 mb-4 no-print shadow-sm border-0">
            <h5 class="fw-bold mb-0">${selectedMember.nama}</h5>
            <small class="text-primary mb-3 d-block">📏 ${selectedMember.tb}cm | ⚖️ ${selectedMember.bb}kg | 🎂 ${selectedMember.usia}</small>
            
            <div class="row g-2 text-center mb-3">
                <div class="col-3 small border-end"><b>Kal</b><br><span class="${total.kal > t.kal ? 'text-danger fw-bold':''}">${total.kal.toFixed(0)}</span></div>
                <div class="col-3 small border-end"><b>Pro</b><br>${total.pro.toFixed(1)}</div>
                <div class="col-3 small border-end"><b>Lem</b><br><span class="${total.lem > t.lem ? 'text-danger fw-bold':''}">${total.lem.toFixed(1)}</span></div>
                <div class="col-3 small"><b>Fe</b><br>${total.fe.toFixed(1)}</div>
            </div>

            <select id="f-sel" class="form-select mb-2 rounded-pill shadow-sm">${optFood}</select>
            <input type="number" id="f-gram" class="form-control mb-3 rounded-pill shadow-sm" placeholder="Berat (gram)">
            <button onclick="addPiring()" class="btn btn-primary w-100 rounded-pill fw-bold py-2 shadow">TAMBAH MAKANAN</button>
        </div>

        <div class="print-area p-4 bg-white border card-personal shadow-sm">
            <div class="text-center mb-3"><img src="Lobo_Bulo.png" style="width:60px"><h6 class="fw-bold mt-2">LAPORAN ANALISIS PERSONAL</h6></div>
            <div class="alert ${msg.length > 0 ? 'alert-warning' : 'alert-success'} small py-2 mb-3">
                ${msg.length > 0 ? msg.join('<br>') : '✅ Komposisi gizi hari ini sudah seimbang dan tepat!'}
            </div>
            <table class="table table-sm small">
                <thead><tr class="table-light"><th>Bahan</th><th>Porsi</th><th>Fe</th><th>Pro</th></tr></thead>
                <tbody>${piring.map(p => `<tr><td>${p.nama}</td><td>${p.gram}g</td><td>${p.fe.toFixed(1)}</td><td>${p.pro.toFixed(1)}</td></tr>`).join('')}</tbody>
            </table>
            <button onclick="window.print()" class="btn btn-dark btn-sm w-100 mt-2 rounded-pill no-print shadow-sm">🖨️ CETAK LAPORAN</button>
        </div>
    `;
}

function goBack() { document.getElementById('view-detail').style.display='none'; document.getElementById('view-dashboard').classList.remove('d-none'); }
</script>
</body>
</html>
