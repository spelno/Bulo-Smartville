<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bulo Smartville v10.1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --bca-blue: #0060af; --bca-dark: #004a87; --bg-gray: #f2f2f7; }
        body { background: var(--bg-gray); font-family: 'Arial', sans-serif; padding-bottom: 80px; }
        
        /* Header m-BCA Style */
        .top-header { background: linear-gradient(to bottom, var(--bca-blue), var(--bca-dark)); color: white; padding: 20px; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Card Dashboard */
        .info-card { background: white; border-radius: 15px; margin-top: -30px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* Grid Menu */
        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px; }
        .menu-item { text-align: center; font-size: 0.75rem; font-weight: bold; color: #444; }
        .menu-icon { width: 55px; height: 55px; background: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; font-size: 1.5rem; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }

        /* Bottom Navigation m-BCA */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 70px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-link { text-align: center; color: #888; text-decoration: none; font-size: 0.7rem; }
        
        /* Tombol QR Melayang (Floating QR) */
        .qr-wrapper { position: relative; top: -25px; }
        .btn-qr { width: 65px; height: 65px; background: var(--bca-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem; border: 5px solid var(--bg-gray); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        #login-screen, #app-content { display: none; }
    </style>
</head>
<body>

<div id="login-screen" class="vh-100 d-flex align-items-center justify-content-center p-4">
    <div class="w-100 text-center" style="max-width: 350px;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Bank_Central_Asia.svg" width="150" class="mb-4">
        <div class="bg-white p-4 rounded-4 shadow">
            <input type="number" id="nik" class="form-control mb-3 py-3" placeholder="Access Code (NIK)">
            <input type="password" id="pass" class="form-control mb-4 py-3" placeholder="Password">
            <button onclick="handleLogin()" class="btn btn-primary w-100 py-3 fw-bold rounded-pill" style="background: var(--bca-blue);">LOG IN</button>
        </div>
    </div>
</div>

<div id="app-content">
    <div class="top-header">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <small>Selamat Datang,</small>
                <h5 class="mb-0 fw-bold" id="user-display">User Name</h5>
            </div>
            <i class="bi bi-bell-fill fs-4"></i>
        </div>
    </div>

    <div class="container">
        <div class="info-card">
            <div class="d-flex justify-content-between small text-muted mb-2">
                <span>Tabungan Sampah</span>
                <span id="trash-status" class="badge bg-success">BUKA</span>
            </div>
            <h2 class="fw-bold mb-0 text-primary" id="info-saldo">Rp 0</h2>
            <hr>
            <div class="row text-center small">
                <div class="col-6 border-end">Tabungan: <b id="info-kg">0 Kg</b></div>
                <div class="col-6">Harga/Kg: <b id="info-harga">Rp 3.000</b></div>
            </div>
        </div>
    </div>

    <div class="menu-grid">
        <div class="menu-item" onclick="openGizi()"><div class="menu-icon text-success"><i class="bi bi-egg-fried"></i></div>Gizi AKG</div>
        <div class="menu-item"><div class="menu-icon text-primary"><i class="bi bi-trash3-fill"></i></div>Bank Sampah</div>
        <div class="menu-item"><div class="menu-icon text-warning"><i class="bi bi-newspaper"></i></div>Edukasi</div>
        <div class="menu-item"><div class="menu-icon text-danger"><i class="bi bi-geo-alt-fill"></i></div>Lokasi</div>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-link active" style="color: var(--bca-blue);"><i class="bi bi-house-door-fill fs-4"></i><br>Home</a>
        <a href="#" class="nav-link"><i class="bi bi-clock-history fs-4"></i><br>Aktivitas</a>
        <div class="qr-wrapper" onclick="showQR()">
            <div class="btn-qr"><i class="bi bi-qr-code-scan"></i></div>
        </div>
        <a href="#" class="nav-link"><i class="bi bi-chat-dots-fill fs-4"></i><br>Pesan</a>
        <a href="#" onclick="logout()" class="nav-link"><i class="bi bi-box-arrow-right fs-4"></i><br>Logout</a>
    </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw6CKdpyg71G1jUBN5EyZWDyqsVzqUYqElkpE1XH3fh-cbiMfEjFvhxKubK-dJI74pb7A/exec"; 
let DB_FULL = null;
let USER_SESSION = null;

async function fetchAllData() {
    try {
        const response = await fetch(WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'read_all' })
        });
        const result = await response.json();
        if(result.status === 'success') DB_FULL = result.db;
    } catch (e) { console.log(e); }
}

function handleLogin() {
    const nik = document.getElementById('nik').value;
    const pass = document.getElementById('pass').value;
    const master = DB_FULL.Master_Data_Penduduk;
    const userFound = master.find(r => r[0].toString() === nik && r[1].toString() === pass);

    if(userFound) {
        USER_SESSION = { nik: userFound[0], nama: userFound[2], kk: userFound[7] };
        localStorage.setItem('bulo_user', JSON.stringify(USER_SESSION));
        renderApp();
    } else {
        Swal.fire('Error', 'Access Code Salah', 'error');
    }
}

function renderApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-content').style.display = 'block';
    document.getElementById('user-display').innerText = USER_SESSION.nama;

    // Load Saldo & Harga
    const settings = DB_FULL.sampah_pengaturan;
    const harga = settings.find(r => r[0] === 'Harga_Beli_Warga')[1];
    document.getElementById('info-harga').innerText = `Rp ${parseInt(harga).toLocaleString()}`;

    const saldo = DB_FULL.sampah_saldo.find(r => r[0].toString() === USER_SESSION.nik.toString());
    if(saldo) {
        document.getElementById('info-saldo').innerText = `Rp ${parseInt(saldo[2]).toLocaleString()}`;
        document.getElementById('info-kg').innerText = `${saldo[3]} Kg`;
    }
}

function showQR() {
    Swal.fire({
        title: 'QR IDENTITY',
        text: 'Tunjukkan ke petugas untuk transaksi',
        imageUrl: `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${USER_SESSION.nik}`,
        confirmButtonColor: '#0060af'
    });
}

function logout() { localStorage.removeItem('bulo_user'); location.reload(); }

window.onload = async () => {
    await fetchAllData();
    const saved = localStorage.getItem('bulo_user');
    if(saved) { USER_SESSION = JSON.parse(saved); renderApp(); }
    else { document.getElementById('login-screen').style.display = 'flex'; }
};
</script>
</body>
</html>
