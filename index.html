<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulo Smartville</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .hidden { display: none !important; }
        .card { border: none; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        .nav-custom { background: #ffffff; border-bottom: 2px solid #0047AB; padding: 10px 20px; }
        .logo-img { height: 45px; margin-right: 12px; }
        .btn-primary { background-color: #0047AB; border: none; padding: 10px; font-weight: 600; }
        .btn-primary:hover { background-color: #003580; }
        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="loader" class="loader-overlay hidden">
    <div class="spinner-border text-primary" role="status"></div>
</div>

<nav class="nav-custom d-flex justify-content-between align-items-center hidden" id="mainNav">
    <div class="d-flex align-items-center">
        <img src="Logo_Bulo.png" alt="Logo" class="logo-img">
        <h4 class="m-0 fw-bold text-primary">Bulo Smartville</h4>
    </div>
    <div class="d-flex align-items-center">
        <span id="userTag" class="badge bg-primary me-3 p-2"></span>
        <button class="btn btn-sm btn-outline-danger fw-bold" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container mt-5">

    <div id="loginSection" class="mx-auto" style="max-width: 400px;">
        <div class="card p-4 text-center">
            <img src="Logo_Bulo.png" alt="Logo" class="mx-auto mb-3" style="height: 80px;">
            <h3 class="fw-bold text-primary mb-1">Bulo Smartville</h3>
            <p class="text-muted mb-4">Sistem Terpadu Gizi & Sanitasi</p>
            
            <div id="loginError" class="alert alert-danger hidden"></div>
            
            <form id="loginForm">
                <div class="mb-3 text-start">
                    <label class="form-label small fw-bold">Username</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="mb-3 text-start">
                    <label class="form-label small fw-bold">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Masuk ke Sistem</button>
            </form>
        </div>
    </div>

    <div id="viewKader" class="hidden">
        <div class="row g-4">
            <div class="col-md-7">
                <div class="card p-4">
                    <h5 class="fw-bold text-primary mb-4 border-bottom pb-2">Registrasi Balita Baru</h5>
                    <form id="formBalita">
                        <div class="row g-3">
                            <div class="col-md-6"><label class="small fw-bold">NIK Anak</label><input type="number" id="nik_anak" class="form-control" required></div>
                            <div class="col-md-6"><label class="small fw-bold">NIK KK</label><input type="number" id="nik_kk" class="form-control" required></div>
                            <div class="col-12"><label class="small fw-bold">Nama Lengkap Anak</label><input type="text" id="nama_anak" class="form-control" required></div>
                            <div class="col-md-6"><label class="small fw-bold">Tgl Lahir</label><input type="date" id="tgl_lahir" class="form-control" required></div>
                            <div class="col-md-6"><label class="small fw-bold">Gender</label>
                                <select id="jenis_kelamin" class="form-select"><option value="L">Laki-laki</option><option value="P">Perempuan</option></select>
                            </div>
                            <div class="col-12"><label class="small fw-bold">No. WhatsApp Ortu</label><input type="text" id="wa_ortu" class="form-control" placeholder="628..." required></div>
                            <div class="col-12"><label class="small fw-bold">Alamat Dusun</label><input type="text" id="alamat_dusun" class="form-control" required></div>
                            <div class="col-12"><button type="submit" class="btn btn-success w-100 fw-bold py-2 mt-2">SIMPAN DATA</button></div>
                        </div>
                    </form>
                </div>
            </div>
            <div class="col-md-5">
                <div class="card p-4 bg-white border-start border-primary border-4">
                    <h5 class="fw-bold">Menu Navigasi</h5>
                    <div class="list-group mt-3">
                        <button class="list-group-item list-group-item-action">📊 Input Pengukuran Gizi</button>
                        <button class="list-group-item list-group-item-action">🧹 Lapor Kebersihan</button>
                        <button class="list-group-item list-group-item-action">🍲 Resep MP-ASI Lokal</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="viewKades" class="hidden">
        <div class="row g-4">
            <div class="col-md-4"><div class="card p-4 text-center bg-white border-bottom border-primary border-4"><h6>Total Balita</h6><h2 class="fw-bold text-primary">120</h2></div></div>
            <div class="col-md-4"><div class="card p-4 text-center bg-white border-bottom border-danger border-4"><h6>Stunting</h6><h2 class="fw-bold text-danger">8</h2></div></div>
            <div class="col-md-4"><div class="card p-4 text-center bg-white border-bottom border-success border-4"><h6>Status Lingkungan</h6><h2 class="fw-bold text-success">BERSIH</h2></div></div>
        </div>
    </div>

</div>

<script>
    // GANTI DENGAN URL WEB APP GAS ANDA
    const WEB_APP_URL = "MASUKKAN_URL_WEB_APP_GAS_ANDA_DI_SINI";

    function showLoader(show) {
        document.getElementById('loader').classList.toggle('hidden', !show);
    }

    // FUNGSI LOGIN DENGAN JSONP
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        showLoader(true);
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;

        const script = document.createElement('script');
        script.src = `${WEB_APP_URL}?action=login&username=${u}&password=${p}&callback=handleLogin`;
        document.body.appendChild(script);
        document.body.removeChild(script);
    });

    function handleLogin(response) {
        showLoader(false);
        if (response.status === "success") {
            switchView(response.data.role, response.data.username);
        } else {
            const err = document.getElementById('loginError');
            err.innerText = response.message;
            err.classList.remove('hidden');
        }
    }

    function switchView(role, username) {
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('mainNav').classList.remove('hidden');
        document.getElementById('userTag').innerText = `${username} (${role.toUpperCase()})`;
        
        if (role === 'kader') document.getElementById('viewKader').classList.remove('hidden');
        if (role === 'kades') document.getElementById('viewKades').classList.remove('hidden');
        if (role === 'admin') {
            document.getElementById('viewKader').classList.remove('hidden');
            document.getElementById('viewKades').classList.remove('hidden');
        }
    }

    function logout() { window.location.reload(); }
</script>
</body>
</html>
