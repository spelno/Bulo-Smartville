<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulo Smartville v9.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #0d6efd; --success: #198754; --danger: #dc3545; }
        body { background: #f8fafc; font-family: 'Inter', sans-serif; color: #334155; }
        .glass-card { background: white; border-radius: 24px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .btn-action { border-radius: 18px; padding: 15px; border: none; transition: 0.2s; background: white; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .btn-action:active { transform: scale(0.95); }
        .trash-badge { border-radius: 12px; padding: 8px 15px; font-weight: 700; font-size: 0.8rem; }
        .active-red { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; }
        .active-blue { background: #e0f2fe; color: #0ea5e9; border: 1px solid #bae6fd; }
        #app-content, #view-detail { display: none; }
        .nav-top { background: white; border-bottom: 1px solid #e2e8f0; padding: 15px; sticky: top; }
    </style>
</head>
<body>

<div id="login-screen" class="vh-100 d-flex align-items-center justify-content-center px-4">
    <div class="col-md-4 w-100" style="max-width: 400px;">
        <div class="text-center mb-4">
            <img src="Lobo_Bulo.png" width="90" class="mb-2">
            <h4 class="fw-bold text-dark">Bulo Smartville</h4>
            <p class="text-muted small">Silakan masuk dengan NIK Anda</p>
        </div>
        <div class="glass-card p-4">
            <input type="text" id="nik" class="form-control mb-3 py-3 rounded-4 bg-light border-0" placeholder="Nomor Induk Kependudukan">
            <input type="password" id="pass" class="form-control mb-4 py-3 rounded-4 bg-light border-0" placeholder="Kata Sandi">
            <button onclick="doLogin()" class="btn btn-primary w-100 py-3 rounded-4 fw-bold shadow">Masuk Ke Sistem</button>
        </div>
    </div>
</div>

<div id="app-content">
    <div class="nav-top d-flex justify-content-between align-items-center">
        <div><small class="text-muted d-block" style="font-size: 0.6rem;">SELAMAT DATANG</small><b class="text-dark" id="user-name">Warga Bulo</b></div>
        <button onclick="doLogout()" class="btn btn-light rounded-pill px-3 btn-sm border text-danger fw-bold">Keluar</button>
    </div>

    <div class="container py-4">
        <div id="view-dashboard">
            <div id="status-box" class="glass-card p-4 mb-4 text-center">
                <div class="d-flex justify-content-between mb-3 small fw-bold">
                    <span>TABUNGAN SAMPAH</span>
                    <span id="dash-alarm-badge" class="trash-badge active-blue">SISTEM TUTUP</span>
                </div>
                <div class="row g-0">
                    <div class="col-6 text-start">
                        <h3 id="dash-saldo" class="fw-bold text-success mb-0">Rp 0</h3>
                        <small class="text-muted">Total Saldo</small>
                    </div>
                    <div class="col-6 text-end">
                        <h3 id="dash-timer" class="fw-bold text-dark mb-0">00:00:00</h3>
                        <small class="text-muted">Countdown</small>
                    </div>
                </div>
            </div>

            <div class="row g-3">
                <div class="col-6">
                    <button onclick="chooseMember()" class="btn-action">
                        <h1 class="mb-1">🥗</h1><b class="small d-block text-muted">Hitung Gizi</b>
                    </button>
                </div>
                <div class="col-6">
                    <button onclick="showMyQR()" class="btn-action">
                        <h1 class="mb-1">🆔</h1><b class="small d-block text-muted">ID Digital</b>
                    </button>
                </div>
                
                <div id="kader-menu" class="col-12 d-none mt-2">
                    <hr class="my-4">
                    <p class="small fw-bold text-muted mb-2">MENU PETUGAS / KADER</p>
                    <div class="row g-2">
                        <div class="col-6">
                            <button onclick="startScanner()" class="btn btn-success w-100 py-3 rounded-4 fw-bold shadow-sm">♻️ SCAN SAMPAH</button>
                        </div>
                        <div class="col-6">
                            <button onclick="manageFisik()" class="btn btn-outline-primary w-100 py-3 rounded-4 fw-bold bg-white shadow-sm">⚖️ DATA FISIK</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-detail">
            <button onclick="goBack()" class="btn btn-light btn-sm mb-3 border-0 rounded-3 shadow-sm">← Kembali</button>
            <div id="detail-body"></div>
        </div>
    </div>
</div>

<div id="scanner-container" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; padding:20px;">
    <h5 class="fw-bold mb-3">Scan QR Warga</h5>
    <div id="reader" style="width:100%; border-radius: 20px; overflow: hidden;"></div>
    <button onclick="stopScanner()" class="btn btn-danger w-100 py-3 rounded-4 mt-3 fw-bold">BATALKAN</button>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwzfHJMwyR-2rx1pT8j1wDjCZeCXVim9ZisqZk7c3r5VxfZIpdddNTYbXW4xyoLEh860Q/exec"; 
let USER = null, DATA = null, piring = [], selectedMember = null, mainTimer = null, html5QrCode = null;

async function doLogin() {
    const nik = document.getElementById('nik').value, pass = document.getElementById('pass').value;
    if(!nik || !pass) return;
    Swal.fire({title: 'Memproses...', didOpen:()=>Swal.showLoading()});
    const res = await fetch(WEB_APP_URL, {method:'POST', body: JSON.stringify({action:'login', nik, password:pass})}).then(r=>r.json());
    if(res.status==='success') { USER=res.user; localStorage.setItem('bulo_session', JSON.stringify(USER)); initApp(); Swal.close(); }
    else { Swal.fire('Gagal', res.message, 'error'); }
}

function doLogout() { localStorage.removeItem('bulo_session'); location.reload(); }

async function initApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-content').style.display = 'block';
    document.getElementById('user-name').innerText = USER.nama;
    if(USER.role === 'admin' || USER.role === 'kader') document.getElementById('kader-menu').classList.remove('d-none');
    
    const res = await fetch(WEB_APP_URL, {method:'POST', body: JSON.stringify({action:'get_dashboard', user:USER})}).then(r=>r.json());
    DATA = res.data;
    
    document.getElementById('dash-saldo').innerText = `Rp ${DATA.sampah.saldo_rp.toLocaleString('id-ID')}`;
    const badge = document.getElementById('dash-alarm-badge');
    badge.innerText = DATA.alarm.status_text;
    badge.className = DATA.alarm.is_active ? "trash-badge active-red" : "trash-badge active-blue";
    
    startMainTimer(DATA.alarm.target_time);
}

// --- SCANNER KADER ---
function startScanner() {
    document.getElementById('scanner-container').style.display = 'block';
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
        stopScanner();
        processWarga(decodedText);
    });
}

function stopScanner() {
    if(html5QrCode) html5QrCode.stop().then(() => { document.getElementById('scanner-container').style.display = 'none'; });
}

async function processWarga(nikWarga) {
    Swal.fire({title: 'Mencari Data...', didOpen:()=>Swal.showLoading()});
    const res = await fetch(WEB_APP_URL, {method:'POST', body: JSON.stringify({action:'get_user_by_nik', nik: nikWarga})}).then(r=>r.json());
    Swal.close();
    
    if(res.status === 'success') {
        Swal.fire({
            title: 'Setoran: ' + res.nama,
            html: `
                <input id="sw-berat" type="number" class="form-control mb-2 rounded-3" placeholder="Berat Sampah (Kg)">
                <input id="sw-rp" type="number" class="form-control rounded-3" placeholder="Total Rupiah (Rp)">
            `,
            confirmButtonText: 'Simpan Setoran',
            preConfirm: () => {
                return { berat: document.getElementById('sw-berat').value, rp: document.getElementById('sw-rp').value }
            }
        }).then(async (r) => {
            if(r.isConfirmed && r.value.berat) {
                Swal.fire({title: 'Menyimpan...', didOpen:()=>Swal.showLoading()});
                await fetch(WEB_APP_URL, {method:'POST', body: JSON.stringify({action:'submit_setoran', nik_warga: nikWarga, berat: r.value.berat, total_rp: r.value.rp})});
                Swal.fire('Berhasil!', 'Data setoran telah masuk.', 'success');
                initApp();
            }
        });
    } else { Swal.fire('Gagal', 'NIK Warga tidak ditemukan!', 'error'); }
}

// --- FUNGSI GIZI & QR (TETAP SAMA) ---
function showMyQR() {
    const qrUrl = `https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl=${USER.nik}&choe=UTF-8`;
    Swal.fire({
        title: 'ID DIGITAL',
        html: `<img src="${qrUrl}" width="200" class="my-3 shadow" onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${USER.nik}'">
               <h5 class="fw-bold mb-0">${USER.nama}</h5><small class="text-muted">${USER.nik}</small>`,
        confirmButtonText: 'Tutup'
    });
}

function startMainTimer(target) {
    if(mainTimer) clearInterval(mainTimer);
    mainTimer = setInterval(() => {
        const diff = target - new Date().getTime();
        const el = document.getElementById('dash-timer');
        if (diff < 0 || !el) { clearInterval(mainTimer); location.reload(); return; }
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        el.innerText = `${h<10?'0':''}${h}:${m<10?'0':''}${m}:${s<10?'0':''}${s}`;
    }, 1000);
}

function chooseMember() {
    let opts = DATA.keluarga.map((k, i) => `<option value="${i}">${k.nama}</option>`).join('');
    Swal.fire({ title: 'Pilih Anggota', html: `<select id="idx-mem" class="form-select mt-2 rounded-3">${opts}</select>`, confirmButtonText: 'Pilih' }).then(r => {
        if(r.isConfirmed) { 
            selectedMember = DATA.keluarga[document.getElementById('idx-mem').value]; 
            piring = []; renderCalc(); 
            document.getElementById('view-dashboard').classList.add('d-none'); 
            document.getElementById('view-detail').style.display='block'; 
        }
    });
}

function renderCalc() {
    let optFood = DATA.master_gizi.map((f, i) => `<option value="${i}">${f[0]}</option>`).join('');
    let total = { kal:0, pro:0, lem:0, kar:0, fe:0 };
    piring.forEach(p => { total.kal += p.kal; total.pro += p.pro; total.lem += p.lem; total.kar += p.kar; total.fe += p.fe; });
    let t = selectedMember.target;
    document.getElementById('detail-body').innerHTML = `
        <div class="glass-card p-4 mb-3 border-start border-primary border-5">
            <h5 class="fw-bold mb-0">${selectedMember.nama}</h5>
            <small class="text-muted d-block mb-3">📏 ${selectedMember.tb}cm | ⚖️ ${selectedMember.bb}kg</small>
            <div class="row g-2 text-center mb-3 small">
                <div class="col-3 p-2 border rounded-3 bg-light"><small>KAL</small><br><b>${total.kal.toFixed(0)}</b></div>
                <div class="col-3 p-2 border rounded-3 bg-light"><small>PRO</small><br><b>${total.pro.toFixed(1)}</b></div>
                <div class="col-3 p-2 border rounded-3 bg-light"><small>FE</small><br><b>${total.fe.toFixed(1)}</b></div>
                <div class="col-3 p-2 border rounded-3 bg-light"><small>KAR</small><br><b>${total.kar.toFixed(0)}</b></div>
            </div>
            <div class="input-group mb-2">
                <select id="f-sel" class="form-select border-0 bg-light">${optFood}</select>
                <input type="number" id="f-gram" class="form-control border-0 bg-light" placeholder="Gr">
                <button onclick="addPiring()" class="btn btn-primary fw-bold px-3">TAMBAH</button>
            </div>
        </div>
        <div class="p-3 bg-white glass-card border small shadow-sm">
            <table class="table table-sm">
                <thead><tr><th>Menu</th><th>Gr</th><th>Pro</th><th>Fe</th></tr></thead>
                <tbody>${piring.map(p=>`<tr><td>${p.nama}</td><td>${p.gram}</td><td>${p.pro.toFixed(1)}</td><td>${p.fe.toFixed(1)}</td></tr>`).join('')}</tbody>
            </table>
            <button onclick="window.print()" class="btn btn-dark w-100 rounded-4 mt-2 py-2">Cetak Laporan</button>
        </div>`;
}

function addPiring() {
    let f = DATA.master_gizi[document.getElementById('f-sel').value], g = document.getElementById('f-gram').value;
    if(!g || g <= 0) return;
    let r = parseFloat(g) / 100;
    piring.push({ nama: f[0], gram: g, kal: (Number(f[1])||0)*r, pro: (Number(f[2])||0)*r, lem: (Number(f[3])||0)*r, kar: (Number(f[4])||0)*r, fe: (Number(f[5])||0)*r });
    document.getElementById('f-gram').value = ""; renderCalc();
}

function manageFisik() {
    let opts = DATA.keluarga.map((k, i) => `<option value="${i}">${k.nama}</option>`).join('');
    Swal.fire({
        title: 'Update TB/BB',
        html: `<select id="upd-idx" class="form-select mb-2 rounded-3">${opts}</select>
               <input id="upd-tb" type="number" class="form-control mb-2 rounded-3" placeholder="Tinggi (cm)">
               <input id="upd-bb" type="number" class="form-control rounded-3" placeholder="Berat (kg)">`,
        confirmButtonText: 'Simpan',
        preConfirm: () => {
            let m = DATA.keluarga[document.getElementById('upd-idx').value];
            return { nik: m.nik, tb: document.getElementById('upd-tb').value, bb: document.getElementById('upd-bb').value };
        }
    }).then(async r => {
        if(r.isConfirmed && r.value.tb && r.value.bb) {
            Swal.fire({title:'Menyimpan...', didOpen:()=>Swal.showLoading()});
            await fetch(WEB_APP_URL, {method:'POST', body: JSON.stringify({action:'update_fisik', ...r.value})});
            initApp(); Swal.fire('Berhasil', 'Data fisik diperbarui', 'success');
        }
    });
}

function goBack() { document.getElementById('view-detail').style.display='none'; document.getElementById('view-dashboard').classList.remove('d-none'); }
if(localStorage.getItem('bulo_session')) { USER = JSON.parse(localStorage.getItem('bulo_session')); initApp(); }
</script>
</body>
</html>
