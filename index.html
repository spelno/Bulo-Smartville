<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulo Smartville v5.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --bulo: #0047AB; --bg: #f4f7f6; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; }
        .card-custom { border-radius: 20px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header-app { background: #fff; padding: 15px; border-bottom: 3px solid var(--bulo); }
        .progress { height: 8px; border-radius: 10px; }
        #app-content, #view-detail { display: none; }
        @media print { .no-print { display: none !important; } .print-area { box-shadow: none !important; border: 1px solid #eee !important; } }
    </style>
</head>
<body>

<div id="login-screen" class="vh-100 d-flex align-items-center justify-content-center bg-white">
    <div class="col-md-4 text-center p-4">
        <img src="Lobo_Bulo.png" style="width:200px" class="mb-4">
        <div class="card card-custom p-4 shadow-lg">
            <h5 class="fw-bold mb-3">Login Warga</h5>
            <input type="text" id="nik" class="form-control mb-3 rounded-pill" placeholder="NIK">
            <input type="password" id="pass" class="form-control mb-3 rounded-pill" placeholder="Password">
            <button onclick="doLogin()" class="btn btn-primary w-100 rounded-pill fw-bold">MASUK</button>
        </div>
    </div>
</div>

<div id="app-content">
    <div class="header-app d-flex justify-content-between align-items-center no-print">
        <div class="fw-bold text-primary">BULO SMARTVILLE <span class="badge bg-primary">v5.0</span></div>
        <div class="text-end"><small id="u-name" class="fw-bold d-block"></small>
            <button onclick="doLogout()" class="btn btn-link btn-sm text-danger p-0 text-decoration-none">Keluar</button>
        </div>
    </div>

    <div class="container py-4">
        <div id="view-dashboard">
            <h5 class="fw-bold mb-4">Menu Utama</h5>
            <div class="row g-3">
                <div class="col-6"><div class="card card-custom p-4 text-center" onclick="chooseMember()">
                    <h1>🥗</h1><div class="fw-bold small mt-2">Kalkulator Gizi</div>
                </div></div>
                <div class="col-6"><div class="card card-custom p-4 text-center">
                    <h1>📊</h1><div class="fw-bold small mt-2">Laporan Dusun</div>
                </div></div>
            </div>
        </div>

        <div id="view-detail">
            <button onclick="goBack()" class="btn btn-light btn-sm mb-3 no-print border rounded-pill">← Kembali</button>
            <div id="detail-body"></div>
        </div>
    </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzds1HbyzTgpXRjt18wkrx8g5Rm1QaFzw9H2YBLlYnh5ldBcXs2qL56oOy-C6zHUGEgoQ/exec"; 
let USER = null, DATA = null, piring = [], selectedMember = null;

async function doLogin() {
    const nik = document.getElementById('nik').value, pass = document.getElementById('pass').value;
    Swal.fire({title: 'Memverifikasi...', didOpen:()=>Swal.showLoading()});
    const res = await fetch(WEB_APP_URL, {method:'POST', body: JSON.stringify({action:'login', nik, password:pass})}).then(r=>r.json());
    if(res.status==='success') { USER=res.user; localStorage.setItem('bulo_session', JSON.stringify(USER)); initApp(); Swal.close(); }
    else { Swal.fire('Error', res.message, 'error'); }
}

function doLogout() { localStorage.removeItem('bulo_session'); location.reload(); }

async function initApp() {
    document.getElementById('login-screen').classList.replace('d-flex', 'd-none');
    document.getElementById('app-content').style.display = 'block';
    document.getElementById('u-name').innerText = USER.nama;
    const res = await fetch(WEB_APP_URL, {method:'POST', body: JSON.stringify({action:'get_dashboard', user:USER})}).then(r=>r.json());
    DATA = res.data;
}

function chooseMember() {
    let opts = DATA.keluarga.map((k, i) => `<option value="${i}">${k.nama}</option>`).join('');
    Swal.fire({
        title: 'Pilih Anggota Keluarga',
        html: `<select id="idx-mem" class="form-select rounded-pill mt-2">${opts}</select>`,
        confirmButtonText: 'Mulai'
    }).then(r => {
        if(r.isConfirmed) {
            selectedMember = DATA.keluarga[document.getElementById('idx-mem').value];
            piring = []; renderCalc();
            document.getElementById('view-dashboard').style.display = 'none';
            document.getElementById('view-detail').style.display = 'block';
        }
    });
}

function addPiring() {
    let f = DATA.master_gizi[document.getElementById('f-sel').value];
    let g = document.getElementById('f-gram').value;
    if(!g || g <= 0) return;
    
    let ratio = parseFloat(g) / 100;
    piring.push({
        nama: f[0], gram: g,
        kal: (f[1] * ratio).toFixed(1),
        pro: (f[2] * ratio).toFixed(1),
        lem: (f[3] * ratio).toFixed(1),
        kar: (f[4] * ratio).toFixed(1),
        fe: (f[5] * ratio).toFixed(1)
    });
    document.getElementById('f-gram').value = "";
    renderCalc();
}

function renderCalc() {
    let optFood = DATA.master_gizi.map((f, i) => `<option value="${i}">${f[0]}</option>`).join('');
    let total = { kal:0, pro:0, lem:0, kar:0, fe:0 };
    piring.forEach(p => { 
        total.kal += parseFloat(p.kal); total.pro += parseFloat(p.pro); 
        total.lem += parseFloat(p.lem); total.kar += parseFloat(p.kar); total.fe += parseFloat(p.fe);
    });

    let t = selectedMember.target;
    let alerts = [];
    if (total.fe < t.fe) alerts.push("🔴 <b>Zat Besi Kurang:</b> Tambahkan Hati Ayam/Daun Kelor.");
    if (total.pro < t.pro * 0.7) alerts.push("🟡 <b>Protein Rendah:</b> Tambahkan Ikan atau Telur.");
    if (total.lem > t.lem) alerts.push("🚫 <b>Lemak Berlebih:</b> Kurangi minyak/santan harian.");

    document.getElementById('detail-body').innerHTML = `
        <div class="card card-custom p-3 mb-4 no-print">
            <h5 class="fw-bold mb-0">${selectedMember.nama}</h5>
            <small class="text-muted mb-3 d-block">${selectedMember.infoLabel}</small>
            
            <div class="row text-center mb-3 g-2">
                <div class="col-3 small"><b>Fe</b><br>${total.fe.toFixed(1)}/${t.fe}</div>
                <div class="col-3 small"><b>Pro</b><br>${total.pro.toFixed(1)}/${t.pro}</div>
                <div class="col-3 small"><b>Kal</b><br>${total.kal.toFixed(0)}/${t.kal}</div>
                <div class="col-3 small"><b>Lem</b><br>${total.lem.toFixed(1)}/${t.lem}</div>
            </div>

            <select id="f-sel" class="form-select mb-2 rounded-pill">${optFood}</select>
            <input type="number" id="f-gram" class="form-control mb-3 rounded-pill" placeholder="Berat (gram)">
            <button onclick="addPiring()" class="btn btn-primary w-100 rounded-pill fw-bold">TAMBAH</button>
        </div>

        <div class="print-area p-4 bg-white border rounded card-custom">
            <div class="text-center mb-3"><img src="Lobo_Bulo.png" style="width:70px"><h6 class="fw-bold mt-2">HASIL ANALISIS GIZI</h6></div>
            ${alerts.length > 0 ? `<div class="alert alert-warning small py-2">${alerts.join('<br>')}</div>` : `<div class="alert alert-success small py-2">✅ Gizi Seimbang!</div>`}
            <table class="table table-sm small">
                <thead><tr class="table-light"><th>Bahan</th><th>Porsi</th><th>Fe</th><th>Pro</th></tr></thead>
                <tbody>${piring.map(p => `<tr><td>${p.nama}</td><td>${p.gram}g</td><td>${p.fe}</td><td>${p.pro}</td></tr>`).join('')}</tbody>
            </table>
            <button onclick="window.print()" class="btn btn-dark btn-sm w-100 mt-2 rounded-pill no-print">CETAK</button>
        </div>
    `;
}

function goBack() { document.getElementById('view-detail').style.display='none'; document.getElementById('view-dashboard').style.display='block'; }
</script>
</body>
</html>
