<div id="app-gizi" class="page">
    <div class="top-header d-flex align-items-center" style="padding-bottom: 30px;">
        <i class="bi bi-chevron-left fs-4 me-3" onclick="switchPage('app-home')"></i>
        <h6 class="mb-0 fw-bold">Analisa Gizi Harian</h6>
    </div>
    <div class="content-area">
        <div class="premium-card p-2">
            <input type="text" id="search-food" class="form-control rounded-pill border-0 bg-light px-3 small" placeholder="Cari makanan (Nasi, Ikan, dll)..." onkeyup="filterFood()">
            <div id="food-results" class="list-group mt-2 d-none shadow-sm" style="max-height:180px; overflow-y:auto; border-radius:15px;"></div>
        </div>
        
        <div id="selected-list" class="d-none">
            <h6 class="small fw-bold text-muted mb-2">Daftar Konsumsi:</h6>
            <div id="current-meal-items"></div>
            
            <div class="premium-card bg-primary text-white text-center py-3 shadow">
                <small class="opacity-75">ESTIMASI TOTAL</small>
                <h4 class="mb-0 fw-bold" id="total-kalori">0 kkal</h4>
            </div>
            
            <button onclick="prosesAnalisaGizi()" class="btn btn-dark w-100 py-3 mt-2 rounded-pill fw-bold shadow">
                <i class="bi bi-graph-up-arrow me-2"></i> ANALISA SEKARANG
            </button>
        </div>
    </div>
</div>

<script>
    // Fungsi baru untuk melakukan analisa sebelum simpan
    function prosesAnalisaGizi() {
        let total = 0;
        currentMeal.forEach(i => total += (i.kalori * i.gram) / 100);
        
        // Logika Analisa Sederhana (Bisa disesuaikan dengan standar medis)
        let status = "";
        let saran = "";
        let warna = "";

        if (total < 500) {
            status = "SANGAT RENDAH";
            saran = "Asupan kalori Anda untuk satu porsi makan ini masih sangat rendah. Pastikan kecukupan gizi tercapai.";
            warna = "#ffc107";
        } else if (total <= 800) {
            status = "IDEAL / NORMAL";
            saran = "Porsi makan ini sudah sangat baik dan seimbang untuk asupan gizi harian warga.";
            warna = "#198754";
        } else {
            status = "KALORI TINGGI";
            saran = "Perhatikan porsi makan Anda. Konsumsi kalori berlebih dalam satu waktu dapat meningkatkan risiko obesitas.";
            warna = "#dc3545";
        }

        // Tampilkan Hasil Analisa
        Swal.fire({
            title: 'Hasil Analisa Gizi',
            html: `
                <div class="text-center">
                    <h1 style="color: ${warna}; font-weight: 800;">${total.toFixed(0)} <small style="font-size: 1rem">kkal</small></h1>
                    <div class="badge p-2 mb-3" style="background-color: ${warna}">${status}</div>
                    <p class="text-muted small">${saran}</p>
                    <hr>
                    <small>Ingin menyimpan data makan ini ke riwayat kesehatan?</small>
                </div>
            `,
            showCancelButton: true,
            confirmButtonText: 'Ya, Simpan',
            cancelButtonText: 'Batal',
            confirmButtonColor: '#00569e',
            cancelButtonColor: '#aaa',
            reverseButtons: true
        }).then((result) => {
            if (result.isConfirmed) {
                confirmSaveGizi(total);
            }
        });
    }

    async function confirmSaveGizi(finalKalori) {
        Swal.fire({
            title: 'Menyimpan...',
            didOpen: () => { Swal.showLoading(); }
        });

        // Simulasi pengiriman data ke Google Sheets
        const dataToSave = {
            action: 'save_gizi',
            nik: USER_SESSION.nik,
            total_kkal: finalKalori,
            items: currentMeal.map(i => i.nama).join(', ')
        };

        try {
            // Gantilah ini dengan fetch ke WEB_APP_URL Bapak nanti
            console.log("Saving data:", dataToSave);
            
            setTimeout(() => {
                Swal.fire('Berhasil', 'Data gizi harian Anda telah tercatat di sistem.', 'success');
                currentMeal = [];
                renderMeal();
                document.getElementById('selected-list').classList.add('d-none');
            }, 1000);
        } catch (e) {
            Swal.fire('Error', 'Gagal terhubung ke database', 'error');
        }
    }

    // Penyesuaian render agar tombol simpan lama hilang
    function renderMeal() {
        document.getElementById('current-meal-items').innerHTML = currentMeal.map(i => `
            <div class="premium-card p-2 mb-2 d-flex align-items-center gap-2 border-start border-primary border-4 shadow-none bg-light">
                <div style="flex:1" class="fw-bold small">${i.nama}</div>
                <div id="cal-${i.id}" class="small text-muted" style="min-width:65px">${((i.kalori*i.gram)/100).toFixed(0)} kkal</div>
                <input type="number" class="input-gram" value="${i.gram}" oninput="updateGram(${i.id}, this.value)">
                <i class="bi bi-x-circle text-danger fs-5" onclick="removeItem(${i.id})"></i>
            </div>`).join('');
        calculateTotal();
        if(currentMeal.length > 0) document.getElementById('selected-list').classList.remove('d-none');
    }
</script>
