<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bulo Smartville v14.2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --main-blue: #00569e; 
            --dark-blue: #003d70; 
            --bg-gray: #f4f7f9;
            --accent-green: #2ecc71;
            --vh: 1vh;
        }
        
        html, body { 
            height: 100vh; height: calc(var(--vh, 1vh) * 100);
            overflow: hidden; background: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; 
            position: fixed; width: 100%;
        }

        /* SPLASH SCREEN */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10000;
            transition: opacity 0.6s ease-in-out;
        }
        .splash-logo { width: 160px; height: auto; margin-bottom: 25px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .page { display: none; height: 100%; width: 100%; flex-direction: column; background: var(--bg-gray); }

        /* HEADER & CARDS */
        .top-header { 
            background: linear-gradient(135deg, var(--main-blue), var(--dark-blue)); 
            color: white; padding: 30px 20px 60px; 
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; 
            flex-shrink: 0; 
        }

        .content-area { 
            flex: 1; overflow-y: auto; padding: 0 20px 120px; 
            margin-top: -40px; -webkit-overflow-scrolling: touch; 
        }

        .premium-card {
            background: white; border-radius: 20px; padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: none; margin-bottom: 20px;
        }

        /* GIZI UI ENHANCEMENT */
        .food-item-card {
            background: white; border-radius: 15px; padding: 15px;
            border-left: 5px solid var(--main-blue);
            transition: transform 0.2s;
        }
        .food-item-card:active { transform: scale(0.98); }

        .input-berat-wrapper {
            background: #f1f3f5; border-radius: 10px; padding: 5px 12px;
            display: flex; align-items: center;
        }

        /* BOTTOM NAV */
        .bottom-nav { 
            height: 85px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,0,0,0.05); display: flex; 
            justify-content: space-around; align-items: center; 
            position: absolute; bottom: 0; width: 100%; z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-link { text-align: center; color: #b0b0b0; text-decoration: none; font-size: 0.7rem; transition: 0.3s; }
        .nav-link.active { color: var(--main-blue); transform: translateY(-5px); }
        .nav-link i { font-size: 1.6rem; display: block; margin-bottom: 2px; }

        .btn-qr-main { 
            width: 65px; height: 65px; background: var(--main-blue); 
            border-radius: 22px; display: flex; align-items: center; justify-content: center; 
            color: white; font-size: 1.8rem; margin-top: -60px; 
            box-shadow: 0 8px 20px rgba(0,86,158,0.4); border: 4px solid var(--bg-gray);
        }
    </style>
</head>
<body onload="fetchAndInit()">

    <div id="splash-screen">
        <img src="Logo_UMMAN.jpg" class="splash-logo" alt="UMMAN" onerror="this.src='https://upload.wikimedia.org/wikipedia/id/d/de/Logo_Universitas_Muhammadiyah_Manado.png'">
        <div class="splash-footer fw-bold text-muted" style="position:absolute; bottom:50px;">Digitalisasi Desa Bulo</div>
    </div>

    <div id="login-screen" class="page" style="justify-content:center; align-items:center; background:white;">
        <div class="w-100 p-4 text-center" style="max-width: 400px;">
            <img src="Logo_Bulo.png" style="width:140px; margin-bottom:30px;" alt="Bulo">
            <h3 class="fw-bold text-dark">Selamat Datang</h3>
            <p class="text-muted mb-5">Silakan masuk dengan NIK Anda</p>
            <input type="number" id="nik" class="form-control form-control-lg rounded-pill border-0 bg-light px-4 mb-3" placeholder="NIK">
            <input type="password" id="pass" class="form-control form-control-lg rounded-pill border-0 bg-light px-4 mb-4" placeholder="Password">
            <button onclick="handleLogin()" class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow">MASUK APLIKASI</button>
        </div>
    </div>

    <div id="app-home" class="page">
        <div class="top-header">
            <div class="d-flex justify-content-between align-items-center">
                <div><small class="opacity-75">Profil Warga</small><h5 class="mb-0 fw-bold" id="user-display">Memuat...</h5></div>
                <div class="bg-white bg-opacity-25 rounded-circle p-2" onclick="confirmLogout()"><i class="bi bi-power"></i></div>
            </div>
        </div>
        
        <div class="content-area">
            <div class="premium-card text-center">
                <div class="row">
                    <div class="col-6 border-end">
                        <small class="text-muted d-block">Status BMI</small>
                        <span id="user-bmi" class="fw-bold text-primary">Normal</span>
                    </div>
                    <div class="col-6">
                        <small class="text-muted d-block">Saldo Bank Sampah</small>
                        <span id="info-saldo" class="fw-bold text-success">Rp 0</span>
                    </div>
                </div>
            </div>

            <h6 class="fw-bold mb-3"><i class="bi bi-people-fill me-2 text-primary"></i>Anggota Keluarga (KK)</h6>
            <div id="family-list" class="mb-4">
                </div>
        </div>

        <div class="bottom-nav">
            <a href="javascript:void(0)" onclick="switchPage('app-home')" class="nav-link active"><i class="bi bi-grid-1x2-fill"></i>Beranda</a>
            <div onclick="showQR()"><div class="btn-qr-main"><i class="bi bi-qr-code-scan"></i></div></div>
            <a href="javascript:void(0)" onclick="switchPage('app-gizi')" class="nav-link"><i class="bi bi-egg-fried"></i>Gizi</a>
        </div>
    </div>

    <div id="app-gizi" class="page">
        <div class="top-header" style="padding-bottom: 40px;">
            <div class="d-flex align-items-center">
                <i class="bi bi-arrow-left fs-4 me-3" onclick="switchPage('app-home')"></i>
                <h5 class="mb-0 fw-bold">Kalkulator Gizi Premium</h5>
            </div>
        </div>
        <div class="content-area" style="margin-top: -20px;">
            <div class="premium-card">
                <label class="small fw-bold text-muted mb-2">CARI & TAMBAH MENU</label>
                <div class="input-group">
                    <span class="input-group-text border-0 bg-light"><i class="bi bi-search"></i></span>
                    <input type="text" id="search-food" class="form-control border-0 bg-light" placeholder="Ketik nama makanan..." onkeyup="filterFood()">
                </div>
                <div id="food-results" class="list-group mt-2 border-0 shadow-sm" style="display:none; max-height: 200px; overflow-y: auto;"></div>
            </div>

            <div id="selected-list" class="d-none">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="fw-bold mb-0">Daftar Konsumsi</h6>
                    <span class="badge bg-primary rounded-pill" id="count-item">0 Menu</span>
                </div>
                <div id="current-meal-items"></div>
                
                <div class="premium-card mt-4 bg-primary text-white">
                    <div class="d-flex justify-content-between align-items-center" onclick="hitungGiziFinal()">
                        <div>
                            <small class="opacity-75">Siap dihitung?</small>
                            <h5 class="mb-0 fw-bold">Proses & Simpan Data</h5>
                        </div>
                        <i class="bi bi-arrow-right-circle-fill fs-1"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw6CKdpyg71G1jUBN5EyZWDyqsVzqUYqElkpE1XH3fh-cbiMfEjFvhxKubK-dJI74pb7A/exec";
        let DB_FULL = null; let USER_SESSION = null; let currentMeal = [];

        function setRealHeight() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        window.addEventListener('resize', setRealHeight); setRealHeight();

        async function fetchAndInit() {
            try {
                const response = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'read_all' }) });
                const result = await response.json();
                if(result.status === 'success') {
                    DB_FULL = result.db;
                    setTimeout(() => {
                        document.getElementById('splash-screen').style.opacity = '0';
                        setTimeout(() => {
                            document.getElementById('splash-screen').style.display = 'none';
                            const saved = localStorage.getItem('bulo_user');
                            if(saved) {
                                USER_SESSION = JSON.parse(saved);
                                initDashboard(); switchPage('app-home');
                            } else { switchPage('login-screen'); }
                        }, 600);
                    }, 2000);
                }
            } catch (e) { Swal.fire('Error','Koneksi Gagal','error'); }
        }

        function handleLogin() {
            const nik = document.getElementById('nik').value;
            const pass = document.getElementById('pass').value;
            const user = DB_FULL.Master_Data_Penduduk.find(r => r[0].toString() === nik && r[1].toString() === pass);
            if(user) {
                USER_SESSION = { nik: user[0].toString(), nama: user[2], role: user[9], kk: user[7].toString() };
                localStorage.setItem('bulo_user', JSON.stringify(USER_SESSION));
                initDashboard(); switchPage('app-home');
            } else { Swal.fire('Gagal','NIK atau Password salah','error'); }
        }

        function initDashboard() {
            document.getElementById('user-display').innerText = USER_SESSION.nama;
            
            // Cari Anggota Keluarga Berdasarkan Nomor KK
            const family = DB_FULL.Master_Data_Penduduk.filter(r => r[7].toString() === USER_SESSION.kk);
            const listDiv = document.getElementById('family-list');
            listDiv.innerHTML = family.map(f => `
                <div class="premium-card p-3 mb-2 d-flex align-items-center">
                    <div class="rounded-circle bg-light p-3 me-3"><i class="bi bi-person text-primary"></i></div>
                    <div>
                        <div class="fw-bold">${f[2]}</div>
                        <small class="text-muted">${f[0]}</small>
                    </div>
                </div>
            `).join('');

            // Saldo & Status BMI Sederhana (Contoh logika)
            const saldo = DB_FULL.sampah_saldo.find(r => r[0].toString() === USER_SESSION.nik);
            if(saldo) document.getElementById('info-saldo').innerText = `Rp ${parseInt(saldo[2] || 0).toLocaleString()}`;
        }

        // --- GIZI UI LOGIC ---
        function filterFood() {
            const q = document.getElementById('search-food').value.toLowerCase();
            const res = document.getElementById('food-results');
            if(q.length < 2) { res.style.display = 'none'; return; }
            const matches = DB_FULL.master_gizi.filter(r => r[0] && r[0].toLowerCase().includes(q));
            res.innerHTML = matches.slice(0, 5).map(m => `
                <button onclick="addFood('${m[0]}', ${m[1]}, ${m[5]})" class="list-group-item list-group-item-action border-0 py-3">
                    <i class="bi bi-plus-circle me-2 text-primary"></i>${m[0]}
                </button>
            `).join('');
            res.style.display = 'block';
        }

        function addFood(nama, kal, fe) {
            currentMeal.push({ id: Date.now()+Math.random(), nama, kalDasar: kal, feDasar: fe, berat: 100 });
            renderSelected();
            document.getElementById('food-results').style.display = 'none';
            document.getElementById('search-food').value = '';
        }

        function renderSelected() {
            const div = document.getElementById('current-meal-items');
            document.getElementById('selected-list').classList.toggle('d-none', currentMeal.length === 0);
            document.getElementById('count-item').innerText = `${currentMeal.length} Menu`;
            div.innerHTML = currentMeal.map(item => `
                <div class="food-item-card shadow-sm mb-3">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <div>
                            <h6 class="fw-bold mb-0">${item.nama}</h6>
                            <small class="text-muted">${item.kalDasar} kkal / 100g</small>
                        </div>
                        <i class="bi bi-x-lg text-danger" onclick="removeFood(${item.id})"></i>
                    </div>
                    <div class="input-berat-wrapper">
                        <small class="fw-bold text-muted me-2">Berat:</small>
                        <input type="number" class="form-control form-control-sm border-0 bg-transparent text-center fw-bold" 
                               style="width: 80px;" value="${item.berat}" onchange="updateBerat(${item.id}, this.value)">
                        <small class="fw-bold text-muted ms-1">Gram</small>
                    </div>
                </div>
            `).join('');
        }

        async function hitungGiziFinal() {
            let totalKal = 0; let totalFe = 0;
            currentMeal.forEach(i => {
                totalKal += (i.berat / 100) * i.kalDasar;
                totalFe += (i.berat / 100) * i.feDasar;
            });

            Swal.fire({
                title: 'Ringkasan Gizi',
                html: `
                    <div class="py-3">
                        <h1 class="text-primary fw-bold mb-0">${totalKal.toFixed(0)}</h1>
                        <p class="text-muted">Total Kilokalori</p>
                        <hr>
                        <div class="text-start small">
                            <b>Zat Besi:</b> ${totalFe.toFixed(2)} mg<br>
                            <b>Menu:</b> ${currentMeal.map(m=>m.nama).join(', ')}
                        </div>
                    </div>
                `,
                confirmButtonText: 'Simpan ke Database',
                showCancelButton: true,
                confirmButtonColor: '#00569e'
            }).then(r => { if(r.isConfirmed) saveToDB(totalKal, totalFe); });
        }

        async function saveToDB(k, f) {
            Swal.fire({ title: 'Mengirim data...', didOpen: () => Swal.showLoading() });
            try {
                const data = { action: 'save_gizi', nik: USER_SESSION.nik, kalori: k, fe: f, menu: currentMeal.map(m => m.nama).join(', ') };
                await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(data) });
                Swal.fire({ icon: 'success', title: 'Data Tersimpan!', showConfirmButton: false, timer: 1500 });
                currentMeal = []; renderSelected(); switchPage('app-home');
            } catch (e) { Swal.fire('Error','Gagal simpan','error'); }
        }

        function updateBerat(id, val) { const item = currentMeal.find(x => x.id === id); if(item) item.berat = parseFloat(val) || 0; }
        function removeFood(id) { currentMeal = currentMeal.filter(x => x.id !== id); renderSelected(); }
        function switchPage(p) { document.querySelectorAll('.page').forEach(pg => pg.style.display = 'none'); document.getElementById(p).style.display = 'flex'; }
        function confirmLogout() { Swal.fire({ title: 'Logout?', showCancelButton: true }).then(r => { if(r.isConfirmed) { localStorage.clear(); location.reload(); } }); }
        function showQR() { Swal.fire({ title: 'ID WARGA', imageUrl: `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${USER_SESSION.nik}` }); }
    </script>
</body>
</html>
