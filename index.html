<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulo SmartVille</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #003d70; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }
        .login-card {
            background: white; padding: 40px 30px; border-radius: 30px;
            width: 100%; max-width: 380px; margin: auto; margin-top: 10vh; text-align: center;
        }
        img { max-width: 150px; height: auto; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="splash">
        <img src="Logo_UMMAN.jpg" alt="Logo UM">
        <b style="color: #003d70;">HEBAT, MAJU DENGAN PESAT</b>
    </div>

    <div class="container d-flex" style="min-height: 100vh;">
        <div class="login-card shadow">
            <img src="Lobo_Bulo.png" alt="Logo Aplikasi" style="max-width: 80px;">
            <h4 class="fw-bold mb-4">Bulo SmartVille</h4>
            <input type="number" id="nik" class="form-control mb-3" placeholder="NIK">
            <input type="password" id="pass" class="form-control mb-4" placeholder="Password">
            <button class="btn btn-primary w-100 p-3 fw-bold" onclick="prosesLogin()" style="background: #003d70; border:none;">MASUK</button>
        </div>
    </div>

    <script>
        // GANTI DENGAN URL DEPLOY TERBARU BAPAK
        const API_URL = "https://script.google.com/macros/s/AKfycbySusZZRIimRjp3oZE00UwTkwqlZTcWDEOtBuQGeRIww7vaiC0seFGmq4xn6hDgVS8ldg/exec"; 

        window.onload = () => {
            setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 3000);
        };

        async function prosesLogin() {
            const nik = document.getElementById('nik').value;
            const pass = document.getElementById('pass').value;
            if (!nik || !pass) return Swal.fire('Oops', 'Isi NIK dan Password!', 'warning');

            Swal.fire({ title: 'Menghubungkan...', didOpen: () => Swal.showLoading() });

            try {
                const res = await fetch(`${API_URL}?action=get_all_sheets_data`);
                const json = await res.json();
                const db = json.data.Master_Data_Penduduk;
                const user = db.find(r => r[0].toString() === nik && r[1].toString() === pass);

                if (user) {
                    Swal.fire({ icon: 'success', title: 'Berhasil!', showConfirmButton: false, timer: 1500 })
                    .then(() => { window.location.href = "dashboard_warga.html"; });
                } else {
                    Swal.fire('Gagal', 'NIK atau Password salah!', 'error');
                }
            } catch (e) {
                Swal.fire('Koneksi Gagal', 'Cek URL Web App di index.html', 'error');
            }
        }
    </script>
</body>
</html>
