<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Warga - Bulo SmartVille</title>
    <script>
        // SECURITY GATE
        if (!localStorage.getItem('nik_login') || !localStorage.getItem('role_login')) {
            window.location.href = "index.html";
        }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #f4f7f6; font-family: 'Inter', sans-serif; padding-bottom: 50px; }
        .header { background: #003d70; color: white; padding: 40px 20px; border-radius: 0 0 40px 40px; text-align: center; position: relative; }
        .btn-logout { position: absolute; top: 15px; right: 15px; font-size: 0.7rem; }
        .card-custom { border-radius: 20px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-top: -20px; background: white; }
    </style>
</head>
<body>
    <div class="header">
        <button onclick="logout()" class="btn btn-outline-light btn-logout">Keluar</button>
        <h4 class="fw-bold">Halo, <span id="nama-user">Warga</span></h4>
        <p class="small opacity-75">NIK: <span id="nik-user">...</span></p>
    </div>

    <div class="container mt-4">
        <div class="card card-custom p-4 mb-4">
            <h6 class="fw-bold text-primary mb-3 text-center text-uppercase">Kalkulator Gizi Mandiri</h6>
            <div class="row g-2 mb-3">
                <div class="col-6"><input type="number" id="tb" class="form-control" placeholder="TB (cm)"></div>
                <div class="col-6"><input type="number" id="bb" class="form-control" placeholder="BB (kg)"></div>
            </div>
            <button class="btn btn-primary w-100 fw-bold" onclick="hitungGizi()">CEK SEKARANG</button>
            <div id="hasil" class="mt-3 p-3 bg-light rounded d-none text-center">
                <h5 id="status-gizi" class="fw-bold"></h5>
                <small id="saran-gizi" class="text-muted"></small>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('nik-user').innerText = localStorage.getItem('nik_login');
        
        function hitungGizi() {
            const tb = document.getElementById('tb').value / 100;
            const bb = document.getElementById('bb').value;
            if(!tb || !bb) return;
            const imt = bb / (tb * tb);
            let status = imt < 18.5 ? "Gizi Kurang" : (imt <= 25 ? "Normal" : "Gizi Lebih");
            let saran = imt < 18.5 ? "Perbanyak protein & karbohidrat." : (imt <= 25 ? "Pertahankan pola makan sehat." : "Kurangi gula & rutin olahraga.");
            
            document.getElementById('hasil').classList.remove('d-none');
            document.getElementById('status-gizi').innerText = status;
            document.getElementById('saran-gizi').innerText = saran;
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
