<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Warga - Bulo SmartVille</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; font-family: 'Inter', sans-serif; }
        .header-warga { background: #003d70; color: white; padding: 40px 20px; border-radius: 0 0 40px 40px; }
        .card-custom { border-radius: 25px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .status-badge { padding: 5px 15px; border-radius: 50px; font-size: 0.8rem; font-weight: bold; }
        .bg-normal { background: #d1e7dd; color: #0f5132; }
        .bg-warning-custom { background: #fff3cd; color: #664d03; }
        .bg-danger-custom { background: #f8d7da; color: #842029; }
    </style>
</head>
<body>

<div class="header-warga text-center">
    <h4 class="fw-bold mb-1">Halo, <span id="nama-warga">...</span></h4>
    <p class="small opacity-75">NIK: <span id="nik-warga">...</span></p>
</div>

<div class="container mt-n4 mb-5" style="margin-top: -30px;">
    <div class="card card-custom p-4 mb-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="fw-bold text-muted small text-uppercase mb-0">Analisis Gizi & Makanan</h6>
            <span id="status-gizi" class="status-badge bg-normal">Menghitung...</span>
        </div>
        
        <div class="row text-center mb-4">
            <div class="col-6 border-end">
                <small class="text-muted d-block">Tinggi Badan</small>
                <h4 class="fw-bold" id="warga-tb">-</h4>
            </div>
            <div class="col-6">
                <small class="text-muted d-block">Berat Badan</small>
                <h4 class="fw-bold" id="warga-bb">-</h4>
            </div>
        </div>

        <div class="p-3 rounded-4" style="background: #f8f9fa; border-left: 5px solid #003d70;">
            <p class="fw-bold mb-1 small text-primary">Rekomendasi Makanan:</p>
            <span id="rekomendasi-makanan" class="small text-muted italic">Data belum tersedia...</span>
        </div>
    </div>

    <div class="card card-custom p-4">
        <h6 class="fw-bold text-muted small text-uppercase mb-3">Tabungan Bank Sampah</h6>
        <div class="d-flex align-items-center justify-content-between">
            <div>
                <h3 class="fw-bold mb-0 text-success">Rp <span id="saldo-rp">0</span></h3>
                <small class="text-muted">Total Saldo Terkumpul</small>
            </div>
            <div class="text-end">
                <h4 class="fw-bold mb-0 text-primary"><span id="total-kg">0</span> Kg</h4>
                <small class="text-muted">Berat Sampah</small>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzVXjDFywiipE5TYG-2fSDXPh3X1mG5O_t3fbccZkX_lHhlg-scq-Ats1LUcUnrDu9Yog/exec"; 

    async function loadDashboard() {
        const userNIK = localStorage.getItem('nik_login');
        if (!userNIK) window.location.href = "index.html";

        try {
            const res = await fetch(`${API_URL}?action=get_all_sheets_data`);
            const json = await res.json();

            // 1. Proses Data Gizi
            const warga = json.data.Master_Data_Penduduk.find(r => r[0].toString() === userNIK);
            if (warga) {
                document.getElementById('nama-warga').innerText = warga[2];
                document.getElementById('nik-warga').innerText = warga[0];
                const tb = parseFloat(warga[12] || 0);
                const bb = parseFloat(warga[13] || 0);
                document.getElementById('warga-tb').innerText = tb + " cm";
                document.getElementById('warga-bb').innerText = bb + " kg";

                hitungGizi(tb, bb);
            }

            // 2. Proses Saldo Sampah
            const saldo = json.data.sampah_saldo.find(r => r[0].toString() === userNIK);
            if (saldo) {
                document.getElementById('saldo-rp').innerText = parseInt(saldo[2] || 0).toLocaleString();
                document.getElementById('total-kg').innerText = saldo[3] || 0;
            }
        } catch (e) { console.log("Error data"); }
    }

    function hitungGizi(tb, bb) {
        if (tb === 0 || bb === 0) return;

        const tbMeter = tb / 100;
        const imt = bb / (tbMeter * tbMeter);
        let status = "";
        let saran = "";
        let badgeClass = "";

        if (imt < 18.5) {
            status = "Gizi Kurang";
            badgeClass = "bg-danger-custom";
            saran = "Perbanyak asupan karbohidrat dan protein seperti telur, ikan, dan kacang-kacangan untuk menambah berat badan ideal.";
        } else if (imt >= 18.5 && imt <= 25) {
            status = "Gizi Normal";
            badgeClass = "bg-normal";
            saran = "Pertahankan pola makan bergizi seimbang. Perbanyak sayur dan buah setiap hari.";
        } else {
            status = "Kelebihan Berat Badan";
            badgeClass = "bg-warning-custom";
            saran = "Kurangi konsumsi gula dan gorengan. Tingkatkan aktivitas fisik dan konsumsi serat dari buah-buahan.";
        }

        document.getElementById('status-gizi').innerText = status;
        document.getElementById('status-gizi').className = "status-badge " + badgeClass;
        document.getElementById('rekomendasi-makanan').innerText = saran;
    }

    window.onload = loadDashboard;
</script>
</body>
</html>
