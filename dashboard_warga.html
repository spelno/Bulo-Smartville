<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Warga - Bulo SmartVille</title>
    
    <script>
        const sessionNIK = localStorage.getItem('nik_login');
        const sessionRole = localStorage.getItem('role_login');
        // Jika tidak ada NIK atau Role, langsung tendang ke index.html
        if (!sessionNIK || !sessionRole) {
            window.location.href = "index.html";
        }
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #003d70; --secondary: #005fa3; }
        body { background: #f0f2f5; font-family: 'Inter', sans-serif; padding-bottom: 80px; }
        
        .header-warga { background: var(--primary); color: white; padding: 45px 25px; border-radius: 0 0 45px 45px; position: relative; }
        .btn-logout-top { position: absolute; top: 20px; right: 20px; }
        
        .card-custom { border-radius: 25px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.08); background: white; transition: 0.3s; }
        .status-badge { padding: 6px 16px; border-radius: 50px; font-size: 0.85rem; font-weight: 700; }
        
        /* Warna Status Gizi */
        .bg-normal { background: #e2f9e1; color: #1b5e20; }
        .bg-warning-custom { background: #fff9c4; color: #f57f17; }
        .bg-danger-custom { background: #ffebee; color: #b71c1c; }

        .calc-input { border-radius: 12px; border: 1px solid #eee; padding: 12px; margin-bottom: 10px; background: #fdfdfd; }
        .btn-calc { background: var(--primary); color: white; border-radius: 12px; width: 100%; font-weight: bold; border: none; padding: 12px; }
        .btn-calc:hover { background: var(--secondary); transform: scale(1.02); }
    </style>
</head>
<body>

<div class="header-warga text-center">
    <div class="btn-logout-top">
        <button onclick="logout()" class="btn btn-sm btn-outline-light" style="border-radius: 50px; padding: 5px 15px; font-size: 0.75rem;">Keluar</button>
    </div>
    
    <h4 class="fw-bold mb-1">Halo, <span id="nama-warga">...</span></h4>
    <p class="small opacity-75">"Satu Data, Sejuta Manfaat"</p>
</div>

<div class="container mt-n4" style="margin-top: -35px;">
    
    <div class="card card-custom p-4 mb-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="fw-bold text-muted small text-uppercase mb-0">Hasil Periksa Petugas</h6>
            <span id="status-gizi-db" class="status-badge bg-normal">Normal</span>
        </div>
        <div class="row text-center mb-3">
            <div class="col-6 border-end">
                <small class="text-muted d-block small">TB (Database)</small>
                <h4 class="fw-bold text-primary" id="db-tb">-</h4>
            </div>
            <div class="col-6">
                <small class="text-muted d-block small">BB (Database)</small>
                <h4 class="fw-bold text-primary" id="db-bb">-</h4>
            </div>
        </div>
        <div class="p-3 rounded-3 bg-light border-start border-4 border-primary">
            <p class="fw-bold mb-1 small">Saran Gizi:</p>
            <span id="saran-db" class="small text-muted italic">Menarik data terbaru...</span>
        </div>
    </div>

    <div class="card card-custom p-4 mb-4" style="background: linear-gradient(135deg, #ffffff 0%, #f0f7ff 100%);">
        <h6 class="fw-bold text-primary small text-uppercase mb-3 text-center">Kalkulator Gizi Mandiri</h6>
        <div class="row g-2">
            <div class="col-6">
                <input type="number" id="calc-tb" class="form-control calc-input" placeholder="Tinggi (cm)">
            </div>
            <div class="col-6">
                <input type="number" id="calc-bb" class="form-control calc-input" placeholder="Berat (kg)">
            </div>
        </div>
        <button class="btn-calc" onclick="hitungMandiri()">Cek Status Gizi</button>
        
        <div id="hasil-kalkulator" class="mt-4 text-center d-none">
            <hr>
            <p class="small text-muted mb-1">Status Anda Saat Ini:</p>
            <h5 class="fw-bold" id="calc-status">Normal</h5>
            <div class="p-3 rounded-3 bg-white border border-primary-subtle mt-2 shadow-sm">
                <small id="calc-saran" class="text-muted"></small>
            </div>
        </div>
    </div>

    <div class="card card-custom p-4">
        <h6 class="fw-bold text-muted small text-uppercase mb-3">Saldo Tabungan Sampah</h6>
        <div class="d-flex align-items-center justify-content-between">
            <div>
                <h3 class="fw-bold mb-0 text-success">Rp <span id="saldo-rp">0</span></h3>
                <small class="text-muted">Total Saldo</small>
            </div>
            <div class="text-end">
                <h4 class="fw-bold mb-0 text-primary"><span id="total-kg">0</span> Kg</h4>
                <small class="text-muted">Total Sampah</small>
            </div>
        </div>
    </div>
</div>

<script>
    // MASUKKAN URL WEB APP BAPAK DI SINI
    const API_URL = "https://script.google.com/macros/s/AKfycbzVXjDFywiipE5TYG-2fSDXPh3X1mG5O_t3fbccZkX_lHhlg-scq-Ats1LUcUnrDu9Yog/exec"; 

    async function loadDashboard() {
        const userNIK = localStorage.getItem('nik_login');

        try {
            const res = await fetch(`${API_URL}?action=get_all_sheets_data`);
            const json = await res.json();

            // 1. Ambil Data Penduduk & Gizi
            const warga = json.data.Master_Data_Penduduk.find(r => r[0].toString() === userNIK);
            if (warga) {
                document.getElementById('nama-warga').innerText = warga[2];
                const tb = parseFloat(warga[12] || 0);
                const bb = parseFloat(warga[13] || 0);
                document.getElementById('db-tb').innerText = tb + " cm";
                document.getElementById('db-bb').innerText = bb + " kg";
                
                const analisis = hitungStatusGizi(tb, bb);
                document.getElementById('status-gizi-db').innerText = analisis.status;
                document.getElementById('status-gizi-db').className = "status-badge " + analisis.badge;
                document.getElementById('saran-db').innerText = analisis.saran;
            }

            // 2. Ambil Data Saldo Sampah
            const saldo = json.data.sampah_saldo.find(r => r[0].toString() === userNIK);
            if (saldo) {
                document.getElementById('saldo-rp').innerText = parseInt(saldo[2] || 0).toLocaleString();
                document.getElementById('total-kg').innerText = saldo[3] || 0;
            }
        } catch (e) {
            Swal.fire('Error', 'Gagal memuat data dari server.', 'error');
        }
    }

    function hitungStatusGizi(tb, bb) {
        if (tb === 0 || bb === 0) return {status: "-", saran: "Data belum diinput petugas.", badge: "bg-secondary text-white"};
        const imt = bb / ((tb/100) * (tb/100));
        if (imt < 18.5) return {status: "Gizi Kurang", badge: "bg-danger-custom", saran: "Saran: Perbanyak karbohidrat dan protein seperti telur, ikan, dan kacang-kacangan."};
        if (imt <= 25) return {status: "Normal", badge: "bg-normal", saran: "Saran: Pertahankan pola makan bergizi seimbang dan rutin berolahraga."};
        return {status: "Gizi Lebih", badge: "bg-warning-custom", saran: "Saran: Kurangi gorengan dan gula, perbanyak konsumsi serat (buah/sayur)."};
    }

    function hitungMandiri() {
        const tb = document.getElementById('calc-tb').value;
        const bb = document.getElementById('calc-bb').value;
        if (!tb || !bb) return Swal.fire('Oops!', 'Isi TB dan BB dulu, ya.', 'warning');

        const hasil = hitungStatusGizi(parseFloat(tb), parseFloat(bb));
        document.getElementById('hasil-kalkulator').classList.remove('d-none');
        document.getElementById('calc-status').innerText = hasil.status;
        document.getElementById('calc-saran').innerText = hasil.saran;
    }

    function logout() {
        Swal.fire({
            title: 'Keluar?',
            text: "Anda akan keluar dari sistem Bulo SmartVille.",
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#003d70',
            cancelButtonColor: '#d33',
            confirmButtonText: 'Ya, Keluar'
        }).then((result) => {
            if (result.isConfirmed) {
                localStorage.clear();
                window.location.href = "index.html";
            }
        });
    }

    window.onload = loadDashboard;
</script>
</body>
</html>
