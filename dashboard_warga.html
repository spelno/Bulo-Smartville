<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Warga - Bulo SmartVille</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #003d70; --secondary: #005fa3; }
        body { background: #f0f2f5; font-family: 'Inter', sans-serif; padding-bottom: 50px; }
        .header-warga { background: var(--primary); color: white; padding: 40px 20px; border-radius: 0 0 40px 40px; }
        .card-custom { border-radius: 25px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.08); background: white; }
        .status-badge { padding: 6px 16px; border-radius: 50px; font-size: 0.85rem; font-weight: 700; }
        .bg-normal { background: #e2f9e1; color: #1b5e20; }
        .bg-warning-custom { background: #fff9c4; color: #f57f17; }
        .bg-danger-custom { background: #ffebee; color: #b71c1c; }
        .calc-input { border-radius: 12px; border: 1px solid #eee; padding: 12px; margin-bottom: 10px; }
        .btn-calc { background: var(--primary); color: white; border-radius: 12px; width: 100%; font-weight: bold; border: none; padding: 12px; transition: 0.3s; }
        .btn-calc:hover { background: var(--secondary); transform: scale(1.02); }
    </style>
</head>
<body>

<div class="header-warga text-center">
    <h4 class="fw-bold mb-1">Halo, <span id="nama-warga">...</span></h4>
    <p class="small opacity-75">Satu Data, Sejuta Manfaat</p>
</div>

<div class="container mt-n4" style="margin-top: -30px;">
    
    <div class="card card-custom p-4 mb-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="fw-bold text-muted small text-uppercase mb-0">Hasil Periksa Petugas</h6>
            <span id="status-gizi-db" class="status-badge bg-normal">Normal</span>
        </div>
        <div class="row text-center mb-3">
            <div class="col-6 border-end">
                <small class="text-muted d-block">TB (Database)</small>
                <h4 class="fw-bold" id="db-tb">-</h4>
            </div>
            <div class="col-6">
                <small class="text-muted d-block">BB (Database)</small>
                <h4 class="fw-bold" id="db-bb">-</h4>
            </div>
        </div>
        <div class="p-3 rounded-3 bg-light border-start border-4 border-primary">
            <p class="fw-bold mb-1 small">Saran Makanan:</p>
            <span id="saran-db" class="small text-muted italic">Menunggu data...</span>
        </div>
    </div>

    <div class="card card-custom p-4 mb-4" style="background: linear-gradient(to bottom, #ffffff, #f9fbff);">
        <h6 class="fw-bold text-primary small text-uppercase mb-3 text-center">Cek Gizi Mandiri</h6>
        <div class="row g-2">
            <div class="col-6">
                <input type="number" id="calc-tb" class="form-control calc-input" placeholder="TB (cm)">
            </div>
            <div class="col-6">
                <input type="number" id="calc-bb" class="form-control calc-input" placeholder="BB (kg)">
            </div>
        </div>
        <button class="btn-calc" onclick="hitungMandiri()">HITUNG SEKARANG</button>
        
        <div id="hasil-kalkulator" class="mt-4 text-center d-none">
            <hr>
            <p class="small text-muted mb-1">Status Anda:</p>
            <h5 class="fw-bold" id="calc-status">Normal</h5>
            <div class="p-3 rounded-3 bg-white border border-primary-subtle mt-2">
                <small id="calc-saran" class="text-muted italic"></small>
            </div>
        </div>
    </div>

    <div class="card card-custom p-4">
        <h6 class="fw-bold text-muted small text-uppercase mb-3">Saldo Tabungan Sampah</h6>
        <div class="d-flex align-items-center justify-content-between">
            <h3 class="fw-bold mb-0 text-success">Rp <span id="saldo-rp">0</span></h3>
            <h5 class="fw-bold mb-0 text-primary"><span id="total-kg">0</span> Kg</h5>
        </div>
    </div>

</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzVXjDFywiipE5TYG-2fSDXPh3X1mG5O_t3fbccZkX_lHhlg-scq-Ats1LUcUnrDu9Yog/exec"; 

    async function loadDashboard() {
        const userNIK = localStorage.getItem('nik_login');
        if (!userNIK) window.location.href = "index.html";

        try {
            const res = await fetch(`${API_URL}?action=get_all_sheets_data`);
            const json = await res.json();

            // Load Data dari Database
            const warga = json.data.Master_Data_Penduduk.find(r => r[0].toString() === userNIK);
            if (warga) {
                document.getElementById('nama-warga').innerText = warga[2];
                const tb = parseFloat(warga[12] || 0);
                const bb = parseFloat(warga[13] || 0);
                document.getElementById('db-tb').innerText = tb + " cm";
                document.getElementById('db-bb').innerText = bb + " kg";
                
                const analisis = prosesGizi(tb, bb);
                document.getElementById('status-gizi-db').innerText = analisis.status;
                document.getElementById('status-gizi-db').className = "status-badge " + analisis.badge;
                document.getElementById('saran-db').innerText = analisis.saran;
            }

            const saldo = json.data.sampah_saldo.find(r => r[0].toString() === userNIK);
            if (saldo) {
                document.getElementById('saldo-rp').innerText = parseInt(saldo[2] || 0).toLocaleString();
                document.getElementById('total-kg').innerText = saldo[3] || 0;
            }
        } catch (e) { console.log("Error loading"); }
    }

    // Fungsi Logika Gizi (Digunakan bersama)
    function prosesGizi(tb, bb) {
        if (tb === 0 || bb === 0) return {status: "-", saran: "Data tidak lengkap", badge: "bg-light"};
        const imt = bb / ((tb/100) * (tb/100));
        if (imt < 18.5) return {status: "Gizi Kurang", badge: "bg-danger-custom", saran: "Perbanyak protein (telur, ikan) dan karbohidrat."};
        if (imt <= 25) return {status: "Normal", badge: "bg-normal", saran: "Pertahankan pola makan bergizi seimbang & olahraga."};
        return {status: "Gizi Lebih", badge: "bg-warning-custom", saran: "Kurangi gorengan/gula, perbanyak serat dan aktivitas fisik."};
    }

    // Fungsi Kalkulator Mandiri
    function hitungMandiri() {
        const tb = document.getElementById('calc-tb').value;
        const bb = document.getElementById('calc-bb').value;
        if (!tb || !bb) return alert("Masukkan TB dan BB!");

        const hasil = prosesGizi(parseFloat(tb), parseFloat(bb));
        document.getElementById('hasil-kalkulator').classList.remove('d-none');
        document.getElementById('calc-status').innerText = hasil.status;
        document.getElementById('calc-saran').innerText = hasil.saran;
    }

    window.onload = loadDashboard;
</script>
</body>
</html>
