<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Warga - Bulo SmartVille</title>
    
    <script>
        if (!localStorage.getItem('nik_login')) { window.location.href = "index.html"; }
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #003d70; --accent: #00a8ff; --bg: #f8f9fc; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; padding-bottom: 50px; }
        
        /* Header Profil */
        .profile-header { background: var(--primary); color: white; padding: 50px 20px 80px; border-radius: 0 0 50px 50px; text-align: center; position: relative; }
        .btn-logout { position: absolute; top: 15px; right: 15px; font-size: 0.7rem; border-radius: 50px; opacity: 0.8; }
        
        /* Card Utama BMI */
        .card-bmi { border-radius: 30px; border: none; box-shadow: 0 15px 35px rgba(0,0,0,0.1); background: white; margin-top: -50px; padding: 25px; }
        
        /* Menu Cards */
        .menu-title { font-size: 0.85rem; font-weight: 800; color: #adb5bd; text-transform: uppercase; letter-spacing: 1px; margin: 25px 0 15px 10px; }
        .card-menu { border-radius: 20px; border: none; transition: 0.3s; cursor: pointer; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.03); overflow: hidden; }
        .card-menu:active { transform: scale(0.95); }
        .icon-circle { width: 50px; height: 50px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-right: 15px; }
        
        /* Status Badges */
        .bmi-badge { padding: 8px 20px; border-radius: 50px; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="profile-header shadow">
    <button onclick="logout()" class="btn btn-sm btn-outline-light btn-logout">Logout</button>
    <h3 class="fw-bold mb-1" id="nama-user">Memuat Nama...</h3>
    <p class="small opacity-75 mb-0">NIK: <span id="nik-user">...</span></p>
</div>

<div class="container">
    <div class="card card-bmi text-center">
        <div class="row align-items-center">
            <div class="col-6 border-end">
                <small class="text-muted d-block mb-1">Tinggi / Berat</small>
                <h5 class="fw-bold mb-0" id="tb-bb">- / -</h5>
            </div>
            <div class="col-6">
                <small class="text-muted d-block mb-1">Status BMI</small>
                <div id="status-bmi" class="bmi-badge bg-light text-muted small">Menghitung...</div>
            </div>
        </div>
        <hr class="my-3">
        <div class="text-start">
            <p class="fw-bold text-primary mb-1" style="font-size: 0.8rem;">💡 Saran Ahli Gizi:</p>
            <p id="saran-gizi" class="small text-muted mb-0 italic">Data pemeriksaan belum tersedia...</p>
        </div>
    </div>

    <div class="menu-title">Layanan & Fitur</div>
    
    <div class="card card-menu p-3 mb-3" onclick="window.location.href='tabungan_sampah.html'">
        <div class="d-flex align-items-center">
            <div class="icon-circle bg-success bg-opacity-10 text-success">♻️</div>
            <div class="flex-grow-1">
                <h6 class="fw-bold mb-0">Tabungan Sampah</h6>
                <small class="text-muted">Cek saldo & jadwal buang sampah</small>
            </div>
            <div class="text-muted fw-bold">→</div>
        </div>
    </div>

    <div class="card card-menu p-3 mb-3" onclick="window.location.href='kalkulator_gizi.html'">
        <div class="d-flex align-items-center">
            <div class="icon-circle bg-warning bg-opacity-10 text-warning">🥗</div>
            <div class="flex-grow-1">
                <h6 class="fw-bold mb-0">Kalkulator Nutrisi</h6>
                <small class="text-muted">Hitung asupan makanan harian</small>
            </div>
            <div class="text-muted fw-bold">→</div>
        </div>
    </div>

</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzVXjDFywiipE5TYG-2fSDXPh3X1mG5O_t3fbccZkX_lHhlg-scq-Ats1LUcUnrDu9Yog/exec";

    async function loadDashboard() {
        const nik = localStorage.getItem('nik_login');
        document.getElementById('nik-user').innerText = nik;

        try {
            const res = await fetch(`${API_URL}?action=get_all_sheets_data`);
            const db = await res.json();
            const user = db.data.Master_Data_Penduduk.find(r => r[0].toString() === nik);

            if (user) {
                document.getElementById('nama-user').innerText = user[2];
                const tb = parseFloat(user[12] || 0);
                const bb = parseFloat(user[13] || 0);
                document.getElementById('tb-bb').innerText = `${tb} cm / ${bb} kg`;
                prosesBMI(tb, bb);
            }
        } catch (e) { console.error("Error loading profile"); }
    }

    function prosesBMI(tb, bb) {
        if (!tb || !bb) return;
        const imt = bb / ((tb/100) ** 2);
        let status = "", color = "", saran = "";

        if (imt < 18.5) {
            status = "Gizi Kurang"; color = "#dc3545";
            saran = "Perbanyak asupan protein (ikan, telur) dan karbohidrat. Jangan melewatkan jam makan.";
        } else if (imt <= 25) {
            status = "Normal"; color = "#198754";
            saran = "Sangat baik! Pertahankan pola makan gizi seimbang dan hidrasi cukup setiap hari.";
        } else {
            status = "Overweight"; color = "#fd7e14";
            saran = "Kurangi makanan berminyak dan gula. Tingkatkan aktivitas fisik harian Anda.";
        }

        const badge = document.getElementById('status-bmi');
        badge.innerText = status;
        badge.style.background = color + "20"; // 20% opacity
        badge.style.color = color;
        document.getElementById('saran-gizi').innerText = saran;
    }

    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }

    window.onload = loadDashboard;
</script>
</body>
</html>
