<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Sampah - Bulo SmartVille</title>
    
    <script>
        const sessionNIK = localStorage.getItem('nik_login');
        const sessionRole = localStorage.getItem('role_login');
        // Hanya boleh diakses role 'sampah' atau 'admin'
        if (!sessionNIK || (!sessionRole.includes('sampah') && !sessionRole.includes('admin'))) {
            window.location.href = "index.html";
        }
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #f8f9fa; font-family: 'Inter', sans-serif; }
        .nav-kader { background: #198754; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .card-input { border-radius: 20px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="nav-kader shadow-sm">
    <h6 class="mb-0 fw-bold">Kader Bank Sampah</h6>
    <button onclick="logout()" class="btn btn-sm btn-outline-light" style="border-radius: 50px;">Keluar</button>
</div>

<div class="container mt-4">
    <div class="card card-input p-4">
        <h5 class="fw-bold text-success mb-3">Input Setoran Sampah</h5>
        <div class="mb-3">
            <label class="small fw-bold">Nama Nasabah (Warga)</label>
            <select id="select-warga-sampah" class="form-select"></select>
        </div>
        <div class="mb-3">
            <label class="small fw-bold">Berat Sampah (Kg)</label>
            <input type="number" id="input-kg" class="form-control" placeholder="0.0">
        </div>
        <button class="btn btn-success w-100 mt-3 fw-bold py-2" onclick="simpanSampah()">Update Saldo Warga</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzVXjDFywiipE5TYG-2fSDXPh3X1mG5O_t3fbccZkX_lHhlg-scq-Ats1LUcUnrDu9Yog/exec"; 

    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }

</script>
</body>
</html>
