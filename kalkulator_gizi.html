<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Gizi - Bulo SmartVille</title>
    <script>
        if (!localStorage.getItem('nik_login')) { window.location.href = "index.html"; }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #003d70; --accent: #ff7e5f; --bg: #f8fafd; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 30px; }
        
        .nav-header { background: white; padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; }
        .card-calc { border-radius: 24px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.04); background: white; margin-top: 20px; }
        
        /* Search Box Custom */
        .search-box { position: relative; margin-bottom: 15px; }
        .search-input { border-radius: 15px; padding: 12px 15px; border: 1.5px solid #eee; width: 100%; outline: none; transition: 0.3s; }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,61,112,0.1); }
        
        /* Weight Input Group */
        .input-berat-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .input-berat { border-radius: 15px; border: 1.5px solid #eee; padding: 10px; flex: 1; text-align: center; }

        .btn-add { background: var(--primary); color: white; border-radius: 15px; font-weight: 700; width: 100%; padding: 15px; border: none; transition: 0.3s; }
        .btn-add:active { transform: scale(0.95); opacity: 0.9; }

        .list-makan { max-height: 350px; overflow-y: auto; margin: 20px 0; padding: 5px; }
        .item-makan { background: #f9f9fb; border-radius: 18px; padding: 15px; margin-bottom: 12px; border: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; animation: fadeIn 0.3s ease; }
        
        .total-box { background: #1a1a1a; color: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .pantangan-box { background: #fff5f5; border-left: 5px solid #dc3545; padding: 15px; border-radius: 15px; font-size: 0.8rem; margin-top: 20px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="nav-header shadow-sm">
    <a href="dashboard_warga.html" style="text-decoration: none; color: var(--primary); font-weight: 800; font-size: 1.2rem;">←</a>
    <h6 class="mb-0 ms-3 fw-bold">Hitung Nutrisi Harian</h6>
</div>

<div class="container">
    <div class="card card-calc p-4">
        <div class="search-box">
            <label class="small fw-bold text-muted mb-2 ms-1">Cari Bahan Makanan:</label>
            <input type="text" id="input-cari" class="search-input" placeholder="Ketik nama makanan (misal: Nasi)..." onkeyup="filterMenu()">
            <select id="select-makanan" class="form-select mt-2" style="border-radius: 15px; padding: 10px; border: 1.5px solid #eee;">
                <option value="">-- Hasil Pencarian --</option>
            </select>
        </div>

        <label class="small fw-bold text-muted mb-2 ms-1">Berat Makanan (Gram):</label>
        <div class="input-berat-group">
            <input type="number" id="input-berat" class="input-berat" placeholder="Contoh: 100" value="100">
            <div style="align-self: center;" class="fw-bold text-muted small">gram</div>
        </div>

        <button class="btn-add" id="btn-tambah" onclick="tambahItem()" disabled>TAMBAH KE DAFTAR</button>

        <div class="list-makan" id="list-makan-container">
            <div class="text-center py-5 text-muted small">
                <img src="https://cdn-icons-png.flaticon.com/512/6762/6762317.png" width="60" style="opacity: 0.3; margin-bottom: 10px;"><br>
                Belum ada menu yang dipilih.
            </div>
        </div>

        <div class="total-box">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <span class="small opacity-75">Total Kalori:</span>
                <h4 class="fw-bold mb-0" id="total-kkal">0 kkal</h4>
            </div>
            <hr class="opacity-25 my-2">
            <div class="row text-center" style="font-size: 0.7rem;">
                <div class="col-4 border-end border-secondary">P: <b id="total-p">0</b>g</div>
                <div class="col-4 border-end border-secondary">L: <b id="total-l">0</b>g</div>
                <div class="col-4">K: <b id="total-k">0</b>g</div>
            </div>
        </div>

        <div id="box-pantangan" class="pantangan-box d-none">
            <b class="text-danger d-block mb-1">⚠️ Catatan Penyakit:</b>
            <span id="teks-pantangan"></span>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzVXjDFywiipE5TYG-2fSDXPh3X1mG5O_t3fbccZkX_lHhlg-scq-Ats1LUcUnrDu9Yog/exec";
    let databaseGizi = [];
    let pilihans = [];
    let penyakitUser = "Tidak Ada";

    async function loadData() {
        const nik = localStorage.getItem('nik_login');
        try {
            const res = await fetch(`${API_URL}?action=get_all_sheets_data`);
            const db = await res.json();
            
            // Ambil Penyakit
            const user = db.data.Master_Data_Penduduk.find(r => r[0].toString() === nik);
            if(user) penyakitUser = user[14] || "Tidak Ada";

            // Ambil Gizi (Sheet: master_gizi)
            databaseGizi = db.data.master_gizi;
            renderDropdown(databaseGizi); // Tampilan awal semua menu

            document.getElementById('btn-tambah').disabled = false;
        } catch (e) { Swal.fire('Error', 'Gagal sinkronasi database.', 'error'); }
    }

    function renderDropdown(data) {
        const select = document.getElementById('select-makanan');
        select.innerHTML = '';
        data.slice(1).forEach(row => {
            if(row[0] && !isNaN(row[1]) && row[1] !== "") {
                let opt = document.createElement('option');
                opt.value = row[0];
                opt.text = `${row[0]} (${row[1]} kkal / 100g)`;
                select.add(opt);
            }
        });
    }

    // FITUR CARI
    function filterMenu() {
        const keyword = document.getElementById('input-cari').value.toLowerCase();
        const filtered = databaseGizi.filter((row, index) => {
            if(index === 0) return false; // Abaikan header
            return row[0] && row[0].toString().toLowerCase().includes(keyword);
        });
        renderDropdown([databaseGizi[0], ...filtered]);
    }

    function tambahItem() {
        const namaSelected = document.getElementById('select-makanan').value;
        const berat = parseFloat(document.getElementById('input-berat').value) || 0;
        
        if(!namaSelected || berat <= 0) {
            Swal.fire('Input Salah', 'Pilih makanan dan masukkan berat (gram).', 'warning');
            return;
        }

        const data = databaseGizi.find(r => r[0] === namaSelected);
        if(data) {
            // Hitung berdasarkan berat (Nilai di sheet diasumsikan per 100g)
            const factor = berat / 100;
            pilihans.push({
                nama: data[0],
                berat: berat,
                kkal: (parseFloat(data[1]) * factor).toFixed(1),
                p: (parseFloat(data[2] || 0) * factor).toFixed(1),
                l: (parseFloat(data[3] || 0) * factor).toFixed(1),
                k: (parseFloat(data[4] || 0) * factor).toFixed(1)
            });
            updateUI();
        }
    }

    function updateUI() {
        const container = document.getElementById('list-makan-container');
        container.innerHTML = "";
        let totKkal = 0, totP = 0, totL = 0, totK = 0;

        pilihans.forEach((item, index) => {
            totKkal += parseFloat(item.kkal);
            totP += parseFloat(item.p);
            totL += parseFloat(item.l);
            totK += parseFloat(item.k);

            container.innerHTML += `
                <div class="item-makan">
                    <div>
                        <b class="d-block" style="font-size: 0.85rem;">${item.nama}</b>
                        <small class="text-muted">${item.berat}g • ${item.kkal} kkal</small>
                    </div>
                    <button class="btn btn-sm text-danger fw-bold" onclick="hapusItem(${index})">✕</button>
                </div>`;
        });

        document.getElementById('total-kkal').innerText = totKkal.toFixed(0) + " kkal";
        document.getElementById('total-p').innerText = totP.toFixed(1);
        document.getElementById('total-l').innerText = totL.toFixed(1);
        document.getElementById('total-k').innerText = totK.toFixed(1);

        // Cek Pantangan
        if(penyakitUser !== "Tidak Ada" && pilihans.length > 0) {
            document.getElementById('box-pantangan').classList.remove('d-none');
            document.getElementById('teks-pantangan').innerText = `Riwayat: ${penyakitUser}. Mohon batasi makanan tinggi natrium/lemak jenuh.`;
        }
    }

    function hapusItem(idx) {
        pilihans.splice(idx, 1);
        updateUI();
    }

    window.onload = loadData;
</script>
</body>
</html>
