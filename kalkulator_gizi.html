<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Nutrisi - Bulo SmartVille</title>
    <script>
        if (!localStorage.getItem('nik_login')) { window.location.href = "index.html"; }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #fdfdfd; font-family: 'Inter', sans-serif; padding-bottom: 30px; }
        .nav-back { background: white; padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; }
        .card-calc { border-radius: 25px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); background: white; margin-top: 20px; }
        .btn-add { background: #003d70; color: white; border-radius: 12px; font-weight: 700; width: 100%; padding: 12px; border: none; }
        .list-makan { max-height: 250px; overflow-y: auto; margin-bottom: 20px; }
        .pantangan-box { background: #fff5f5; border-left: 5px solid #dc3545; padding: 15px; border-radius: 12px; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="nav-back">
    <a href="dashboard_warga.html" style="text-decoration: none; color: #003d70; font-weight: bold;">← Kembali</a>
    <h6 class="mb-0 ms-3 fw-bold">Kalkulator Nutrisi Harian</h6>
</div>

<div class="container">
    <div class="card card-calc p-4">
        <label class="small fw-bold mb-2">Pilih Menu Makanan/Minuman:</label>
        <select id="select-makanan" class="form-select mb-3" style="border-radius: 12px; padding: 12px;"></select>
        <button class="btn-add" onclick="tambahItem()">TAMBAH MENU</button>

        <hr class="my-4">
        
        <div class="list-makan" id="list-makan">
            <p class="text-center text-muted small py-4">Belum ada makanan yang dipilih.</p>
        </div>

        <div class="p-3 rounded-4 bg-dark text-white d-flex justify-content-between">
            <span>Total Energi:</span>
            <span class="fw-bold" id="total-kkal">0 kkal</span>
        </div>
    </div>

    <div id="box-pantangan" class="pantangan-box mt-4 d-none">
        <h6 class="fw-bold text-danger">⚠️ Catatan Ahli Gizi:</h6>
        <p class="mb-0" id="teks-pantangan"></p>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzVXjDFywiipE5TYG-2fSDXPh3X1mG5O_t3fbccZkX_lHhlg-scq-Ats1LUcUnrDu9Yog/exec";
    let databaseGizi = [];
    let pilihans = [];
    let riwayatPenyakit = "Tidak Ada";

    async function loadData() {
        const nik = localStorage.getItem('nik_login');
        Swal.fire({ title: 'Menyiapkan Menu...', didOpen: () => Swal.showLoading() });

        try {
            const res = await fetch(`${API_URL}?action=get_all_sheets_data`);
            const db = await res.json();
            
            // 1. Ambil Penyakit dari Master_Data_Penduduk (Kolom 15 / Indeks 14)
            const user = db.data.Master_Data_Penduduk.find(r => r[0].toString() === nik);
            if(user) riwayatPenyakit = user[14] || "Tidak Ada";

            // 2. Ambil List Makanan dari Master_Gizi (Kolom 1: Nama, Kolom 2: Kalori)
            databaseGizi = db.data.Master_Gizi;
            const selectMakan = document.getElementById('select-makanan');
            
            // Bersihkan dan Isi Dropdown (Mulai indeks 1 agar header tidak ikut)
            databaseGizi.slice(1).forEach(m => {
                if(m[0]) {
                    let opt = document.createElement('option');
                    opt.value = m[0];
                    opt.text = `${m[0]} (${m[1]} kkal)`;
                    selectMakan.add(opt);
                }
            });
            Swal.close();
        } catch (e) {
            Swal.fire('Error', 'Gagal memuat daftar makanan.', 'error');
        }
    }

    function tambahItem() {
        const selectedNama = document.getElementById('select-makanan').value;
        const findData = databaseGizi.find(r => r[0] === selectedNama);
        
        if(findData) {
            pilihans.push({ nama: findData[0], kkal: parseFloat(findData[1]) });
            updateTampilan();
        }
    }

    function updateTampilan() {
        const container = document.getElementById('list-makan');
        container.innerHTML = "";
        let total = 0;

        pilihans.forEach((item, index) => {
            total += item.kkal;
            container.innerHTML += `
                <div class="d-flex justify-content-between align-items-center mb-2 p-2 bg-light rounded-3">
                    <span class="small fw-bold">${item.nama}</span>
                    <span class="badge bg-primary">${item.kkal} kkal</span>
                </div>`;
        });

        document.getElementById('total-kkal').innerText = total + " kkal";
        
        // Cek Peringatan Penyakit
        if(riwayatPenyakit !== "Tidak Ada" && pilihans.length > 0) {
            document.getElementById('box-pantangan').classList.remove('d-none');
            document.getElementById('teks-pantangan').innerText = `Mengingat riwayat penyakit ${riwayatPenyakit}, harap hindari makanan pemicu (garam/gula berlebih) dalam daftar di atas. Total kalori harian ideal Anda harus dikonsultasikan lebih lanjut.`;
        }
    }

    window.onload = loadData;
</script>
</body>
</html>
