<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Nutrisi - Bulo SmartVille</title>
    <script>
        if (!localStorage.getItem('nik_login')) { window.location.href = "index.html"; }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #fdfdfd; font-family: 'Inter', sans-serif; padding-bottom: 30px; }
        .nav-back { background: white; padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; }
        .card-calc { border-radius: 25px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); background: white; margin-top: 20px; }
        .btn-add { background: #003d70; color: white; border-radius: 12px; font-weight: 700; width: 100%; padding: 12px; border: none; }
        .list-makan { max-height: 300px; overflow-y: auto; margin-bottom: 20px; }
        .pantangan-box { background: #fff5f5; border-left: 5px solid #dc3545; padding: 15px; border-radius: 12px; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="nav-back">
    <a href="dashboard_warga.html" style="text-decoration: none; color: #003d70; font-weight: bold;">← Kembali</a>
    <h6 class="mb-0 ms-3 fw-bold">Kalkulator Nutrisi</h6>
</div>

<div class="container">
    <div class="card card-calc p-4">
        <label class="small fw-bold mb-2">Pilih Bahan Makanan:</label>
        <select id="select-makanan" class="form-select mb-3" style="border-radius: 12px; padding: 12px;">
            <option value="">-- Memuat Bahan Makanan... --</option>
        </select>
        <button class="btn-add" id="btn-tambah" onclick="tambahItem()" disabled>TAMBAH MENU</button>

        <hr class="my-4">
        
        <div class="list-makan" id="list-makan-container">
            <p class="text-center text-muted small py-4" id="placeholder-text">Belum ada makanan yang dipilih.</p>
        </div>

        <div class="p-3 rounded-4 bg-dark text-white d-flex justify-content-between shadow-sm">
            <span>Total Energi Harian:</span>
            <span class="fw-bold" id="total-kkal">0 kkal</span>
        </div>
    </div>

    <div id="box-pantangan" class="pantangan-box mt-4 d-none">
        <h6 class="fw-bold text-danger">⚠️ Catatan Ahli Gizi:</h6>
        <p class="mb-0" id="teks-pantangan"></p>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzVXjDFywiipE5TYG-2fSDXPh3X1mG5O_t3fbccZkX_lHhlg-scq-Ats1LUcUnrDu9Yog/exec";
    
    let databaseGizi = [];
    let pilihans = [];
    let penyakitUser = "Tidak Ada";

    async function loadDataAwal() {
        const nik = localStorage.getItem('nik_login');
        
        try {
            const res = await fetch(`${API_URL}?action=get_all_sheets_data`);
            const db = await res.json();
            
            // 1. Ambil Penyakit User (Index 14)
            const user = db.data.Master_Data_Penduduk.find(r => r[0].toString() === nik);
            if(user) penyakitUser = user[14] || "Tidak Ada";

            // 2. Ambil Data dari sheet 'master_gizi' (SESUAI GAMBAR)
            databaseGizi = db.data.master_gizi; 

            if (!databaseGizi) throw new Error("Sheet master_gizi tidak ditemukan.");

            const selectMakan = document.getElementById('select-makanan');
            selectMakan.innerHTML = '<option value="">-- Pilih Bahan Makanan --</option>';
            
            // Filter hanya baris yang punya nilai Kalori (menghindari baris judul kategori)
            databaseGizi.slice(1).forEach(row => {
                const nama = row[0];
                const kalori = row[1];
                
                // Pastikan nama ada dan kalori adalah angka (bukan teks kategori)
                if(nama && !isNaN(kalori) && kalori !== "") {
                    let opt = document.createElement('option');
                    opt.value = nama;
                    opt.text = `${nama} (${kalori} kkal)`;
                    selectMakan.add(opt);
                }
            });

            document.getElementById('btn-tambah').disabled = false;

        } catch (e) {
            console.error(e);
            Swal.fire('Gagal Memuat Data', 'Cek apakah nama sheet di Google Sheets Bapak sudah "master_gizi" (kecil semua).', 'error');
        }
    }

    function tambahItem() {
        const selectedNama = document.getElementById('select-makanan').value;
        if(!selectedNama) return;

        const dataItem = databaseGizi.find(r => r[0] === selectedNama);
        
        if(dataItem) {
            pilihans.push({ 
                nama: dataItem[0], 
                kkal: parseFloat(dataItem[1] || 0),
                protein: dataItem[2],
                lemak: dataItem[3],
                karbo: dataItem[4]
            });
            updateView();
        }
    }

    function updateView() {
        const container = document.getElementById('list-makan-container');
        container.innerHTML = "";
        let total = 0;

        pilihans.forEach((item) => {
            total += item.kkal;
            container.innerHTML += `
                <div class="mb-2 p-3 bg-light rounded-3 shadow-sm border-start border-4 border-primary">
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="fw-bold text-dark">${item.nama}</span>
                        <span class="badge bg-primary">${item.kkal} kkal</span>
                    </div>
                    <div class="mt-1" style="font-size: 0.65rem; color: #666;">
                        P: ${item.protein} | L: ${item.lemak} | K: ${item.karbo}
                    </div>
                </div>`;
        });

        document.getElementById('total-kkal').innerText = total + " kkal";
        
        if(penyakitUser !== "Tidak Ada" && penyakitUser !== "-" && pilihans.length > 0) {
            document.getElementById('box-pantangan').classList.remove('d-none');
            let p = penyakitUser.toLowerCase();
            let pesan = `Mengingat riwayat ${penyakitUser}, harap perhatikan porsi menu di atas.`;
            
            if(p.includes("lambung")) pesan = `Karena riwayat ${penyakitUser}, hindari bahan yang terlalu asam atau pedas.`;
            if(p.includes("gula") || p.includes("diabetes")) pesan = `Karena riwayat ${penyakitUser}, batasi asupan Karbohidrat (K) dari daftar di atas.`;
            
            document.getElementById('teks-pantangan').innerText = pesan;
        }
    }

    window.onload = loadDataAwal;
</script>
</body>
</html>
