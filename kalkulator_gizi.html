<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisis Gizi Pintar - Bulo SmartVille</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #003d70; --bg: #f0f2f5; --danger: #e74c3c; --success: #27ae60; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; }
        
        /* PANEL ATAS (FIXED / TIDAK BERGERAK) */
        .top-analysis {
            height: 45vh; background: var(--primary); color: white;
            padding: 20px; border-radius: 0 0 35px 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; justify-content: center; position: relative; z-index: 10;
        }
        .kkal-big { font-size: 3.2rem; font-weight: 800; line-height: 1; }
        .ai-feedback {
            background: rgba(255,255,255,0.1); border-radius: 20px; padding: 12px 18px;
            margin-top: 15px; border: 1px dashed rgba(255,255,255,0.3); font-size: 0.85rem;
        }

        /* PANEL BAWAH (SCROLLABLE) */
        .bottom-inputs {
            height: 55vh; overflow-y: auto; padding: 20px; padding-bottom: 80px;
        }
        
        .card-input { border-radius: 25px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); background: white; padding: 20px; margin-bottom: 15px; }
        .input-custom { background: #f8f9fa; border: 1px solid #eee; border-radius: 15px; padding: 12px; font-size: 0.9rem; }
        
        .macro-badge { font-size: 0.7rem; font-weight: 700; padding: 5px 12px; border-radius: 50px; background: rgba(255,255,255,0.15); }
        .status-pill { font-size: 0.65rem; padding: 4px 12px; border-radius: 50px; font-weight: 800; margin-top: 5px; display: inline-block; }
    </style>
</head>
<body>

<div class="top-analysis">
    <div class="d-flex justify-content-between align-items-start">
        <div>
            <span class="opacity-50 small fw-bold text-uppercase">Total Kalori</span>
            <div class="kkal-big" id="total-kkal">0</div>
            <div class="d-flex gap-2 mt-2">
                <span class="macro-badge">P: <span id="total-p">0</span>g</span>
                <span class="macro-badge">L: <span id="total-l">0</span>g</span>
                <span class="macro-badge">K: <span id="total-k">0</span>g</span>
                <span class="macro-badge">Fe: <span id="total-fe">0</span>mg</span>
            </div>
        </div>
        <a href="dashboard_warga.html" class="btn btn-sm btn-light rounded-circle fw-bold">✕</a>
    </div>

    <div class="ai-feedback" id="box-feedback">
        <div id="status-judul" class="fw-bold text-warning mb-1">Menunggu Input...</div>
        <div id="status-pesan" class="small opacity-75">Tambahkan menu makanan Anda di bawah untuk memulai analisis gizi otomatis.</div>
    </div>
</div>

<div class="bottom-inputs">
    <div class="card-input">
        <label class="small fw-bold text-muted mb-2">Pilih & Cari Makanan</label>
        <input type="text" id="input-cari" class="form-control input-custom mb-2" placeholder="Cari: Nasi, Ikan, Telur..." onkeyup="filterMenu()">
        <select id="select-makanan" class="form-select input-custom mb-3"></select>
        
        <div class="row g-2">
            <div class="col-7">
                <input type="number" id="input-berat" class="form-control input-custom text-center fw-bold" value="100">
            </div>
            <div class="col-5">
                <button class="btn btn-primary w-100 h-100 fw-bold" style="border-radius: 15px;" onclick="tambahItem()">TAMBAH</button>
            </div>
        </div>
    </div>

    <div id="list-makan-container">
        </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzVXjDFywiipE5TYG-2fSDXPh3X1mG5O_t3fbccZkX_lHhlg-scq-Ats1LUcUnrDu9Yog/exec";
    let databaseGizi = [];
    let pilihans = [];

    async function loadData() {
        try {
            const res = await fetch(`${API_URL}?action=get_all_sheets_data`);
            const db = await res.json();
            databaseGizi = db.data.master_gizi;
            renderDropdown(databaseGizi);
        } catch (e) { alert("Gagal muat data."); }
    }

    function renderDropdown(data) {
        const s = document.getElementById('select-makanan');
        s.innerHTML = "";
        data.slice(1).forEach(r => {
            if(r[0] && !isNaN(r[1])) {
                let o = document.createElement('option');
                o.value = r[0]; o.text = `${r[0]} (${r[1]} kkal)`;
                s.add(o);
            }
        });
    }

    function filterMenu() {
        const k = document.getElementById('input-cari').value.toLowerCase();
        const f = databaseGizi.filter((r, i) => i !== 0 && r[0].toLowerCase().includes(k));
        renderDropdown([databaseGizi[0], ...f]);
    }

    function tambahItem() {
        const n = document.getElementById('select-makanan').value;
        const b = parseFloat(document.getElementById('input-berat').value) || 0;
        const d = databaseGizi.find(r => r[0] === n);
        if(d && b > 0) {
            const f = b / 100;
            pilihans.unshift({ // Paling baru di atas
                nama: d[0], berat: b,
                kkal: (parseFloat(d[1])*f), p: (parseFloat(d[2]||0)*f),
                l: (parseFloat(d[3]||0)*f), k: (parseFloat(d[4]||0)*f), fe: (parseFloat(d[5]||0)*f)
            });
            updateUI();
        }
    }

    function updateUI() {
        let tk=0, tp=0, tl=0, tka=0, tfe=0;
        const cont = document.getElementById('list-makan-container');
        cont.innerHTML = "";

        pilihans.forEach((item, idx) => {
            tk+=item.kkal; tp+=item.p; tl+=item.l; tka+=item.k; tfe+=item.fe;
            cont.innerHTML += `
                <div class="card-input d-flex justify-content-between align-items-center mb-2 p-3">
                    <div><b class="small d-block">${item.nama}</b><small class="text-muted">${item.berat}g • ${item.kkal.toFixed(0)} kkal</small></div>
                    <button class="btn btn-sm text-danger" onclick="hapus(${idx})">✕</button>
                </div>`;
        });

        document.getElementById('total-kkal').innerText = tk.toFixed(0);
        document.getElementById('total-p').innerText = tp.toFixed(1);
        document.getElementById('total-l').innerText = tl.toFixed(1);
        document.getElementById('total-k').innerText = tka.toFixed(1);
        document.getElementById('total-fe').innerText = tfe.toFixed(1);

        berikanPenilaian(tk, tp, tl, tka, tfe);
    }

    function berikanPenilaian(kkal, p, l, k, fe) {
        let judul = "✅ Nutrisi Seimbang";
        let pesan = "Komposisi makanan Anda terlihat baik. Pertahankan variasi menu.";
        let warna = "#27ae60";

        // LOGIKA PENILAIAN AI
        if (k > 150) {
            judul = "⚠️ Karbohidrat Tinggi!";
            pesan = "Terlalu banyak karbohidrat berpotensi meningkatkan kadar gula darah dan risiko diabetes.";
            warna = "#e67e22";
        } else if (fe < 2 && kkal > 500) {
            judul = "📉 Kurang Zat Besi";
            pesan = "Makanan Anda rendah Zat Besi. Kurang Zat Besi berpotensi menyebabkan Anemia dan Stunting.";
            warna = "#e74c3c";
        } else if (l > (kkal * 0.4 / 9)) {
            judul = "🍔 Lemak Berlebih";
            pesan = "Kandungan lemak terlalu tinggi. Berpotensi meningkatkan kolesterol dan risiko jantung.";
            warna = "#c0392b";
        }

        const box = document.getElementById('box-feedback');
        box.style.borderColor = warna;
        document.getElementById('status-judul').innerText = judul;
        document.getElementById('status-judul').style.color = warna;
        document.getElementById('status-pesan').innerText = pesan;
    }

    function hapus(idx) { pilihans.splice(idx,1); updateUI(); }
    window.onload = loadData;
</script>
</body>
</html>
